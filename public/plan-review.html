<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <style>
    :root {
      --bg: #f0f2f5;
      --bg-gradient: linear-gradient(135deg, #e8edf5 0%, #f0e6f6 30%, #e6f0f8 60%, #f5f0e6 100%);
      --surface: rgba(255,255,255,0.78);
      --surface-solid: #ffffff;
      --surface-elevated: rgba(255,255,255,0.95);
      --surface-hover: rgba(0,0,0,0.03);
      --border: rgba(0,0,0,0.06);
      --border-strong: rgba(0,0,0,0.1);
      --text: #1a1a2e;
      --text-secondary: #5c5c7a;
      --text-tertiary: #9e9eb8;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-subtle: rgba(79,70,229,0.08);
      --accent-glow: rgba(79,70,229,0.2);
      --success: #10b981;
      --success-subtle: rgba(16,185,129,0.1);
      --warning: #f59e0b;
      --warning-subtle: rgba(245,158,11,0.1);
      --error: #ef4444;
      --error-subtle: rgba(239,68,68,0.1);
      --user-bubble: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-xl: 0 24px 64px rgba(0,0,0,0.1), 0 8px 24px rgba(0,0,0,0.06);
      --blur: blur(24px);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-theme="dark"] {
      --bg: #0a0a0f;
      --bg-gradient: linear-gradient(135deg, #0f0f1a 0%, #1a0f1f 30%, #0f1a20 60%, #1a1a0f 100%);
      --surface: rgba(22,22,35,0.78);
      --surface-solid: #161623;
      --surface-elevated: rgba(30,30,50,0.95);
      --surface-hover: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.12);
      --text: #eeeef5;
      --text-secondary: #9e9eb8;
      --text-tertiary: #5c5c70;
      --accent: #818cf8;
      --accent-hover: #a5b4fc;
      --accent-subtle: rgba(129,140,248,0.12);
      --accent-glow: rgba(129,140,248,0.25);
      --success: #34d399;
      --success-subtle: rgba(52,211,153,0.15);
      --warning: #fbbf24;
      --warning-subtle: rgba(251,191,36,0.15);
      --error: #f87171;
      --error-subtle: rgba(248,113,113,0.15);
      --user-bubble: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
      --shadow-xl: 0 24px 64px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { 
      height: 100%; 
      overflow: hidden; 
      background: var(--bg);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { 
      background: transparent;
      border-radius: var(--radius-full);
      transition: background 0.3s var(--ease);
    }
    .scrollable:hover::-webkit-scrollbar-thumb { background: var(--border-strong); }
    .scrollable::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
    
    .scroller { position: relative; overflow: hidden; flex: 1; display: flex; flex-direction: column; }
    .scroller-content { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color 0.3s var(--ease); }
    .scroller-content:hover { scrollbar-color: var(--border-strong) transparent; }
    
    .scroll-track { position: absolute; top: 8px; right: 4px; bottom: 8px; width: 6px; border-radius: var(--radius-full); background: transparent; opacity: 0; transition: opacity 0.3s var(--ease); z-index: 10; pointer-events: none; }
    .scroller:hover .scroll-track, .scroller.scrolling .scroll-track { opacity: 1; }
    .scroll-thumb { position: absolute; top: 0; left: 0; right: 0; min-height: 40px; background: var(--border-strong); border-radius: var(--radius-full); cursor: pointer; pointer-events: auto; transition: background 0.2s var(--ease), transform 0.15s var(--ease); }
    .scroll-thumb:hover { background: var(--text-tertiary); transform: scaleX(1.3); }
    .scroll-thumb:active { background: var(--accent); }
    
    .scroll-shadow-top, .scroll-shadow-bottom { position: absolute; left: 0; right: 16px; height: 60px; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s var(--ease); }
    .scroll-shadow-top { top: 0; background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%); }
    .scroll-shadow-bottom { bottom: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 100%); }
    .scroll-shadow-top.visible, .scroll-shadow-bottom.visible { opacity: 1; }
    
    .scroll-to-bottom { position: absolute; bottom: 24px; right: 24px; width: 40px; height: 40px; border-radius: 50%; background: var(--surface-solid); border: 1px solid var(--border); box-shadow: var(--shadow-lg); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; opacity: 0; transform: translateY(16px) scale(0.9); transition: all 0.3s var(--spring); pointer-events: none; }
    .scroll-to-bottom.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .scroll-to-bottom:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-2px) scale(1.05); }
    .scroll-to-bottom svg { width: 18px; height: 18px; }

    .mac-window {
      position: relative;
      max-width: 1400px;
      height: 96vh;
      margin: 2vh auto;
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl), inset 0 0.5px 0 rgba(255,255,255,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      transition: all 0.4s var(--ease);
    }
    .mac-window::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-xl);
      padding: 1px;
      background: linear-gradient(135deg, var(--accent), rgba(168,85,247,0.5), rgba(16,185,129,0.3), var(--accent));
      background-size: 300% 300%;
      animation: gradientShift 8s ease infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease);
    }
    .mac-window:hover::before { opacity: 0.7; }

    .titlebar {
      height: 52px;
      background: var(--surface-elevated);
      backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 100;
      -webkit-app-region: drag;
      position: relative;
    }
    .titlebar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), rgba(168,85,247,0.5), var(--accent), transparent);
      background-size: 200% 100%;
      animation: gradientShift 6s ease infinite;
      opacity: 0.5;
    }

    .traffic-lights { display: flex; gap: 8px; -webkit-app-region: no-drag; }
    .tl { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: all 0.25s var(--spring); position: relative; }
    .tl::after { content: ''; position: absolute; inset: 0; border-radius: 50%; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.15); }
    .tl:hover { transform: scale(1.3); }
    .tl-red:hover { box-shadow: 0 0 12px rgba(255,96,87,0.5); }
    .tl-yellow:hover { box-shadow: 0 0 12px rgba(255,189,46,0.5); }
    .tl-green:hover { box-shadow: 0 0 12px rgba(40,200,64,0.5); }
    .tl-red { background: linear-gradient(180deg, #ff6057 0%, #e74c3c 100%); }
    .tl-yellow { background: linear-gradient(180deg, #ffbd2e 0%, #f39c12 100%); }
    .tl-green { background: linear-gradient(180deg, #28c840 0%, #27ae60 100%); }

    .titlebar-center { flex: 1; display: flex; justify-content: center; }
    .titlebar-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .titlebar-actions { display: flex; align-items: center; gap: 4px; -webkit-app-region: no-drag; }
    .titlebar-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); background: transparent; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s var(--ease); }
    .titlebar-btn:hover { background: var(--accent-subtle); color: var(--accent); transform: scale(1.1); }
    .titlebar-btn:active { transform: scale(0.95); }
    .titlebar-btn svg { width: 18px; height: 18px; }

    .main-grid { flex: 1; display: grid; grid-template-columns: 260px 1fr; overflow: hidden; transition: grid-template-columns 0.3s var(--ease); }
    .main-grid.sidebar-collapsed { grid-template-columns: 0px 1fr; }

    .sidebar { background: var(--surface-elevated); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; width: 260px; min-width: 0; transition: width 0.3s var(--ease), opacity 0.3s var(--ease), transform 0.3s var(--ease); }
    .main-grid.sidebar-collapsed .sidebar { width: 0; opacity: 0; transform: translateX(-20px); pointer-events: none; }

    .sidebar-toggle { width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s var(--ease); flex-shrink: 0; }
    .sidebar-toggle:hover { background: var(--surface-elevated); color: var(--text); border-color: var(--border-strong); }
    .sidebar-toggle svg { width: 18px; height: 18px; transition: transform 0.3s var(--ease); }
    .main-grid.sidebar-collapsed ~ .sidebar-toggle svg, .sidebar-collapsed .sidebar-toggle svg { transform: rotate(180deg); }

    .sidebar-header { padding: 16px; flex-shrink: 0; }
    .new-chat-btn { width: 100%; padding: 12px 16px; background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 50%, #a855f7 100%); background-size: 200% 200%; color: #fff; border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 15px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2); transition: all 0.3s var(--ease); animation: gradientShift 4s ease infinite; position: relative; overflow: hidden; }
    .new-chat-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transform: translateX(-100%); transition: transform 0.6s var(--ease); }
    .new-chat-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 30px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.25); }
    .new-chat-btn:hover::after { transform: translateX(100%); }
    .new-chat-btn:active { transform: translateY(0) scale(0.97); }
    .new-chat-btn svg { width: 16px; height: 16px; transition: transform 0.3s var(--spring); }
    .new-chat-btn:hover svg { transform: rotate(90deg); }

    .sidebar-section-label { padding: 20px 16px 8px; font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
    .sidebar-history { flex: 1; overflow-y: auto; padding: 0 8px; }

    .history-item { padding: 10px 12px; border-radius: var(--radius-md); margin-bottom: 2px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.25s var(--ease); font-size: 13px; color: var(--text-secondary); position: relative; overflow: hidden; }
    .history-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: linear-gradient(135deg, var(--accent), #a855f7); border-radius: var(--radius-md) 0 0 var(--radius-md); transition: width 0.3s var(--ease); opacity: 0.8; }
    .history-item:hover { background: var(--surface-hover); color: var(--text); transform: translateX(4px); }
    .history-item:hover::before { width: 3px; }
    .history-item.active { background: var(--accent-subtle); color: var(--accent); }
    .history-item.active::before { width: 3px; }
    .history-item .icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.6; }
    .history-item.active .icon { opacity: 1; }
    .history-item .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item .time { font-size: 11px; color: var(--text-tertiary); }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; position: relative; }
    .sidebar-footer::before { content: ''; position: absolute; top: 0; left: 12px; right: 12px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-glow), transparent); }
    .sidebar-footer-btn { flex: 1; padding: 10px 12px; border-radius: var(--radius-md); background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.3s var(--ease); }
    .sidebar-footer-btn:hover { background: linear-gradient(135deg, var(--error-subtle), rgba(239,68,68,0.05)); color: var(--error); border-color: var(--error); transform: translateY(-1px); }
    .sidebar-footer-btn svg { width: 14px; height: 14px; }

    .chat-area { display: flex; flex-direction: column; background: transparent; position: relative; overflow: hidden; }
    
    /* Animated gradient mesh */
    .chat-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 600px 400px at 20% 10%, var(--accent-glow) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 80% 80%, rgba(168,85,247,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 60% 40%, rgba(16,185,129,0.05) 0%, transparent 70%);
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
      animation: meshFloat 20s ease-in-out infinite alternate;
    }

    @keyframes meshFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-20px, 10px) scale(1.05); }
      66% { transform: translate(15px, -20px) scale(0.97); }
      100% { transform: translate(10px, -15px) scale(0.98); }
    }

    .chat-area::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
      top: 30%;
      right: -50px;
      animation: orbFloat2 25s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .chat-header {
      height: 56px;
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 0 16px 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .chat-header .sidebar-toggle { margin-right: 4px; }

    .chat-session-info { display: flex; align-items: center; gap: 12px; }
    .chat-session-icon { width: 32px; height: 32px; border-radius: var(--radius-md); background: linear-gradient(135deg, var(--accent-subtle), rgba(168,85,247,0.1)); color: var(--accent); display: flex; align-items: center; justify-content: center; transition: all 0.3s var(--ease); }
    .chat-session-icon:hover { transform: scale(1.1); background: linear-gradient(135deg, rgba(79,70,229,0.15), rgba(168,85,247,0.15)); }
    .chat-session-icon svg { width: 16px; height: 16px; }
    .chat-session-title { font-weight: 600; font-size: 14px; color: var(--text); }

    .progress-pill { margin-left: auto; display: none; align-items: center; gap: 8px; background: var(--surface-elevated); border: 1px solid var(--border); padding: 6px 14px; border-radius: var(--radius-full); font-size: 12px; font-weight: 500; color: var(--text-secondary); animation: fadeInScale 0.4s var(--spring); position: relative; overflow: hidden; }
    .progress-pill::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, var(--accent-subtle), transparent); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
    .progress-pill.visible { display: flex; }
    .progress-pill .pulse-dot { width: 7px; height: 7px; background: linear-gradient(135deg, var(--accent), #a855f7); border-radius: 50%; animation: pulse 1.5s var(--ease) infinite; box-shadow: 0 0 8px var(--accent-glow); position: relative; z-index: 1; }

    .stop-btn { display: none; margin-left: 8px; background: linear-gradient(135deg, var(--error) 0%, #dc2626 100%); color: #fff; border: none; padding: 6px 14px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s var(--ease); box-shadow: 0 2px 10px rgba(239,68,68,0.3); animation: fadeInScale 0.3s var(--spring); }
    .stop-btn:hover { transform: scale(1.05); box-shadow: 0 4px 18px rgba(239,68,68,0.4); }
    .stop-btn:active { transform: scale(0.95); }
    .stop-btn.visible { display: flex; }

    #feed { flex: 1; overflow-y: auto; padding: 32px 24px; scroll-behavior: smooth; position: relative; z-index: 1; }
    #empty-wrap { display: flex; align-items: center; justify-content: center; height: 100%; padding: 40px; }
    .empty-state { text-align: center; max-width: 480px; }
    .empty-icon { width: 80px; height: 80px; margin: 0 auto 24px; background: linear-gradient(135deg, var(--accent-subtle) 0%, rgba(168,85,247,0.12) 50%, rgba(16,185,129,0.08) 100%); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; color: var(--accent); animation: float 4s ease-in-out infinite; box-shadow: 0 8px 32px var(--accent-glow), 0 0 60px rgba(79,70,229,0.08); position: relative; }
    .empty-icon::before { content: ''; position: absolute; inset: -4px; border-radius: calc(var(--radius-xl) + 4px); background: linear-gradient(135deg, var(--accent), #a855f7, #10b981, var(--accent)); background-size: 300% 300%; animation: gradientShift 5s ease infinite; opacity: 0.3; z-index: -1; filter: blur(8px); }
    .empty-icon svg { width: 40px; height: 40px; }
    .empty-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, #a855f7 100%); background-size: 200% 200%; animation: gradientShift 6s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .empty-subtitle { color: var(--text-secondary); line-height: 1.6; font-size: 14px; }
    .empty-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 24px; }
    .empty-chip { padding: 8px 14px; background: var(--surface-solid); border: 1px solid var(--border); border-radius: var(--radius-full); font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; transition: all 0.3s var(--ease); cursor: default; position: relative; overflow: hidden; }
    .empty-chip::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent-subtle), rgba(168,85,247,0.08)); opacity: 0; transition: opacity 0.3s var(--ease); }
    .empty-chip:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-3px) scale(1.04); box-shadow: 0 6px 20px var(--accent-glow); }
    .empty-chip:hover::before { opacity: 1; }
    .empty-chip svg { width: 14px; height: 14px; }

    .feed-inner { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

    /* Messages */
    .msg-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; animation: msgIn 0.5s var(--ease); }
    .msg-row.row-user { flex-direction: row-reverse; }

    .avatar { width: 32px; height: 32px; border-radius: var(--radius-md); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .avatar svg { width: 16px; height: 16px; }
    .avatar-user { background: var(--user-bubble); background-size: 200% 200%; animation: gradientShift 5s ease infinite; color: #fff; box-shadow: 0 4px 15px var(--accent-glow); transition: all 0.3s var(--ease); }
    .avatar-user:hover { box-shadow: 0 6px 24px var(--accent-glow); transform: scale(1.1) rotate(5deg); }
    .avatar-agent { background: var(--surface-solid); border: 1px solid var(--border); color: var(--text-secondary); transition: all 0.3s var(--ease); position: relative; }
    .avatar-agent::after { content: ''; position: absolute; inset: -2px; border-radius: calc(var(--radius-md) + 2px); background: linear-gradient(135deg, var(--accent), #a855f7); opacity: 0; transition: opacity 0.3s var(--ease); z-index: -1; filter: blur(4px); }
    .avatar-agent:hover { transform: scale(1.1) rotate(-5deg); }
    .avatar-agent:hover::after { opacity: 0.4; }

    .bubble-wrap { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
    .row-user .bubble-wrap { align-items: flex-end; }

    .bubble { padding: 14px 18px; border-radius: var(--radius-lg); font-size: 14px; line-height: 1.6; word-break: break-word; position: relative; }

    .bubble-user {
      background: var(--user-bubble);
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
      color: #fff;
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: 0 4px 20px var(--accent-glow), 0 8px 40px rgba(79,70,229,0.12);
      transition: all 0.3s var(--ease);
    }
    .bubble-user:hover {
      box-shadow: 0 6px 28px var(--accent-glow), 0 12px 48px rgba(79,70,229,0.18);
      transform: translateY(-1px);
    }
    /* RTL support for Hebrew text in user bubbles */
    .bubble-user[dir="rtl"] {
      border-bottom-right-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-sm);
      text-align: right;
    }
    .row-user:has(.bubble-user[dir="rtl"]) { flex-direction: row-reverse; }

    .bubble-agent { background: var(--surface-solid); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: var(--radius-sm); box-shadow: var(--shadow-sm); transition: all 0.3s var(--ease); }
    .bubble-agent:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); transform: translateY(-1px); }
    .bubble-error { background: var(--error-subtle) !important; border-color: var(--error) !important; color: var(--error) !important; }

    .bubble-time { font-size: 11px; color: var(--text-tertiary); padding: 0 4px; }
    .bubble-copy { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-elevated); color: var(--text-tertiary); display: none; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s var(--ease); }
    .bubble-copy svg { width: 14px; height: 14px; }
    .bubble-agent:hover .bubble-copy { display: flex; }
    .bubble-copy:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Markdown Styles */
    .md { line-height: 1.65; }
    .md h1, .md h2, .md h3 { font-weight: 600; margin: 16px 0 8px; letter-spacing: -0.02em; }
    .md h1 { font-size: 20px; }
    .md h2 { font-size: 17px; }
    .md h3 { font-size: 15px; }
    .md p { margin: 8px 0; }
    .md ul, .md ol { margin: 8px 0; padding-left: 24px; }
    .md li { margin: 4px 0; }
    .md blockquote { border-left: 3px solid var(--accent); padding-left: 14px; margin: 12px 0; color: var(--text-secondary); }
    .md code { font-family: 'JetBrains Mono', monospace; font-size: 13px; background: var(--surface-hover); padding: 2px 6px; border-radius: var(--radius-sm); }
    .md pre { background: var(--surface-solid); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; margin: 12px 0; }
    .md pre code { display: block; padding: 16px; background: transparent; overflow-x: auto; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .pre-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: linear-gradient(90deg, var(--surface-hover), rgba(79,70,229,0.04)); border-bottom: 1px solid var(--border); }
    .pre-lang { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; }
    .pre-copy { padding: 4px 10px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s var(--ease); }
    .pre-copy:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Activity & Typing */
    .activity-group { padding-left: 44px; margin-bottom: 12px; animation: msgIn 0.4s var(--ease); }
    .activity-toggle { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; padding: 8px 16px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface-solid); transition: all 0.3s var(--ease); }
    .activity-toggle:hover { background: var(--surface-elevated); transform: translateX(2px); }
    .activity-toggle.done { border-color: var(--success); background: linear-gradient(135deg, var(--success-subtle), rgba(16,185,129,0.05)); color: var(--success); }
    .activity-toggle.stopped { border-color: var(--error); background: linear-gradient(135deg, var(--error-subtle), rgba(239,68,68,0.05)); color: var(--error); }
    .activity-spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: var(--accent); border-right-color: #a855f7; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .activity-toggle.done .activity-spinner, .activity-toggle.stopped .activity-spinner { display: none; }
    .toggle-icon { font-style: normal; transition: transform 0.2s var(--ease); color: var(--text-tertiary); }
    .activity-toggle.open .toggle-icon { transform: rotate(90deg); }
    .activity-items { display: none; margin-top: 10px; border-left: 2px solid var(--border); padding-left: 16px; flex-direction: column; gap: 6px; }
    .activity-items.open { display: flex; }
    .activity-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary); padding: 6px 0; animation: slideInLeft 0.3s var(--ease); }
    .activity-item-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); }
    .activity-item-icon svg { width: 14px; height: 14px; }
    .activity-item-text code { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: linear-gradient(135deg, var(--accent-subtle), rgba(168,85,247,0.08)); color: var(--accent); padding: 2px 8px; border-radius: var(--radius-sm); border: 1px solid rgba(79,70,229,0.1); }

    .typing-row { display: flex; align-items: flex-start; gap: 12px; animation: msgIn 0.4s var(--ease); }
    .typing-bubble { background: var(--surface-solid); border: 1px solid var(--border); border-radius: var(--radius-lg); border-bottom-left-radius: var(--radius-sm); padding: 16px 20px; display: flex; gap: 8px; position: relative; overflow: hidden; }
    .typing-bubble::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, var(--accent-subtle), transparent); background-size: 200% 100%; animation: shimmer 2s linear infinite; opacity: 0.5; }
    .typing-bubble span { width: 8px; height: 8px; border-radius: 50%; animation: typingBounce 1.4s ease-in-out infinite; position: relative; z-index: 1; }
    .typing-bubble span:nth-child(1) { background: var(--accent); animation-delay: 0s; }
    .typing-bubble span:nth-child(2) { background: #7c3aed; animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { background: #a855f7; animation-delay: 0.4s; }

    /* Input */
    .inputbar-container { padding: 16px 24px 24px; background: linear-gradient(to top, var(--bg) 40%, transparent); position: relative; z-index: 1; }
    .inputbar { max-width: 800px; margin: 0 auto; background: var(--surface-solid); border-radius: var(--radius-xl); padding: 12px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); transition: all 0.4s var(--ease); position: relative; }
    .inputbar::before { content: ''; position: absolute; inset: -2px; border-radius: calc(var(--radius-xl) + 2px); padding: 2px; background: linear-gradient(135deg, var(--accent), #a855f7, #10b981, var(--accent)); background-size: 300% 300%; animation: gradientShift 5s ease infinite; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.4s var(--ease); pointer-events: none; z-index: 1; }
    .inputbar:focus-within { box-shadow: var(--shadow-lg), 0 0 0 3px var(--accent-glow), 0 0 40px rgba(79,70,229,0.08); transform: translateY(-2px); }
    .inputbar:focus-within::before { opacity: 0.8; }

    .file-chip { display: none; align-items: center; background: var(--accent-subtle); color: var(--accent); padding: 6px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 500; margin-bottom: 8px; gap: 8px; }
    .file-chip.visible { display: inline-flex; }
    .file-chip svg { width: 14px; height: 14px; }
    .file-chip-remove { background: none; border: none; color: var(--accent); cursor: pointer; display: flex; padding: 2px; border-radius: var(--radius-sm); transition: all 0.15s var(--ease); }
    .file-chip-remove:hover { background: var(--accent); color: #fff; }
    .file-chip-remove svg { width: 12px; height: 12px; }

    /* Image attachment chips */
    .image-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .image-chips:empty { display: none; }
    .image-chip { position: relative; display: inline-flex; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: default; }
    .image-chip img { width: 56px; height: 56px; object-fit: cover; display: block; }
    .image-chip-remove { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; line-height: 1; transition: background 0.15s; }
    .image-chip-remove:hover { background: var(--error); }

    /* Images inside user bubbles */
    .bubble-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .bubble-images img { max-width: 200px; max-height: 200px; border-radius: var(--radius-md); object-fit: cover; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: opacity 0.15s; }
    .bubble-images img:hover { opacity: 0.85; }

    /* Live streaming bubble */
    .bubble-streaming { white-space: pre-wrap; font-size: 14px; line-height: 1.6; word-break: break-word; min-height: 1.4em; }
    .bubble-streaming::after { content: '▋'; display: inline-block; opacity: 1; animation: cursorBlink 0.9s step-end infinite; margin-left: 1px; background: linear-gradient(180deg, var(--accent), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-btn { width: 40px; height: 40px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface-hover); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s var(--ease); flex-shrink: 0; }
    .input-btn:hover { background: var(--surface-elevated); color: var(--text); border-color: var(--border-strong); }
    .input-btn:active { transform: scale(0.96); }
    .input-btn svg { width: 18px; height: 18px; }
    .input-btn-send { background: var(--user-bubble); background-size: 200% 200%; animation: gradientShift 4s ease infinite; color: #fff; border: none; box-shadow: 0 4px 15px var(--accent-glow); position: relative; overflow: hidden; }
    .input-btn-send::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s var(--ease); }
    .input-btn-send:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 28px var(--accent-glow); }
    .input-btn-send:hover::after { opacity: 1; }
    .input-btn-send:active { transform: translateY(0) scale(0.93); }

    #prompt-input { flex: 1; background: transparent; border: none; outline: none; font-family: inherit; font-size: 14px; resize: none; max-height: 160px; padding: 10px 8px; color: var(--text); line-height: 1.5; }
    #prompt-input::placeholder { color: var(--text-tertiary); }

    /* Review Card */
    .review-card { background: var(--surface-solid); border: 1px solid var(--warning); border-radius: var(--radius-lg); margin-left: 44px; box-shadow: 0 8px 32px var(--warning-subtle), 0 0 60px rgba(245,158,11,0.06); overflow: hidden; margin-bottom: 16px; animation: reviewIn 0.5s var(--spring); transition: all 0.3s var(--ease); }
    .review-card:hover { box-shadow: 0 12px 40px var(--warning-subtle), 0 0 80px rgba(245,158,11,0.1); transform: translateY(-2px); }
    .review-header { height: 4px; background: linear-gradient(90deg, var(--warning), var(--accent), #a855f7, var(--warning)); background-size: 300% 100%; animation: gradientShift 4s ease infinite; }
    .review-content { padding: 20px; }
    .review-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; background: var(--warning-subtle); color: var(--warning); padding: 4px 10px; border-radius: var(--radius-sm); text-transform: uppercase; letter-spacing: 0.03em; }
    .review-badge svg { width: 12px; height: 12px; }
    .review-objective { background: var(--surface-hover); padding: 12px 16px; border-radius: var(--radius-md); margin: 16px 0; font-size: 13px; }
    .review-objective strong { color: var(--text); }
    .review-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .review-step { display: flex; gap: 12px; padding: 10px 14px; background: var(--surface-hover); border-radius: var(--radius-md); align-items: center; transition: all 0.2s var(--ease); }
    .review-step:hover { background: var(--surface-elevated); transform: translateX(4px); }
    .review-step-num { width: 24px; height: 24px; background: linear-gradient(135deg, var(--warning), #f97316); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; box-shadow: 0 2px 8px rgba(245,158,11,0.3); }
    .review-step-tool { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--accent-subtle); color: var(--accent); padding: 3px 8px; border-radius: var(--radius-sm); }
    .review-step-desc { font-size: 13px; color: var(--text-secondary); }
    .review-actions { display: flex; gap: 8px; }
    .review-btn { flex: 1; padding: 10px 16px; border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.3s var(--ease); position: relative; overflow: hidden; }
    .review-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: translateX(-100%); transition: transform 0.5s var(--ease); }
    .review-btn:hover { transform: translateY(-2px) scale(1.02); }
    .review-btn:hover::after { transform: translateX(100%); }
    .review-btn:active { transform: translateY(0) scale(0.96); }
    .review-btn-approve { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); color: #fff; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
    .review-btn-approve:hover { box-shadow: 0 8px 25px rgba(16,185,129,0.4); }
    .review-btn-reject { background: linear-gradient(135deg, var(--error) 0%, #dc2626 100%); color: #fff; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
    .review-btn-reject:hover { box-shadow: 0 8px 25px rgba(239,68,68,0.4); }
    .review-btn-replan { background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%); color: #fff; box-shadow: 0 4px 15px var(--accent-glow); }
    .review-btn-replan:hover { box-shadow: 0 8px 25px var(--accent-glow); }

    /* Toast */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px) scale(0.9); background: var(--surface-solid); color: var(--text); padding: 12px 24px; border-radius: var(--radius-full); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-xl), 0 0 40px var(--accent-glow); border: 1px solid var(--border); z-index: 9999; opacity: 0; transition: all 0.4s var(--spring); position: relative; overflow: hidden; }
    .toast::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #a855f7, var(--accent)); background-size: 200% 100%; animation: gradientShift 3s ease infinite; }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

    /* Animations */
    @keyframes msgIn { from { opacity: 0; transform: translateY(16px) scale(0.97); filter: blur(6px); } to { opacity: 1; transform: none; filter: blur(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
    @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
    @keyframes reviewIn { from { opacity: 0; transform: scale(0.92) translateY(20px); filter: blur(4px); } to { opacity: 1; transform: none; filter: blur(0); } }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.85); filter: blur(4px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-6px) rotate(1deg); } 50% { transform: translateY(-10px) rotate(0deg); } 75% { transform: translateY(-4px) rotate(-1deg); } }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes borderGlow { 0%, 100% { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); } 50% { border-color: rgba(168,85,247,0.5); box-shadow: 0 0 25px rgba(168,85,247,0.15); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes orbFloat1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -40px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } }
    @keyframes orbFloat2 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(-40px, 30px) scale(0.95); } 66% { transform: translate(25px, -25px) scale(1.05); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: none; } }
    @keyframes subtlePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes ripple { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }


    /* RTL Layout Support */
    [dir="rtl"] .sidebar { border-right: none; border-left: 1px solid var(--border); }
    [dir="rtl"] .main-grid.sidebar-collapsed .sidebar { transform: translateX(20px); }
    [dir="rtl"] .chat-header { padding: 0 24px 0 16px; }
    [dir="rtl"] .chat-header .sidebar-toggle { margin-right: 0; margin-left: 4px; }
    [dir="rtl"] .progress-pill { margin-left: 0; margin-right: auto; }
    [dir="rtl"] .stop-btn { margin-left: 0; margin-right: 8px; }
    [dir="rtl"] .activity-group { padding-left: 0; padding-right: 44px; }
    [dir="rtl"] .activity-items { border-left: none; border-right: 2px solid var(--border); padding-left: 0; padding-right: 16px; }
    [dir="rtl"] .review-card { margin-left: 0; margin-right: 44px; }
    [dir="rtl"] .bubble-agent { border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-sm); }
    [dir="rtl"] .bubble-user { border-bottom-right-radius: var(--radius-lg); border-bottom-left-radius: var(--radius-sm); }
    [dir="rtl"] .md ul, [dir="rtl"] .md ol { padding-left: 0; padding-right: 24px; }
    [dir="rtl"] .md blockquote { border-left: none; border-right: 3px solid var(--accent); padding-left: 0; padding-right: 14px; }

    @media (max-width: 768px) {
      [dir="rtl"] .sidebar { left: auto; right: 0; transform: translateX(100%); }
      [dir="rtl"] .main-grid.sidebar-open .sidebar { transform: translateX(0); }
    }

    .sidebar-overlay { display: none; }

    @media (max-width: 768px) {
      .mac-window { height: 100vh; margin: 0; border-radius: 0; }
      .main-grid { grid-template-columns: 1fr !important; position: relative; }
      .sidebar { position: absolute; top: 0; left: 0; bottom: 0; width: 280px !important; z-index: 50; box-shadow: var(--shadow-xl); transform: translateX(-100%); opacity: 1 !important; pointer-events: auto; }
      .main-grid.sidebar-open .sidebar { transform: translateX(0); }
      .sidebar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.3s var(--ease); }
      .main-grid.sidebar-open .sidebar-overlay { display: block; opacity: 1; pointer-events: auto; }
    }

    /* ── Session History Sidebar ── */
    .sidebar-section-row { display: flex; align-items: center; padding: 20px 16px 8px; }
    .sidebar-section-row .sidebar-section-label { padding: 0; flex: 1; }
    .sidebar-refresh-btn { width: 22px; height: 22px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-tertiary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s var(--ease); }
    .sidebar-refresh-btn:hover { background: var(--surface-hover); color: var(--text); }
    .sidebar-refresh-btn svg { width: 13px; height: 13px; }
    .sidebar-refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

    .history-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
    .history-item-top { display: flex; align-items: center; gap: 6px; }
    .history-item-label { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .history-item-badge { font-size: 10px; font-weight: 600; background: var(--accent-subtle); color: var(--accent); padding: 1px 6px; border-radius: var(--radius-full); flex-shrink: 0; }
    .history-item-meta { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item-del { opacity: 0; flex-shrink: 0; width: 20px; height: 20px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-tertiary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s var(--ease); padding: 0; }
    .history-item:hover .history-item-del { opacity: 1; }
    .history-item-del:hover { background: var(--error-subtle); color: var(--error); }
    .history-item-del svg { width: 12px; height: 12px; }

    .history-loading { padding: 24px 16px; text-align: center; color: var(--text-tertiary); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .history-loading svg { width: 16px; height: 16px; animation: spin 0.8s linear infinite; color: var(--accent); }
    .history-empty { padding: 24px 16px; text-align: center; color: var(--text-tertiary); font-size: 12px; }

    .history-detail-view { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .history-detail-header { display: flex; align-items: center; gap: 8px; }
    .history-detail-back { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-hover); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s var(--ease); flex-shrink: 0; }
    .history-detail-back:hover { background: var(--surface-elevated); color: var(--text); }
    .history-detail-back svg { width: 14px; height: 14px; }
    .history-detail-title { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-detail-sid { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); background: var(--surface-hover); padding: 2px 8px; border-radius: var(--radius-sm); }

    .history-entry-card { background: var(--surface-hover); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px; }
    .history-entry-ts { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); margin-bottom: 6px; }
    .history-entry-body { font-size: 12px; color: var(--text-secondary); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .history-entry-body strong { color: var(--text); }

    .history-detail-actions { display: flex; gap: 6px; padding-top: 4px; }
    .history-action-btn { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface-hover); color: var(--text-secondary); font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.2s var(--ease); }
    .history-action-btn:hover { background: var(--surface-elevated); color: var(--text); border-color: var(--border-strong); }
    .history-action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .history-action-btn.primary:hover { background: var(--accent-hover); }
    .history-action-btn.danger { color: var(--error); }
    .history-action-btn.danger:hover { background: var(--error-subtle); border-color: var(--error); }
    .history-action-btn svg { width: 12px; height: 12px; }
  </style>
</head>
<body>

<div class="mac-window">
  <div class="titlebar">
    <div class="traffic-lights">
      <span class="tl tl-red" onclick="window.close()"></span>
      <span class="tl tl-yellow"></span>
      <span class="tl tl-green"></span>
    </div>
    <div class="titlebar-center">
      <div class="titlebar-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
        Agent
      </div>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-btn" id="lang-toggle-btn" onclick="toggleLang()" title="Switch language">
        <span style="font-size:13px;font-weight:600;letter-spacing:-0.01em" id="lang-label">עב</span>
      </button>
      <button class="titlebar-btn" onclick="toggleTheme()" title="Toggle theme">
        <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="main-grid" id="main-grid">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" onclick="newSession()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          New Chat
        </button>
      </div>
      <div class="sidebar-section-row">
        <div class="sidebar-section-label" id="sidebar-history-label">History</div>
        <button class="sidebar-refresh-btn" id="history-refresh-btn" onclick="renderHistory()" title="Refresh sessions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
      </div>
      <div class="sidebar-history" id="history-list"></div>
      <div class="sidebar-footer">
        <button class="sidebar-footer-btn" id="delete-session-btn" onclick="deleteSession()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          Clear
        </button>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        </button>
        <div class="chat-session-info">
          <div class="chat-session-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          </div>
          <div class="chat-session-title" id="chat-session-title">New Conversation</div>
        </div>
        <div class="progress-pill" id="progress-pill">
          <span class="pulse-dot"></span>
          <span id="progress-label">Thinking</span>
        </div>
        <button class="stop-btn" id="stop-btn" onclick="stopStreaming()">Stop</button>
      </div>

      <div id="feed">
        <div id="empty-wrap">
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            </div>
            <div class="empty-title">What can I help you with?</div>
            <div class="empty-subtitle">I can search the web, execute code, analyze files, create diagrams, and communicate in multiple languages.</div>
            <div class="empty-chips">
              <div class="empty-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>Code</div>
              <div class="empty-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>Files</div>
              <div class="empty-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>Diagrams</div>
            </div>
          </div>
        </div>
      </div>

      <div class="inputbar-container">
        <div class="inputbar">
          <div class="file-chip" id="file-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            <span id="file-chip-name">file.txt</span>
            <button class="file-chip-remove" onclick="removeAttachment()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div class="image-chips" id="image-chips"></div>
          <div class="input-row">
            <button class="input-btn" onclick="attachFile()" title="Attach file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <button class="input-btn" onclick="attachImage()" title="Attach image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <textarea id="prompt-input" rows="1" placeholder="Message Agent..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPrompt()}" oninput="autoResize(this)"></textarea>
            <button class="input-btn input-btn-send" onclick="sendPrompt()" title="Send message">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── i18n System ──
  let currentLang = 'en';
  const I18N = {
    en: {
      title: 'Agent', newChat: 'New Chat', history: 'History', clear: 'Clear',
      newConversation: 'New Conversation', thinking: 'Thinking', stop: 'Stop',
      emptyTitle: 'What can I help you with?',
      emptySubtitle: 'I can search the web, execute code, analyze files, create diagrams, and communicate in multiple languages.',
      chipCode: 'Code', chipFiles: 'Files', chipDiagrams: 'Diagrams',
      placeholder: 'Message Agent...', attachFile: 'Attach file', attachImage: 'Attach image', sendMessage: 'Send message',
      toggleSidebar: 'Toggle sidebar', switchLang: '\u05E2\u05D1',
      working: 'Working', stopped: 'Stopped',
      stepsCompleted: (n) => `${n} step${n > 1 ? 's' : ''} completed`,
      planReview: 'Plan Review Required', objective: 'Objective:',
      approve: 'Approve', reject: 'Reject', replan: 'Replan', processing: 'Processing...',
      planRejected: 'Plan rejected.', done: 'Done.', reviewFailed: 'Review failed.',
      stoppedToast: 'Stopped', sessionCleared: 'Session cleared',
      deleteConfirm: 'Delete this session memory?', fileTooLarge: 'File too large (max 512 KB)',
      currentSession: 'Current Session', now: 'now', copied: 'Copied', copy: 'Copy',
      connectionError: 'Connection error:', reviewing: 'Reviewing',
      planReady: (n) => `Plan ready: <strong>${n} steps</strong>`,
      running: (name) => `Running <code>${name}</code>`,
    },
    he: {
      title: '\u05E1\u05D5\u05DB\u05DF', newChat: '\u05E6\u05F3\u05D0\u05D8 \u05D7\u05D3\u05E9', history: '\u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05D4', clear: '\u05E0\u05E7\u05D4',
      newConversation: '\u05E9\u05D9\u05D7\u05D4 \u05D7\u05D3\u05E9\u05D4', thinking: '\u05D7\u05D5\u05E9\u05D1', stop: '\u05E2\u05E6\u05D5\u05E8',
      emptyTitle: '\u05D1\u05DE\u05D4 \u05D0\u05D5\u05DB\u05DC \u05DC\u05E2\u05D6\u05D5\u05E8?',
      emptySubtitle: '\u05D0\u05E0\u05D9 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D7\u05E4\u05E9 \u05D1\u05D0\u05D9\u05E0\u05D8\u05E8\u05E0\u05D8, \u05DC\u05D4\u05E8\u05D9\u05E5 \u05E7\u05D5\u05D3, \u05DC\u05E0\u05EA\u05D7 \u05E7\u05D1\u05E6\u05D9\u05DD, \u05DC\u05D9\u05E6\u05D5\u05E8 \u05D3\u05D9\u05D0\u05D2\u05E8\u05DE\u05D5\u05EA \u05D5\u05DC\u05EA\u05E7\u05E9\u05E8 \u05D1\u05DE\u05D2\u05D5\u05D5\u05DF \u05E9\u05E4\u05D5\u05EA.',
      chipSearch: '\u05D7\u05D9\u05E4\u05D5\u05E9 \u05D1\u05D0\u05D9\u05E0\u05D8\u05E8\u05E0\u05D8', chipCode: '\u05E7\u05D5\u05D3', chipFiles: '\u05E7\u05D1\u05E6\u05D9\u05DD', chipDiagrams: '\u05D3\u05D9\u05D0\u05D2\u05E8\u05DE\u05D5\u05EA',
      placeholder: '...\u05E9\u05DC\u05D7 \u05D4\u05D5\u05D3\u05E2\u05D4 \u05DC\u05E1\u05D5\u05DB\u05DF', attachFile: '\u05E6\u05E8\u05E3 \u05E7\u05D5\u05D1\u05E5', attachImage: '\u05E6\u05E8\u05E3 \u05EA\u05DE\u05D5\u05E0\u05D4', sendMessage: '\u05E9\u05DC\u05D7 \u05D4\u05D5\u05D3\u05E2\u05D4',
      toggleSidebar: '\u05D4\u05E6\u05D2/\u05D4\u05E1\u05EA\u05E8 \u05E1\u05E8\u05D2\u05DC \u05E6\u05D3', switchLang: 'EN',
      working: '\u05E2\u05D5\u05D1\u05D3', stopped: '\u05D4\u05D5\u05E4\u05E1\u05E7',
      stepsCompleted: (n) => `${n} \u05E9\u05DC\u05D1${n > 1 ? '\u05D9\u05DD' : ''} \u05D4\u05D5\u05E9\u05DC\u05DE${n > 1 ? '\u05D5' : ''}`,
      planReview: '\u05E0\u05D3\u05E8\u05E9 \u05D0\u05D9\u05E9\u05D5\u05E8 \u05EA\u05DB\u05E0\u05D9\u05EA', objective: '\u05DE\u05D8\u05E8\u05D4:',
      approve: '\u05D0\u05E9\u05E8', reject: '\u05D3\u05D7\u05D4', replan: '\u05EA\u05DB\u05E0\u05DF \u05DE\u05D7\u05D3\u05E9', processing: '\u05DE\u05E2\u05D1\u05D3...',
      planRejected: '\u05D4\u05EA\u05DB\u05E0\u05D9\u05EA \u05E0\u05D3\u05D7\u05EA\u05D4.', done: '\u05D1\u05D5\u05E6\u05E2.', reviewFailed: '\u05D4\u05D0\u05D9\u05E9\u05D5\u05E8 \u05E0\u05DB\u05E9\u05DC.',
      stoppedToast: '\u05D4\u05D5\u05E4\u05E1\u05E7', sessionCleared: '\u05D4\u05E9\u05D9\u05D7\u05D4 \u05E0\u05D5\u05E7\u05EA\u05D4',
      deleteConfirm: '\u05DC\u05DE\u05D7\u05D5\u05E7 \u05D0\u05EA \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05D4\u05E9\u05D9\u05D7\u05D4?', fileTooLarge: '\u05D4\u05E7\u05D5\u05D1\u05E5 \u05D2\u05D3\u05D5\u05DC \u05DE\u05D3\u05D9 (\u05DE\u05E7\u05E1\u05D9\u05DE\u05D5\u05DD 512 KB)',
      currentSession: '\u05E9\u05D9\u05D7\u05D4 \u05E0\u05D5\u05DB\u05D7\u05D9\u05EA', now: '\u05E2\u05DB\u05E9\u05D9\u05D5', copied: '\u05D4\u05D5\u05E2\u05EA\u05E7', copy: '\u05D4\u05E2\u05EA\u05E7',
      connectionError: '\u05E9\u05D2\u05D9\u05D0\u05EA \u05D7\u05D9\u05D1\u05D5\u05E8:', reviewing: '\u05D1\u05D5\u05D3\u05E7',
      planReady: (n) => `\u05EA\u05DB\u05E0\u05D9\u05EA \u05DE\u05D5\u05DB\u05E0\u05D4: <strong>${n} \u05E9\u05DC\u05D1\u05D9\u05DD</strong>`,
      running: (name) => `\u05DE\u05E8\u05D9\u05E5 <code>${name}</code>`,
    }
  };

  function t(key, ...args) {
    const val = I18N[currentLang]?.[key];
    if (typeof val === 'function') return val(...args);
    return val || key;
  }

  function applyLang() {
    const isHe = currentLang === 'he';
    document.documentElement.lang = isHe ? 'he' : 'en';
    document.documentElement.dir = isHe ? 'rtl' : 'ltr';

    // Titlebar title - preserve SVG, update text
    const titleEl = document.querySelector('.titlebar-title');
    const svgEl = titleEl.querySelector('svg');
    titleEl.textContent = '';
    titleEl.appendChild(svgEl);
    titleEl.append(' ' + t('title'));

    document.getElementById('lang-label').textContent = t('switchLang');

    // Sidebar - preserve SVGs
    const newChatBtn = document.querySelector('.new-chat-btn');
    const ncSvg = newChatBtn.querySelector('svg');
    newChatBtn.textContent = '';
    newChatBtn.appendChild(ncSvg);
    newChatBtn.append(' ' + t('newChat'));

    const histLabel = document.getElementById('sidebar-history-label');
    if (histLabel) histLabel.textContent = t('history');

    const clearBtn = document.getElementById('delete-session-btn');
    if (clearBtn) {
      const clSvg = clearBtn.querySelector('svg');
      clearBtn.textContent = '';
      clearBtn.appendChild(clSvg);
      clearBtn.append(' ' + t('clear'));
    }

    // Chat header
    if (!streaming) {
      document.getElementById('chat-session-title').textContent = t('newConversation');
    }
    document.getElementById('progress-label').textContent = t('thinking');
    document.getElementById('stop-btn').textContent = t('stop');

    // Empty state
    const emptyT = document.querySelector('.empty-title');
    const emptyS = document.querySelector('.empty-subtitle');
    if (emptyT) emptyT.textContent = t('emptyTitle');
    if (emptyS) emptyS.textContent = t('emptySubtitle');

    const chips = document.querySelectorAll('.empty-chip');
    const chipKeys = ['chipCode', 'chipFiles', 'chipDiagrams'];
    chips.forEach((chip, i) => {
      const svg = chip.querySelector('svg');
      chip.textContent = '';
      chip.appendChild(svg);
      chip.append(t(chipKeys[i]));
    });

    // Input area
    document.getElementById('prompt-input').placeholder = t('placeholder');
    document.querySelector('.input-btn[onclick*="attachFile"]').title = t('attachFile');
    document.querySelector('.input-btn[onclick*="attachImage"]').title = t('attachImage');
    document.querySelector('.input-btn-send').title = t('sendMessage');
    document.getElementById('sidebar-toggle').title = t('toggleSidebar');

    renderHistory();
  }

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'he' : 'en';
    applyLang();
  }

  const ICONS = {
    user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`,
    agent: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>`,
    copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`,
    check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
    chat: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
    settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`,
    plan: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`,
    tool: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>`,
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
    warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`
  };

  // Hebrew detection regex
  const HEBREW_RE = /[\u0590-\u05FF\uFB1D-\uFB4F]/;
  function isHebrew(text) { return HEBREW_RE.test(text); }

  let sessionId = crypto.randomUUID().slice(0, 16);
  let streaming = false;
  let abortController = null;
  let attachedFile = null;
  let attachedImages = []; // [{name, dataUrl}]
  let currentActivityGroup = null;
  let activityCount = 0;
  let hadToolCalls = false;
  const mmdSourceMap = {};

  // Live streaming state
  let streamingBubbleEl = null;   // the <div class="bubble bubble-agent"> element
  let streamingText = '';         // accumulated raw tokens

  const feed = document.getElementById('feed');
  const emptyWrap = document.getElementById('empty-wrap');
  const promptInput = document.getElementById('prompt-input');
  const stopBtn = document.getElementById('stop-btn');
  const progressPill = document.getElementById('progress-pill');
  const progressLabel = document.getElementById('progress-label');
  const toast = document.getElementById('toast');

  function base() { return 'http://localhost:3000'; }
  function esc(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
  function ts() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 2600);
  }

  function hideEmpty() { emptyWrap.style.display = 'none'; }
  function scrollFeed() { requestAnimationFrame(() => feed.scrollTop = feed.scrollHeight); }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

  function getFeedInner() {
    let inner = feed.querySelector('.feed-inner');
    if (!inner) { inner = document.createElement('div'); inner.className = 'feed-inner'; feed.appendChild(inner); }
    return inner;
  }

  function addUserBubble(text, images) {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'msg-row row-user';
    const safeText = text || '';
    const rtl = isHebrew(safeText);
    const dirAttr = rtl ? ' dir="rtl"' : '';
    const imagesHtml = images && images.length > 0
      ? `<div class="bubble-images">${images.map(img => `<img src="${esc(img.dataUrl)}" alt="${esc(img.name)}" onclick="window.open(this.src)" title="${esc(img.name)}">`).join('')}</div>`
      : '';
    const textHtml = safeText
      ? `<div class="md"><p>${esc(safeText).replace(/\n/g,'<br>')}</p></div>`
      : '';
    row.innerHTML = `<div class="avatar avatar-user">${ICONS.user}</div><div class="bubble-wrap"><div class="bubble bubble-user"${dirAttr}>${textHtml}${imagesHtml}</div><span class="bubble-time">${ts()}</span></div>`;
    inner.appendChild(row);
    scrollFeed();
  }

  function addAgentBubble(htmlContent, extraClass = '') {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'msg-row';
    row.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="bubble-wrap"><div class="bubble bubble-agent ${extraClass}">${htmlContent}<button class="bubble-copy" onclick="copyBubble(this)">${ICONS.copy}</button></div><span class="bubble-time">${ts()}</span></div>`;
    inner.appendChild(row);
    // Auto-detect RTL in agent bubbles too
    const bubble = row.querySelector('.bubble-agent');
    if (bubble && isHebrew(bubble.textContent)) {
      bubble.setAttribute('dir', 'rtl');
      bubble.style.textAlign = 'right';
    }
    if (typeof mermaid !== 'undefined') mermaid.run({nodes: row.querySelectorAll('.mermaid')});
    scrollFeed();
  }

  function addErrorBubble(html) { addAgentBubble(html, 'bubble-error'); }

  function copyBubble(btn) {
    const txt = btn.closest('.bubble').innerText.trim();
    navigator.clipboard.writeText(txt);
    btn.innerHTML = ICONS.check;
    setTimeout(() => btn.innerHTML = ICONS.copy, 1400);
  }

  function ensureActivityGroup() {
    if (currentActivityGroup) return;
    hideEmpty();
    const inner = getFeedInner();
    const wrap = document.createElement('div'); wrap.className = 'activity-group';
    wrap.innerHTML = `<button class="activity-toggle" onclick="toggleActivity(this)"><div class="activity-spinner"></div><span class="toggle-label">${t('working')}</span><em class="toggle-icon">&#8250;</em></button><div class="activity-items"></div>`;
    inner.appendChild(wrap);
    currentActivityGroup = wrap;
    activityCount = 0;
    scrollFeed();
  }

  function addActivityItem(iconKey, html) {
    ensureActivityGroup();
    activityCount++;
    const items = currentActivityGroup.querySelector('.activity-items');
    const item = document.createElement('div'); item.className = 'activity-item';
    const icon = ICONS[iconKey] || ICONS.tool;
    item.innerHTML = `<span class="activity-item-icon">${icon}</span><span class="activity-item-text">${html}</span>`;
    items.appendChild(item);
    scrollFeed();
  }

  function finalizeActivityGroup(stopped = false) {
    if (!currentActivityGroup) return;
    const btn = currentActivityGroup.querySelector('.activity-toggle');
    if (stopped) {
      btn.classList.add('stopped');
      btn.querySelector('.toggle-label').textContent = t('stopped');
    } else if (activityCount > 0) {
      btn.classList.add('done');
      btn.querySelector('.toggle-label').textContent = t('stepsCompleted', activityCount);
    } else {
      currentActivityGroup.remove();
    }
    currentActivityGroup = null;
  }

  function toggleActivity(btn) {
    const items = btn.closest('.activity-group').querySelector('.activity-items');
    items.classList.toggle('open');
    btn.classList.toggle('open');
    scrollFeed();
  }

  function addTyping() {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'typing-row'; row.id = 'typing-indicator';
    row.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
    inner.appendChild(row);
    scrollFeed();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function renderMd(text) {
    let s = String(text);
    const blocks = [];
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      const raw = code.trim();
      if (lang === 'mermaid') {
        const id = 'mmd-' + Math.random().toString(36).slice(2);
        mmdSourceMap[id] = raw;
        blocks.push(`<div class="preview-block"><div class="pre-header"><span class="pre-lang">mermaid</span><button class="pre-copy" onclick="copyBlock(this)">Copy</button></div><div class="mermaid" id="${id}">${raw}</div></div>`);
      } else {
        blocks.push(`<pre><div class="pre-header"><span class="pre-lang">${esc(lang||'text')}</span><button class="pre-copy" onclick="copyBlock(this)">Copy</button></div><code>${esc(raw)}</code></pre>`);
      }
      return `\x00BLOCK${i}\x00`;
    });

    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    s = s.replace(/^---+$/gm, '<hr>');
    s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, m => `<ul>${m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+] /,'')}</li>`).join('')}</ul>`);
    s = s.replace(/((?:^\d+\. .+\n?)+)/gm, m => `<ol>${m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('')}</ol>`);
    s = s.split(/\n{2,}/).map(block => {
      if (block.startsWith('<') || /^\x00BLOCK/.test(block)) return block;
      return `<p>${block.replace(/\n/g,'<br>')}</p>`;
    }).join('');
    blocks.forEach((b,i) => s = s.replace(`\x00BLOCK${i}\x00`, b));
    return `<div class="md">${s}</div>`;
  }

  function copyBlock(btn) {
    const code = btn.closest('pre')?.querySelector('code') || btn.closest('.mermaid');
    navigator.clipboard.writeText(code ? code.textContent : '');
    const old = btn.textContent; btn.textContent = t('copied');
    setTimeout(() => btn.textContent = old, 1400);
  }

  const PHASE_KEYS = {
    'Phase: supervisor': 'reviewing', 'Phase: research': 'researching',
    'Phase: plan': 'planning', 'Phase: execute': 'executing',
    'Phase: generate': 'composing', 'Phase: chat': 'thinking'
  };
  const PHASE_I18N = {
    en: { reviewing:'Reviewing', researching:'Researching', planning:'Planning', executing:'Executing', composing:'Composing', thinking:'Thinking' },
    he: { reviewing:'\u05D1\u05D5\u05D3\u05E7', researching:'\u05D7\u05D5\u05E7\u05E8', planning:'\u05DE\u05EA\u05DB\u05E0\u05DF', executing:'\u05DE\u05D1\u05E6\u05E2', composing:'\u05DE\u05D7\u05D1\u05E8', thinking:'\u05D7\u05D5\u05E9\u05D1' }
  };

  function setProgress(label) {
    const key = PHASE_KEYS[label];
    progressLabel.textContent = key ? (PHASE_I18N[currentLang][key] || label) : label;
    progressPill.classList.add('visible');
  }

  function clearProgress() { progressPill.classList.remove('visible'); }

  function buildReviewCard(data) {
    hideEmpty();
    const inner = getFeedInner();
    const wrap = document.createElement('div');
    wrap.className = 'review-card';
    wrap.innerHTML = `
      <div class="review-header"></div>
      <div class="review-content">
        <div class="review-badge">${ICONS.warning} ${t('planReview')}</div>
        <div class="review-objective"><strong>${t('objective')}</strong> ${esc(data.objective || '')}</div>
        <div class="review-steps">${(data.plan || []).map((step,i) => `
          <div class="review-step">
            <div class="review-step-num">${i+1}</div>
            <span class="review-step-tool">${esc(step.tool)}</span>
            <span class="review-step-desc">${esc(step.description)}</span>
          </div>`).join('')}</div>
        <div class="review-actions">
          <button class="review-btn review-btn-approve" onclick="reviewAction('approve',this)">${t("approve")}</button>
          <button class="review-btn review-btn-reject" onclick="reviewAction('reject',this)">${t("reject")}</button>
          <button class="review-btn review-btn-replan" onclick="reviewAction('replan',this)">${t("replan")}</button>
        </div>
      </div>`;
    inner.appendChild(wrap);
    scrollFeed();
  }

  async function reviewAction(action, btn) {
    const card = btn.closest('.review-card');
    const btns = card.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);
    btn.innerHTML = t('processing');
    try {
      const res = await fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/${action}`, {method:'POST'});
      const body = await res.json().catch(() => ({}));
      if (action === 'reject') addAgentBubble(renderMd(t('planRejected')));
      else addAgentBubble(renderMd(body.result || t('done')));
      setIdle();
    } catch (e) {
      addErrorBubble(`<p>${t('reviewFailed')}</p>`);
      setIdle();
    }
  }

  function stopStreaming() {
    if (abortController) {
      abortController.abort();
      fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}`, {method:'DELETE'}).catch(() => {});
      showToast(t('stoppedToast'));
      removeTyping();
      finalizeActivityGroup(true);
      stopBtn.classList.remove('visible');
      setIdle();
    }
  }

  async function deleteSession(sid) {
    const target = sid || sessionId;
    if (!confirm(t('deleteConfirm'))) return;
    await fetch(`${base()}/api/agents/session/${encodeURIComponent(target)}`, {method:'DELETE'});
    showToast(t('sessionCleared'));
    if (target === sessionId) newSession();
    else renderHistory();
  }

  async function sendPrompt() {
