<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f7;
      --bg2: #e5e5ea;
      --surface: rgba(255,255,255,0.82);
      --surface-solid: #ffffff;
      --surface2: rgba(242,242,247,0.9);
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.16);
      --text: #000000;
      --text2: #3c3c43;
      --muted: rgba(60,60,67,0.6);
      --muted2: rgba(60,60,67,0.36);
      --accent: #007AFF;
      --accent-light: #409CFF;
      --accent-dark: #0060df;
      --accent-bg: rgba(0,122,255,0.08);
      --green: #34C759;
      --green-bg: rgba(52,199,89,0.1);
      --red: #FF3B30;
      --red-bg: rgba(255,59,48,0.1);
      --orange: #FF9500;
      --orange-bg: rgba(255,149,0,0.1);
      --purple: #AF52DE;
      --user-bubble: linear-gradient(150deg, #007AFF 0%, #0055d4 100%);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --blur: saturate(180%) blur(24px);
      --radius: 18px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --bg2: #1c1c1e;
      --surface: rgba(28,28,30,0.88);
      --surface-solid: #1c1c1e;
      --surface2: rgba(44,44,46,0.85);
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #ffffff;
      --text2: rgba(235,235,245,0.85);
      --muted: rgba(235,235,245,0.6);
      --muted2: rgba(235,235,245,0.28);
      --accent: #0A84FF;
      --accent-light: #409CFF;
      --accent-dark: #007AFF;
      --accent-bg: rgba(10,132,255,0.12);
      --green: #30D158;
      --green-bg: rgba(48,209,88,0.12);
      --red: #FF453A;
      --red-bg: rgba(255,69,58,0.12);
      --orange: #FF9F0A;
      --orange-bg: rgba(255,159,10,0.12);
      --purple: #BF5AF2;
      --user-bubble: linear-gradient(150deg, #0A84FF 0%, #007AFF 100%);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.45);
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background .2s, color .2s;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* macOS traffic lights */
    .traffic-lights {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-right: 4px;
      flex-shrink: 0;
    }
    .tl {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-red    { background: #FF5F57; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
    .tl-yellow { background: #FEBC2E; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
    .tl-green  { background: #28C840; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }

    .header-logo {
      width: 28px; height: 28px;
      background: var(--user-bubble);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: .82rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,122,255,.35);
    }

    .header-title {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .header-subtitle {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 1px;
      letter-spacing: -.01em;
    }

    .header-mid {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    /* Progress indicator */
    .progress-pill {
      display: none;
      align-items: center;
      gap: 7px;
      background: var(--accent-bg);
      border: 1px solid rgba(0,122,255,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .73rem;
      font-weight: 500;
      color: var(--accent);
    }
    .progress-pill.visible { display: flex; }
    .progress-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s infinite ease-in-out;
    }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .session-chip {
      font-size: .68rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--muted);
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      cursor: pointer;
      user-select: all;
      transition: all .15s;
      white-space: nowrap;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-chip:hover { background: var(--border2); color: var(--text); }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .88rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }

    .api-input {
      font-size: .72rem;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--muted);
      background: var(--surface2);
      outline: none;
      width: 180px;
      transition: all .15s;
    }
    .api-input:focus { border-color: var(--accent); color: var(--text); background: var(--surface-solid); box-shadow: 0 0 0 3px var(--accent-bg); }

    /* ── Feed ────────────────────────────────────────────────────── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #feed::-webkit-scrollbar { width: 4px; }
    #feed::-webkit-scrollbar-track { background: transparent; }
    #feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    #feed::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

    .feed-inner {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ── Empty state ─────────────────────────────────────────────── */
    #empty-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 20px 80px;
      max-width: 440px;
      text-align: center;
    }
    .empty-icon-ring {
      width: 56px; height: 56px;
      background: var(--user-bubble);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 8px 24px rgba(0,122,255,.28);
    }
    .empty-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.025em;
    }
    .empty-sub {
      font-size: .83rem;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: -.01em;
    }
    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-top: 4px;
    }
    .suggestion-btn {
      padding: 9px 14px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .82rem;
      color: var(--text2);
      cursor: pointer;
      text-align: left;
      transition: all .12s;
      font-family: inherit;
      line-height: 1.4;
      box-shadow: var(--shadow-sm);
    }
    .suggestion-btn:hover {
      background: var(--accent-bg);
      border-color: rgba(0,122,255,0.3);
      color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    /* ── Message rows ────────────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: slideUp .18s cubic-bezier(.16,1,.3,1);
    }
    .msg-row.row-user  { flex-direction: row-reverse; padding-left: 18%; }
    .msg-row.row-agent { flex-direction: row; padding-right: 18%; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ──────────────────────────────────────────────────── */
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .avatar-user {
      background: var(--user-bubble);
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,122,255,.28);
    }
    .avatar-agent {
      background: var(--surface-solid);
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    /* ── Bubble ──────────────────────────────────────────────────── */
    .bubble-wrap { display: flex; flex-direction: column; gap: 3px; min-width: 0; max-width: 100%; }

    .bubble {
      padding: 10px 14px;
      border-radius: 17px;
      font-size: .875rem;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
      letter-spacing: -.01em;
    }

    .bubble-user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 3px 12px rgba(0,122,255,.22);
    }

    .bubble-agent {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .bubble-error {
      background: var(--red-bg) !important;
      border-color: rgba(255,59,48,0.3) !important;
      color: var(--red) !important;
    }

    /* Copy button on agent bubbles */
    .bubble-copy {
      position: absolute;
      top: 7px; right: 7px;
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      transition: all .12s;
    }
    .bubble-agent:hover .bubble-copy { display: flex; }
    .bubble-copy:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(0,122,255,0.3); }

    /* Timestamp */
    .bubble-time {
      font-size: .63rem;
      color: var(--muted2);
      padding: 0 4px;
      align-self: flex-end;
      letter-spacing: -.01em;
    }

    /* ── Activity group ──────────────────────────────────────────── */
    .activity-group {
      padding-left: 36px;
      animation: slideUp .18s ease;
    }

    .activity-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .73rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      transition: all .15s;
      user-select: none;
      font-family: inherit;
      box-shadow: var(--shadow-sm);
      letter-spacing: -.01em;
    }
    .activity-toggle:hover { border-color: rgba(0,122,255,0.25); color: var(--accent); }
    .toggle-icon { transition: transform .2s; font-style: normal; font-size: .6rem; }
    .activity-toggle.open .toggle-icon { transform: rotate(90deg); }

    .activity-spinner {
      width: 11px; height: 11px;
      border: 1.5px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .activity-toggle.done .activity-spinner { display: none; }
    .activity-toggle.done {
      border-color: rgba(52,199,89,0.35);
      color: var(--green);
      background: var(--green-bg);
    }
    .activity-toggle.done:hover { opacity: .85; }

    .activity-items {
      display: none;
      margin-top: 5px;
      border-left: 2px solid var(--border2);
      padding-left: 12px;
      flex-direction: column;
      gap: 4px;
    }
    .activity-items.open { display: flex; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: .76rem;
      color: var(--muted);
      padding: 2px 0;
      line-height: 1.45;
    }
    .activity-item-icon { flex-shrink: 0; margin-top: 1px; font-size: .73rem; }
    .activity-item-text { word-break: break-word; min-width: 0; }
    .activity-item-text code {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      font-size: .73rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 4px;
      border-radius: 4px;
      color: var(--accent);
    }

    /* ── Review card ─────────────────────────────────────────────── */
    .review-card {
      background: var(--orange-bg);
      border: 1px solid rgba(255,149,0,0.3);
      border-radius: 14px;
      padding: 14px 16px;
      margin-left: 36px;
      animation: reviewEntrance .28s cubic-bezier(.16,1,.3,1);
      box-shadow: 0 4px 16px rgba(255,149,0,0.1);
    }

    .review-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .review-badge {
      font-size: .68rem;
      font-weight: 600;
      background: rgba(255,149,0,0.15);
      color: var(--orange);
      border-radius: 8px;
      padding: 2px 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .review-objective {
      font-size: .82rem;
      color: var(--text2);
      margin-bottom: 12px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 8px;
      border: 1px solid var(--border);
      line-height: 1.5;
    }
    [data-theme="dark"] .review-objective { background: rgba(0,0,0,0.2); }

    .plan-steps {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }
    .plan-step {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: .78rem;
    }
    [data-theme="dark"] .plan-step { background: rgba(0,0,0,0.2); }
    .plan-step-num {
      width: 20px; height: 20px;
      background: var(--orange);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .67rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .plan-step-tool {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: var(--purple);
      background: rgba(175,82,222,0.1);
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .plan-step-desc { color: var(--text2); line-height: 1.4; }

    .review-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }
    .review-actions button {
      padding: 7px 16px;
      border: none;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .12s;
      font-family: inherit;
      letter-spacing: -.01em;
    }
    .review-actions button:disabled { opacity: .45; cursor: not-allowed; }
    .review-actions button:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-reject  { background: var(--red);   color: #fff; }
    .btn-replan  { background: var(--accent); color: #fff; }

    .review-status {
      margin-top: 8px;
      font-size: .78rem;
      padding: 0 10px;
      border-radius: 8px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .3s ease, opacity .2s ease, padding .25s ease, background .15s;
    }
    .review-status.visible {
      max-height: 80px;
      opacity: 1;
      padding: 7px 10px;
    }
    .review-status.processing { background: var(--accent-bg); color: var(--accent); }
    .review-status.success    { background: var(--green-bg);  color: var(--green); }
    .review-status.error      { background: var(--red-bg);    color: var(--red); }

    /* ── Markdown ─────────────────────────────────────────────────── */
    .md h1, .md h2, .md h3 {
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -.025em;
      margin: 10px 0 5px;
    }
    .md h1 { font-size: 1.08rem; }
    .md h2 { font-size: .98rem; }
    .md h3 { font-size: .9rem; }
    .md p  { margin: 5px 0; }
    .md ul, .md ol { padding-left: 18px; margin: 5px 0; }
    .md li { margin: 3px 0; line-height: 1.55; }
    .md code {
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: .78rem;
      background: var(--accent-bg);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble-user .md code { background: rgba(255,255,255,.2); color: #fff; }
    .md pre {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0;
      margin: 8px 0;
      overflow: hidden;
    }
    .bubble-user .md pre { background: rgba(0,0,0,.18); border-color: rgba(255,255,255,.15); }
    .pre-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: .68rem;
      color: var(--muted);
    }
    .bubble-user .pre-header { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.15); }
    .pre-lang { font-family: 'SF Mono', 'JetBrains Mono', monospace; text-transform: lowercase; }
    .pre-copy {
      font-size: .68rem;
      padding: 1px 7px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
    }
    .pre-copy:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(0,122,255,.3); }
    .md pre code {
      display: block;
      background: none;
      color: var(--text2);
      padding: 10px 12px;
      font-size: .78rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 0;
      overflow-x: auto;
      max-height: 300px;
    }
    .bubble-user .md pre code { color: rgba(255,255,255,.88); }
    .md strong { font-weight: 700; }
    .md em { font-style: italic; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 10px;
      color: var(--muted);
      margin: 8px 0;
      font-style: italic;
      background: var(--accent-bg);
      border-radius: 0 6px 6px 0;
    }

    /* ── Preview blocks ─────────────────────────────────────────── */
    .preview-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
      background: var(--bg2);
    }
    .preview-block .pre-header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: .68rem;
      color: var(--muted);
      gap: 6px;
    }
    .preview-tabs {
      display: flex;
      gap: 3px;
      margin-left: auto;
      margin-right: 4px;
    }
    .ptab {
      padding: 2px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .63rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .1s;
      text-transform: uppercase;
      letter-spacing: .05em;
      line-height: 1.6;
    }
    .ptab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .ptab:not(.active):hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(0,122,255,.3); }
    .ptab-panel { display: none; }
    .ptab-panel.active { display: block; }
    .ptab-diagram.active {
      padding: 18px 14px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      background: var(--surface-solid);
    }
    [data-theme="dark"] .ptab-diagram.active { background: var(--surface2); }
    .ptab-diagram .mermaid { max-width: 100%; }
    .ptab-code > pre { margin: 0 !important; border: none !important; border-radius: 0 !important; }
    .ptab-code > pre > code { max-height: 280px; }
    .ptab-preview.active {
      background: #fff;
      border-top: 1px solid var(--border);
    }
    [data-theme="dark"] .ptab-preview.active { background: var(--surface-solid); }
    .ptab-preview iframe {
      width: 100%;
      border: none;
      min-height: 160px;
      max-height: 420px;
      display: block;
    }
    .md-preview { padding: 10px 14px; color: var(--text); font-size: .875rem; }

    /* ── Typing indicator ─────────────────────────────────────────── */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding-right: 18%;
      animation: slideUp .18s ease;
    }
    .typing-bubble {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 17px;
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
      box-shadow: var(--shadow-sm);
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce .9s infinite ease-in-out;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .18s; }
    .typing-bubble span:nth-child(3) { animation-delay: .36s; }
    @keyframes typingBounce {
      0%,80%,100% { transform: scale(.75); opacity: .45; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    /* ── Input bar ────────────────────────────────────────────────── */
    .inputbar {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--border);
      padding: 10px 20px 14px;
      flex-shrink: 0;
    }
    .inputbar-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 7px;
      align-items: flex-end;
    }

    #prompt-input {
      flex: 1;
      border: 1px solid var(--border2);
      border-radius: 13px;
      padding: 10px 14px;
      font-size: .875rem;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 124px;
      line-height: 1.5;
      transition: all .15s;
      background: var(--surface-solid);
      color: var(--text);
      letter-spacing: -.01em;
    }
    #prompt-input::placeholder { color: var(--muted2); }
    #prompt-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }
    #prompt-input:disabled { opacity: .5; cursor: not-allowed; }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--user-bubble);
      color: #fff;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,122,255,.28);
    }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    .send-btn:not(:disabled):hover { transform: scale(1.04); box-shadow: 0 5px 14px rgba(0,122,255,.38); }
    .send-btn:not(:disabled):active { transform: scale(.97); }

    .new-btn {
      padding: 0 13px;
      height: 42px;
      background: var(--surface-solid);
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 11px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: -.01em;
    }
    .new-btn:hover { background: var(--border); color: var(--text); }

    /* ── Attach button ────────────────────────────────────────────── */
    .attach-btn {
      width: 42px; height: 42px;
      background: var(--surface-solid);
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 11px;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .attach-btn:hover { background: var(--border); color: var(--text); }
    .attach-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── File chip ────────────────────────────────────────────────── */
    #file-chip-wrap {
      max-width: 800px;
      margin: 0 auto 5px;
      display: none;
    }
    #file-chip-wrap.visible { display: flex; }
    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent-bg);
      border: 1px solid rgba(0,122,255,0.25);
      color: var(--accent-dark);
      border-radius: 8px;
      padding: 3px 9px 3px 7px;
      font-size: .76rem;
      font-weight: 500;
      max-width: 100%;
    }
    .file-chip svg { flex-shrink: 0; opacity: .7; }
    .file-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 240px;
    }
    .file-chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      padding: 0;
      line-height: 1;
      opacity: .6;
      transition: opacity .1s;
      flex-shrink: 0;
    }
    .file-chip-remove:hover { opacity: 1; }

    /* ── Stop button ─────────────────────────────────────────────────── */
    .stop-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,59,48,0.3);
      background: var(--red-bg);
      color: var(--red);
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      font-size: .82rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .stop-btn.visible { display: flex; }
    .stop-btn:hover { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 3px 10px rgba(255,59,48,.3); }

    /* ── Trash button ────────────────────────────────────────────────── */
    .trash-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .trash-btn:hover { background: var(--red-bg); color: var(--red); border-color: rgba(255,59,48,.3); }

    /* ── Toast notification ──────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface-solid);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: .82rem;
      padding: 8px 16px;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Review card entrance ────────────────────────────────────────── */
    @keyframes reviewEntrance {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Plan step stagger ───────────────────────────────────────────── */
    @keyframes stepSlideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .plan-step { animation: stepSlideIn .22s cubic-bezier(.16,1,.3,1) both; }

    /* ── Button spinner ──────────────────────────────────────────────── */
    .btn-spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }

    /* ── Approve flash ───────────────────────────────────────────────── */
    @keyframes approveFlash {
      0%   { box-shadow: 0 4px 16px rgba(255,149,0,0.1); border-color: rgba(255,149,0,0.3); }
      45%  { box-shadow: 0 0 0 4px rgba(52,199,89,0.28); border-color: rgba(52,199,89,0.5); }
      100% { box-shadow: 0 4px 16px rgba(52,199,89,0.06); border-color: rgba(52,199,89,0.2); }
    }
    .review-card.flash-approve {
      animation: approveFlash .55s ease forwards;
    }

    /* ── Responsiveness ──────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .api-input { display: none; }
      .msg-row.row-user  { padding-left: 8%; }
      .msg-row.row-agent { padding-right: 8%; }
      .review-card { margin-left: 0; }
      .activity-group { padding-left: 20px; }
      .review-actions { flex-wrap: wrap; }
      .review-actions button { flex: 1 1 calc(50% - 4px); min-width: 80px; }
      .inputbar { padding: 8px 12px 10px; }
      .inputbar-inner { gap: 5px; }
    }
    @media (max-width: 480px) {
      .traffic-lights { display: none; }
      .session-chip { max-width: 70px; font-size: .62rem; }
      .header { padding: 0 10px; gap: 6px; height: 48px; }
      .header-logo { width: 24px; height: 24px; font-size: .72rem; }
      .header-title { font-size: .82rem; }
      .header-subtitle { display: none; }
      .review-actions button { flex: 1 1 100%; }
      .feed-inner { padding: 0 12px; }
      #prompt-input { font-size: .82rem; }
      .new-btn { padding: 0 9px; font-size: .72rem; }
    }

    /* ── Divider ───────────────────────────────────────────────────── */
    .date-divider {
      text-align: center;
      font-size: .67rem;
      color: var(--muted2);
      padding: 4px 0;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 10%; }
    .date-divider::after { right: 10%; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="traffic-lights">
    <span class="tl tl-red"></span>
    <span class="tl tl-yellow"></span>
    <span class="tl tl-green"></span>
  </div>
  <div class="header-logo">✦</div>
  <div>
    <div class="header-title">Agent Chat</div>
    <div class="header-subtitle">LangGraph · Mistral</div>
  </div>
  <div class="header-mid">
    <div class="progress-pill" id="progress-pill">
      <div class="progress-dot"></div>
      <span id="progress-label">Processing…</span>
    </div>
  </div>
  <div class="header-right">
    <span class="session-chip" id="session-display" title="Click to copy">New session</span>
    <button class="stop-btn" id="stop-btn" onclick="stopStreaming()" title="Stop generation">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="1" y="1" width="8" height="8" rx="1.5"/></svg>
    </button>
    <button class="trash-btn" id="trash-btn" onclick="deleteSession()" title="Delete session from server">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    <input class="api-input" id="api-base" type="text" value="http://localhost:3000" placeholder="API base URL" title="API base URL">
  </div>
</div>

<!-- ── Feed ── -->
<div id="feed">
  <div id="empty-wrap">
    <div id="empty">
      <div class="empty-icon-ring">✦</div>
      <div class="empty-title">What can I help you with?</div>
      <div class="empty-sub">Ask me anything — I can search the web, read &amp; write files, run commands, explain code, and hold multi-step conversations.</div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion(this)">📂 List all TypeScript files in this project</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">🔍 Search for all TODO comments in the codebase</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">💡 What is the architecture of this project?</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">✏️ Explain how the agent graph works</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Input bar ── -->
<div class="inputbar">
  <div id="file-chip-wrap">
    <div class="file-chip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="file-chip-name" id="file-chip-name">file.txt</span>
      <button class="file-chip-remove" onclick="removeAttachment()" title="Remove file">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="inputbar-inner">
    <button class="new-btn" onclick="newSession()" title="Start fresh session">+ New</button>
    <button class="attach-btn" id="attach-btn" onclick="attachFile()" title="Attach a file">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <input type="file" id="file-input" style="display:none"
      accept=".txt,.md,.json,.ts,.js,.jsx,.tsx,.py,.rb,.go,.rs,.java,.c,.cpp,.h,.css,.html,.xml,.yaml,.yml,.toml,.csv,.sh,.env,.log"
      onchange="onFileSelect(event)">
    <textarea id="prompt-input" rows="1"
      placeholder="Message the agent…"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendPrompt()" title="Send (Enter)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────
  let sessionId = generateId();
  let streaming = false;
  const mmdSourceMap = {};
  let abortController = null;
  let hadToolCalls = false;
  let currentActivityGroup = null;
  let activityCount = 0;
  let attachedFile = null; // { name, content }

  const feed        = document.getElementById('feed');
  const emptyWrap   = document.getElementById('empty-wrap');
  const promptInput = document.getElementById('prompt-input');
  const sendBtn     = document.getElementById('send-btn');
  const attachBtn   = document.getElementById('attach-btn');
  const fileInput   = document.getElementById('file-input');
  const fileChipWrap = document.getElementById('file-chip-wrap');
  const fileChipName = document.getElementById('file-chip-name');
  const sessionDisplay = document.getElementById('session-display');
  const progressPill   = document.getElementById('progress-pill');
  const progressLabel  = document.getElementById('progress-label');

  updateSessionDisplay();

  // ── Utils ─────────────────────────────────────────────────────────
  function generateId() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  }

  function base() {
    return (document.getElementById('api-base').value || '').replace(/\/$/, '');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function ts() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function updateSessionDisplay() {
    const short = sessionId.length > 18 ? sessionId.slice(0,8)+'…'+sessionId.slice(-4) : sessionId;
    sessionDisplay.textContent = short;
    sessionDisplay.title = 'Session ID: ' + sessionId + ' (click to copy)';
  }

  sessionDisplay.addEventListener('click', () => {
    navigator.clipboard.writeText(sessionId).catch(() => {});
    const prev = sessionDisplay.textContent;
    sessionDisplay.textContent = '✓ Copied';
    setTimeout(() => { sessionDisplay.textContent = prev; }, 1400);
  });

  function hideEmpty() {
    emptyWrap.style.display = 'none';
  }

  function scrollFeed() {
    requestAnimationFrame(() => { feed.scrollTop = feed.scrollHeight; });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 124) + 'px';
  }

  // ── File attachment ────────────────────────────────────────────────
  function attachFile() {
    fileInput.value = '';
    fileInput.click();
  }

  function onFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    const MAX = 512 * 1024;
    if (file.size > MAX) {
      alert(`File too large (${(file.size/1024).toFixed(0)} KB). Max is 512 KB.`);
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      attachedFile = { name: file.name, content: ev.target.result };
      fileChipName.textContent = file.name;
      fileChipWrap.classList.add('visible');
      promptInput.placeholder = 'Add a message about this file… (optional)';
      promptInput.focus();
    };
    reader.readAsText(file);
  }

  function removeAttachment() {
    attachedFile = null;
    fileInput.value = '';
    fileChipWrap.classList.remove('visible');
    promptInput.placeholder = 'Message the agent…';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
  }

  function useSuggestion(btn) {
    promptInput.value = btn.textContent.replace(/^[^\s]+\s/, '').trim();
    promptInput.focus();
    autoResize(promptInput);
  }

  // ── Theme ─────────────────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
    if (typeof mermaid !== 'undefined') {
      const newTheme = isDark ? 'default' : 'dark';
      mermaid.initialize({ startOnLoad: false, theme: newTheme });
      document.querySelectorAll('.mermaid[data-processed]').forEach(el => {
        const src = mmdSourceMap[el.id];
        if (src) { el.removeAttribute('data-processed'); el.innerHTML = ''; el.textContent = src; }
      });
      mermaid.run({ querySelector: '.mermaid:not([data-processed])' });
    }
  }

  // ── Progress pill ─────────────────────────────────────────────────
  const PHASE_LABELS = {
    'Phase: supervisor':          'Reviewing request…',
    'Phase: research':            'Gathering context…',
    'Phase: plan':                'Building plan…',
    'Phase: validate_plan':       'Validating plan…',
    'Phase: await_plan_review':   'Waiting for review…',
    'Phase: execute':             'Executing…',
    'Phase: normalize_tool_result': 'Processing result…',
    'Phase: judge':               'Evaluating result…',
    'Phase: generate':            'Composing answer…',
    'Phase: chat':                'Thinking…',
    'Phase: fatal_recovery':      'Recovering…',
    'Phase: clarification':       'Requesting clarification…',
    'Phase: json_repair':         'Repairing output…',
  };

  function setProgress(label) {
    progressLabel.textContent = label;
    progressPill.classList.add('visible');
  }

  function clearProgress() {
    progressPill.classList.remove('visible');
  }

  // ── Markdown renderer ─────────────────────────────────────────────
  function renderMd(text) {
    const blocks = [];
    let s = String(text).replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      const langLabel = lang || 'code';
      const raw = code.replace(/\n$/, '');

      if (lang === 'mermaid') {
        const mmdId = 'mmd-' + Math.random().toString(36).slice(2, 9);
        mmdSourceMap[mmdId] = raw;
        blocks.push(
          `<div class="preview-block preview-mermaid">` +
          `<div class="pre-header"><span class="pre-lang">mermaid</span>` +
          `<div class="preview-tabs">` +
            `<button class="ptab active" onclick="switchTab(this,'diagram')">Diagram</button>` +
            `<button class="ptab" onclick="switchTab(this,'code')">Code</button>` +
          `</div>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<div class="ptab-panel ptab-diagram active"><div class="mermaid" id="${mmdId}"></div></div>` +
          `<div class="ptab-panel ptab-code"><pre><code>${esc(raw)}</code></pre></div>` +
          `</div>`
        );
      } else if (lang === 'html') {
        const srcdocAttr = raw.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        blocks.push(
          `<div class="preview-block preview-html">` +
          `<div class="pre-header"><span class="pre-lang">html</span>` +
          `<div class="preview-tabs">` +
            `<button class="ptab" onclick="switchTab(this,'code')">Code</button>` +
            `<button class="ptab active" onclick="switchTab(this,'preview')">Preview</button>` +
          `</div>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<div class="ptab-panel ptab-code"><pre><code>${esc(raw)}</code></pre></div>` +
          `<div class="ptab-panel ptab-preview active">` +
            `<iframe sandbox="allow-scripts" srcdoc="${srcdocAttr}" onload="autoIframeHeight(this)"></iframe>` +
          `</div>` +
          `</div>`
        );
      } else if (lang === 'md' || lang === 'markdown') {
        blocks.push(
          `<div class="preview-block preview-md">` +
          `<div class="pre-header"><span class="pre-lang">markdown</span>` +
          `<div class="preview-tabs">` +
            `<button class="ptab" onclick="switchTab(this,'code')">Code</button>` +
            `<button class="ptab active" onclick="switchTab(this,'preview')">Preview</button>` +
          `</div>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<div class="ptab-panel ptab-code"><pre><code>${esc(raw)}</code></pre></div>` +
          `<div class="ptab-panel ptab-preview active"><div class="md-preview">${renderMd(raw)}</div></div>` +
          `</div>`
        );
      } else {
        blocks.push(
          `<pre><div class="pre-header"><span class="pre-lang">${esc(langLabel)}</span>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<code>${esc(raw)}</code></pre>`
        );
      }
      return `\x00BLOCK${i}\x00`;
    });

    s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
    s = s.replace(/^---+$/gm, '<hr>');
    s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+] /,'').trim()}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    s = s.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'').trim()}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    s = s.split(/\n{2,}/).map(block => {
      if (/^<(h[1-6]|ul|ol|hr|pre|blockquote|\x00BLOCK)/.test(block.trimStart())) return block;
      const inner = block.replace(/\n/g, '<br>').trim();
      return inner ? `<p>${inner}</p>` : '';
    }).join('');

    blocks.forEach((b, i) => { s = s.replace(`\x00BLOCK${i}\x00`, b); });
    return `<div class="md">${s}</div>`;
  }

  function copyBlock(btn) {
    const container = btn.closest('.preview-block') || btn.closest('pre');
    const code = container.querySelector('code');
    navigator.clipboard.writeText(code ? code.textContent || '' : '').catch(() => {});
    const prev = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = prev; }, 1500);
  }

  // ── Preview helpers ───────────────────────────────────────────────
  function switchTab(btn, panelClass) {
    const block = btn.closest('.preview-block');
    block.querySelectorAll('.ptab-panel').forEach(p => p.classList.remove('active'));
    btn.closest('.preview-tabs').querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const target = block.querySelector('.ptab-' + panelClass);
    if (target) target.classList.add('active');
  }

  function autoIframeHeight(iframe) {
    try { iframe.style.height = (iframe.contentDocument.body.scrollHeight + 24) + 'px'; } catch {}
  }

  function getMermaidTheme() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
  }

  function initMermaid(container) {
    if (typeof mermaid === 'undefined') return;
    const els = Array.from(container.querySelectorAll('.mermaid'));
    if (!els.length) return;
    els.forEach(el => {
      const src = mmdSourceMap[el.id];
      if (src && !el.textContent.trim()) el.textContent = src;
    });
    mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
    mermaid.run({ nodes: els.filter(el => !el.hasAttribute('data-processed')) });
  }

  // ── Bubble builders ───────────────────────────────────────────────
  function getFeedInner() {
    let inner = feed.querySelector('.feed-inner');
    if (!inner) {
      inner = document.createElement('div');
      inner.className = 'feed-inner';
      feed.appendChild(inner);
    }
    return inner;
  }

  function addUserBubble(text) {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div');
    row.className = 'msg-row row-user';
    row.innerHTML = `
      <div class="bubble-wrap">
        <div class="bubble bubble-user"><div class="md"><p>${esc(text).replace(/\n/g,'<br>')}</p></div></div>
        <span class="bubble-time">${ts()}</span>
      </div>
      <div class="avatar avatar-user">You</div>`;
    inner.appendChild(row);
    scrollFeed();
  }

  function addAgentBubble(htmlContent, extraClass = '') {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div');
    row.className = 'msg-row row-agent';
    row.innerHTML = `
      <div class="avatar avatar-agent">✦</div>
      <div class="bubble-wrap">
        <div class="bubble bubble-agent ${extraClass}">
          ${htmlContent}
          <button class="bubble-copy" onclick="copyBubble(this)" title="Copy text">📋</button>
        </div>
        <span class="bubble-time">${ts()}</span>
      </div>`;
    inner.appendChild(row);
    initMermaid(row);
    scrollFeed();
    return row;
  }

  function addErrorBubble(htmlContent) {
    return addAgentBubble(htmlContent, 'bubble-error');
  }

  function copyBubble(btn) {
    const bubble = btn.closest('.bubble');
    const text = bubble.innerText.replace('📋', '').trim();
    navigator.clipboard.writeText(text).catch(() => {});
    const prev = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = prev; }, 1400);
  }

  // ── Activity group ────────────────────────────────────────────────
  function ensureActivityGroup() {
    if (currentActivityGroup) return;
    hideEmpty();
    const inner = getFeedInner();
    const wrap = document.createElement('div');
    wrap.className = 'activity-group';
    wrap.innerHTML = `
      <button class="activity-toggle" onclick="toggleActivity(this)">
        <div class="activity-spinner"></div>
        <span class="toggle-label">Working…</span>
        <em class="toggle-icon">▶</em>
      </button>
      <div class="activity-items"></div>`;
    inner.appendChild(wrap);
    currentActivityGroup = wrap;
    activityCount = 0;
    scrollFeed();
  }

  function addActivityItem(icon, html) {
    ensureActivityGroup();
    activityCount++;
    const items = currentActivityGroup.querySelector('.activity-items');
    const item = document.createElement('div');
    item.className = 'activity-item';
    item.innerHTML = `<span class="activity-item-icon">${icon}</span><span class="activity-item-text">${html}</span>`;
    items.appendChild(item);
    scrollFeed();
  }

  function updateActivityLabel(label) {
    // Only update label if a group already exists — don't create one just for a status label
    if (!currentActivityGroup) return;
    currentActivityGroup.querySelector('.toggle-label').textContent = label;
  }

  function finalizeActivityGroup() {
    if (currentActivityGroup) {
      if (activityCount > 0) {
        const btn = currentActivityGroup.querySelector('.activity-toggle');
        btn.classList.add('done');
        btn.querySelector('.toggle-label').textContent =
          `${activityCount} step${activityCount !== 1 ? 's' : ''} completed`;
      } else {
        // No tool calls — remove the orphaned activity group entirely
        currentActivityGroup.remove();
      }
    }
    currentActivityGroup = null;
    activityCount = 0;
  }

  function toggleActivity(btn) {
    const group = btn.closest('.activity-group');
    const items = group.querySelector('.activity-items');
    const isOpen = items.classList.contains('open');
    items.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
    scrollFeed();
  }

  // ── Typing indicator ──────────────────────────────────────────────
  function addTyping() {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="avatar avatar-agent">✦</div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    inner.appendChild(row);
    scrollFeed();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Review card ───────────────────────────────────────────────────
  function buildReviewCard(reviewData) {
    hideEmpty();
    const inner = getFeedInner();
    const { plan = [], objective = '' } = reviewData;

    const steps = plan.map(step => `
      <div class="plan-step">
        <div class="plan-step-num">${esc(String(step.step_id))}</div>
        <span class="plan-step-tool">${esc(step.tool)}</span>
        <span class="plan-step-desc">${esc(step.description)}</span>
      </div>`).join('');

    const wrap = document.createElement('div');
    wrap.className = 'review-card';
    wrap.innerHTML = `
      <div class="review-header">
        <span class="review-badge">⚠ Plan Review Required</span>
      </div>
      <div class="review-objective"><strong>Objective:</strong> ${esc(objective)}</div>
      <div class="plan-steps">${steps}</div>
      <div class="review-actions">
        <button class="btn-approve" onclick="reviewAction('approve', this)">✓ Approve &amp; Run</button>
        <button class="btn-reject"  onclick="reviewAction('reject', this)">✗ Reject</button>
        <button class="btn-replan"  onclick="reviewAction('replan', this)">↺ Replan</button>
      </div>
      <div class="review-status"></div>`;

    inner.appendChild(wrap);
    scrollFeed();
    return wrap;
  }

  async function reviewAction(action, btn) {
    const card = btn.closest('.review-card');
    const btns = card.querySelectorAll('.review-actions button');
    const statusEl = card.querySelector('.review-status');

    btns.forEach(b => b.disabled = true);
    statusEl.className = 'review-status processing';
    statusEl.textContent = 'Processing…';
    statusEl.style.display = 'block';

    try {
      const res = await fetch(
        `${base()}/api/agents/session/${encodeURIComponent(sessionId)}/${action}`,
        { method: 'POST' }
      );

      if (action === 'reject') {
        statusEl.className = 'review-status success';
        statusEl.textContent = 'Plan rejected.';
        addAgentBubble(renderMd('Plan rejected. Feel free to rephrase or try a different approach.'));
        setIdle();
        return;
      }

      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusEl.className = 'review-status error';
        statusEl.textContent = 'Error: ' + (body.message || res.statusText);
        btns.forEach(b => b.disabled = false);
        return;
      }

      statusEl.className = 'review-status success';
      statusEl.textContent = action === 'replan' ? 'Replanning…' : 'Approved — executing…';

      if (action === 'replan') {
        setTimeout(() => loadReviewAfterReplan(), 600);
      } else {
        finalizeActivityGroup();
        addAgentBubble(renderMd(body.result || 'Done.'));
        setIdle();
      }
    } catch {
      statusEl.className = 'review-status error';
      statusEl.textContent = 'Network error — please try again.';
      btns.forEach(b => b.disabled = false);
    }
  }

  async function loadReviewAfterReplan() {
    try {
      const res = await fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/review-data`);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        addErrorBubble(renderMd(body.message || 'Replan ended without a new review.'));
        setIdle();
        return;
      }
      buildReviewCard(await res.json());
    } catch {
      addErrorBubble(renderMd('Network error loading replanned review.'));
      setIdle();
    }
  }

  // ── Send & stream ─────────────────────────────────────────────────
  async function sendPrompt() {
    const rawPrompt = promptInput.value.trim();
    if (!rawPrompt && !attachedFile) return;
    if (streaming) return;

    let prompt = rawPrompt;
    let displayPrompt = rawPrompt;
    if (attachedFile) {
      const ext = attachedFile.name.split('.').pop() || 'text';
      const fileBlock = `[File: ${attachedFile.name}]\n\`\`\`${ext}\n${attachedFile.content}\n\`\`\``;
      prompt = rawPrompt ? `${fileBlock}\n\n${rawPrompt}` : fileBlock;
      displayPrompt = rawPrompt
        ? `📎 ${attachedFile.name}\n\n${rawPrompt}`
        : `📎 ${attachedFile.name}`;
    }

    streaming = true;
    hadToolCalls = false;
    currentActivityGroup = null;
    activityCount = 0;

    sendBtn.disabled = true;
    attachBtn.disabled = true;
    promptInput.disabled = true;
    promptInput.value = '';
    promptInput.style.height = 'auto';
    removeAttachment();

    addUserBubble(displayPrompt);
    addTyping();
    setProgress('Reviewing request…');

    if (abortController) { abortController.abort(); abortController = null; }
    abortController = new AbortController();

    let receivedDone = false;
    
    try {
      const response = await fetch(`${base()}/api/agents/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, sessionId }),
        signal: abortController.signal
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (line.startsWith('data: ')) {
              removeTyping();
              try {
                const event = JSON.parse(line.slice(6));
                if (event.done) receivedDone = true;
                handleStreamEvent(event);
              } catch (e) {}
            }
          }
        }
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
      removeTyping();
      clearProgress();
      if (!receivedDone && !abortController.signal.aborted) {
        finalizeActivityGroup();
        addErrorBubble(`<p>Connection error: ${esc(err.message)}</p>`);
      }
      setIdle();
    }
  }

  function handleStreamEvent(event) {
    const { type, data } = event;

    if (type === 'status') {
      const label = PHASE_LABELS[data] || data;
      setProgress(label);
      if (data && !data.startsWith('Phase:')) {
        updateActivityLabel(label);
      }

    } else if (type === 'plan') {
      try {
        const steps = JSON.parse(data);
        addActivityItem('📋',
          `Plan ready — <strong>${steps.length} step${steps.length !== 1 ? 's' : ''}</strong>`);
        setProgress('Executing plan…');
      } catch {
        addActivityItem('📋', esc(data));
      }

    } else if (type === 'tool_call_started') {
      hadToolCalls = true;
      addActivityItem('⚙️', `Running <code>${esc(data)}</code>`);
      setProgress(`Running ${data.split(' ')[0]}…`);

    } else if (type === 'tool_call_finished') {
      const preview = data.length > 140 ? data.slice(0,140) + '…' : data;
      addActivityItem('✅', esc(preview));

    } else if (type === 'review_required') {
      clearProgress();
      finalizeActivityGroup();
      try { buildReviewCard(JSON.parse(data)); } catch { addAgentBubble('<p>Plan review required.</p>'); }
      abortController && abortController.abort();
      abortController = null;
      streaming = false;
      sendBtn.disabled = false;
      attachBtn.disabled = false;
      promptInput.disabled = false;

    } else if (type === 'final') {
      clearProgress();
      finalizeActivityGroup();
      addAgentBubble(renderMd(data));
      abortController && abortController.abort();
      abortController = null;
      setIdle();

    } else if (type === 'error') {
      clearProgress();
      finalizeActivityGroup();
      if (!hadToolCalls) {
        addAgentBubble(renderMd(data));
      } else {
        addErrorBubble(renderMd(data));
      }
      abortController && abortController.abort();
      abortController = null;
      setIdle();
    }
  }

  function setIdle() {
    streaming = false;
    clearProgress();
    sendBtn.disabled = false;
    attachBtn.disabled = false;
    promptInput.disabled = false;
    promptInput.focus();
  }

  // ── New session ───────────────────────────────────────────────────
  function newSession() {
    if (abortController) { abortController.abort(); abortController = null; }
    sessionId = generateId();
    updateSessionDisplay();
    streaming = false;
    hadToolCalls = false;
    currentActivityGroup = null;
    activityCount = 0;
    clearProgress();
    sendBtn.disabled = false;
    attachBtn.disabled = false;
    promptInput.disabled = false;
    removeAttachment();

    const inner = feed.querySelector('.feed-inner');
    if (inner) inner.remove();
    emptyWrap.style.display = '';
    promptInput.focus();
  }

  // ── URL param init ────────────────────────────────────────────────
  (function init() {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('sessionId');
    const b = params.get('base');
    if (b) document.getElementById('api-base').value = b;
    if (sid) {
      sessionId = sid;
      updateSessionDisplay();
      fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/review-data`)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) buildReviewCard(data); })
        .catch(() => {});
    }
    promptInput.focus();
  })();
</script>
</body>
