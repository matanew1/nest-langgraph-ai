<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f2f2f7;
      --bg2:           #e5e5ea;
      --surface:       rgba(255,255,255,0.85);
      --surface-solid: #ffffff;
      --surface2:      rgba(242,242,247,0.92);
      --border:        rgba(0,0,0,0.08);
      --border2:       rgba(0,0,0,0.14);
      --text:          #000000;
      --text2:         #3c3c43;
      --muted:         rgba(60,60,67,0.58);
      --muted2:        rgba(60,60,67,0.32);
      --accent:        #007AFF;
      --accent-light:  #409CFF;
      --accent-dark:   #0060df;
      --accent-bg:     rgba(0,122,255,0.08);
      --accent-glow:   rgba(0,122,255,0.20);
      --green:         #34C759;
      --green-bg:      rgba(52,199,89,0.10);
      --green-glow:    rgba(52,199,89,0.20);
      --red:           #FF3B30;
      --red-bg:        rgba(255,59,48,0.10);
      --red-glow:      rgba(255,59,48,0.18);
      --orange:        #FF9500;
      --orange-bg:     rgba(255,149,0,0.09);
      --orange-glow:   rgba(255,149,0,0.20);
      --purple:        #AF52DE;
      --purple-bg:     rgba(175,82,222,0.10);
      --user-bubble:   linear-gradient(145deg,#1a8fff 0%,#0055d4 100%);
      --user-glow:     rgba(0,122,255,0.28);
      --shadow-xs:     0 1px 2px rgba(0,0,0,0.05);
      --shadow-sm:     0 2px 8px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md:     0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg:     0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
      --blur:          saturate(200%) blur(28px);
      --radius:        18px;
      --radius-sm:     10px;
      --radius-xs:     6px;
      --spring:        cubic-bezier(.16,1,.3,1);
      --ease-out:      cubic-bezier(.22,1,.36,1);
    }

    [data-theme="dark"] {
      --bg:            #080808;
      --bg2:           #141414;
      --surface:       rgba(20,20,22,0.90);
      --surface-solid: #1c1c1e;
      --surface2:      rgba(38,38,40,0.88);
      --border:        rgba(255,255,255,0.08);
      --border2:       rgba(255,255,255,0.14);
      --text:          #ffffff;
      --text2:         rgba(235,235,245,0.88);
      --muted:         rgba(235,235,245,0.55);
      --muted2:        rgba(235,235,245,0.26);
      --accent:        #0A84FF;
      --accent-light:  #409CFF;
      --accent-dark:   #007AFF;
      --accent-bg:     rgba(10,132,255,0.12);
      --accent-glow:   rgba(10,132,255,0.24);
      --green:         #30D158;
      --green-bg:      rgba(48,209,88,0.12);
      --green-glow:    rgba(48,209,88,0.22);
      --red:           #FF453A;
      --red-bg:        rgba(255,69,58,0.12);
      --red-glow:      rgba(255,69,58,0.20);
      --orange:        #FF9F0A;
      --orange-bg:     rgba(255,159,10,0.12);
      --orange-glow:   rgba(255,159,10,0.22);
      --purple:        #BF5AF2;
      --purple-bg:     rgba(191,90,242,0.12);
      --user-bubble:   linear-gradient(145deg,#0A84FF 0%,#0060df 100%);
      --user-glow:     rgba(10,132,255,0.35);
      --shadow-xs:     0 1px 2px rgba(0,0,0,0.3);
      --shadow-sm:     0 2px 8px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.25);
      --shadow-md:     0 8px 32px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
      --shadow-lg:     0 20px 60px rgba(0,0,0,0.65), 0 4px 16px rgba(0,0,0,0.3);
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background .25s, color .25s;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Background ambience */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(0,122,255,0.05)   0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%,  rgba(175,82,222,0.04)  0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      transition: opacity .3s;
    }
    [data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(10,132,255,0.07)  0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%,  rgba(191,90,242,0.06)  0%, transparent 60%);
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--accent-glow) 40%, var(--accent-glow) 60%, transparent 100%);
      opacity: 0;
      transition: opacity .4s;
    }
    body.streaming .header::after { opacity: 1; }

    /* macOS traffic lights */
    .traffic-lights { display: flex; align-items: center; gap: 7px; margin-right: 4px; flex-shrink: 0; }
    .tl { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .tl-red    { background: #FF5F57; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
    .tl-yellow { background: #FEBC2E; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
    .tl-green  { background: #28C840; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }

    .header-logo {
      width: 30px; height: 30px;
      background: var(--user-bubble);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: .82rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 3px 10px var(--user-glow);
      transition: box-shadow .2s;
    }
    .header-logo:hover { box-shadow: 0 5px 16px var(--user-glow); }

    .header-title    { font-size: .9rem; font-weight: 600; color: var(--text); letter-spacing: -.015em; }
    .header-subtitle { font-size: .68rem; color: var(--muted); margin-top: 1px; letter-spacing: -.01em; }

    .header-mid { flex: 1; display: flex; justify-content: center; }

    /* Progress indicator */
    .progress-pill {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--accent-bg);
      border: 1px solid rgba(0,122,255,0.20);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: .72rem;
      font-weight: 500;
      color: var(--accent);
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .progress-pill.visible { display: flex; animation: fadeIn .2s var(--ease-out); }
    .progress-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.5s infinite ease-in-out;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.75)} 50%{opacity:1;transform:scale(1)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-2px)} to{opacity:1;transform:none} }

    .header-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }

    .session-chip {
      font-size: .67rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--muted);
      font-family: 'SF Mono','JetBrains Mono','Fira Code',monospace;
      cursor: pointer;
      user-select: all;
      transition: all .15s;
      white-space: nowrap;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-chip:hover { background: var(--border2); color: var(--text); }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); transform: scale(1.04); }

    .api-input {
      font-size: .72rem;
      font-family: 'SF Mono','JetBrains Mono',monospace;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--muted);
      background: var(--surface2);
      outline: none;
      width: 180px;
      transition: all .15s;
    }
    .api-input:focus {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface-solid);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    /* ── Feed ───────────────────────────────────────────────────────── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
      position: relative;
      z-index: 1;
    }
    #feed::-webkit-scrollbar { width: 5px; }
    #feed::-webkit-scrollbar-track { background: transparent; }
    #feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    #feed::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

    .feed-inner {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ── Empty state ────────────────────────────────────────────────── */
    #empty-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 24px 90px;
      max-width: 460px;
      text-align: center;
    }
    .empty-icon-ring {
      width: 64px; height: 64px;
      background: var(--user-bubble);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem;
      box-shadow: 0 12px 32px var(--user-glow);
      animation: floatIcon 4s ease-in-out infinite;
      position: relative;
    }
    .empty-icon-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 26px;
      background: var(--user-bubble);
      opacity: .12;
      animation: ringPulse 4s ease-in-out infinite;
    }
    .empty-icon-ring::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 32px;
      background: var(--user-bubble);
      opacity: .06;
      animation: ringPulse 4s ease-in-out infinite .4s;
    }
    @keyframes floatIcon {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes ringPulse {
      0%,100% { transform: scale(1);    opacity: .12; }
      50%      { transform: scale(1.08); opacity: .06; }
    }
    .empty-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.03em;
    }
    .empty-sub {
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.65;
      letter-spacing: -.01em;
    }
    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 100%;
      margin-top: 6px;
    }
    .suggestion-btn {
      padding: 10px 15px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 11px;
      font-size: .83rem;
      color: var(--text2);
      cursor: pointer;
      text-align: left;
      transition: all .18s var(--spring);
      font-family: inherit;
      line-height: 1.4;
      box-shadow: var(--shadow-xs);
    }
    .suggestion-btn:hover {
      background: var(--accent-bg);
      border-color: rgba(0,122,255,0.25);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .suggestion-btn:active { transform: translateY(0); }

    /* ── Message rows ─────────────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn .22s var(--spring) both;
    }
    .msg-row.row-user  { flex-direction: row-reverse; padding-left: 16%; }
    .msg-row.row-agent { flex-direction: row; padding-right: 16%; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Avatar ────────────────────────────────────────────────────── */
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .avatar-user {
      background: var(--user-bubble);
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      box-shadow: 0 2px 8px var(--user-glow);
    }
    .avatar-agent {
      background: var(--surface-solid);
      border: 1px solid var(--border2);
      color: var(--muted);
      box-shadow: var(--shadow-xs);
    }

    /* ── Bubble ────────────────────────────────────────────────────── */
    .bubble-wrap { display: flex; flex-direction: column; gap: 3px; min-width: 0; max-width: 100%; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: .875rem;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
      letter-spacing: -.01em;
    }

    .bubble-user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px var(--user-glow);
    }

    .bubble-agent {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .bubble-error {
      background: var(--red-bg) !important;
      border-color: rgba(255,59,48,0.25) !important;
      color: var(--red) !important;
      box-shadow: 0 4px 16px var(--red-glow) !important;
    }

    /* Copy button */
    .bubble-copy {
      position: absolute;
      top: 7px; right: 7px;
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      font-size: .65rem;
      transition: all .12s;
    }
    .bubble-agent:hover .bubble-copy { display: flex; }
    .bubble-copy:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(0,122,255,0.3); }

    .bubble-time {
      font-size: .62rem;
      color: var(--muted2);
      padding: 0 4px;
      align-self: flex-end;
      letter-spacing: -.01em;
    }

    /* ── Activity group ─────────────────────────────────────────────── */
    .activity-group {
      padding-left: 36px;
      animation: msgIn .2s var(--spring);
    }

    .activity-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: .73rem;
      color: var(--muted);
      cursor: pointer;
      padding: 5px 11px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      transition: all .18s var(--spring);
      user-select: none;
      font-family: inherit;
      box-shadow: var(--shadow-xs);
      letter-spacing: -.01em;
    }
    .activity-toggle:hover { border-color: rgba(0,122,255,0.22); color: var(--accent); }
    .toggle-icon { transition: transform .22s var(--spring); font-style: normal; font-size: .58rem; }
    .activity-toggle.open .toggle-icon { transform: rotate(90deg); }

    .activity-spinner {
      width: 11px; height: 11px;
      border: 1.5px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .activity-toggle.done .activity-spinner,
    .activity-toggle.stopped .activity-spinner { display: none; }

    .activity-toggle.done {
      border-color: rgba(52,199,89,0.30);
      color: var(--green);
      background: var(--green-bg);
    }
    .activity-toggle.done:hover { opacity: .85; }
    .activity-toggle.stopped {
      border-color: rgba(255,149,0,0.30);
      color: var(--orange);
      background: var(--orange-bg);
    }
    .activity-toggle.stopped:hover { opacity: .85; }

    .activity-items {
      display: none;
      margin-top: 6px;
      border-left: 2px solid var(--border2);
      padding-left: 12px;
      flex-direction: column;
      gap: 5px;
    }
    .activity-items.open { display: flex; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: .76rem;
      color: var(--muted);
      padding: 2px 0;
      line-height: 1.5;
      animation: itemIn .18s var(--spring) both;
    }
    @keyframes itemIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: none; }
    }
    .activity-item-icon { flex-shrink: 0; margin-top: 1px; font-size: .72rem; }
    .activity-item-text { word-break: break-word; min-width: 0; }
    .activity-item-text code {
      font-family: 'SF Mono','JetBrains Mono',monospace;
      font-size: .72rem;
      background: var(--accent-bg);
      border: 1px solid rgba(0,122,255,0.15);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent);
    }

    /* ── Review card ────────────────────────────────────────────────── */
    .review-card {
      background: var(--surface-solid);
      border: 1px solid rgba(255,149,0,0.22);
      border-radius: 16px;
      padding: 0;
      margin-left: 36px;
      animation: reviewIn .3s var(--spring);
      box-shadow: 0 8px 32px var(--orange-glow), 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    @keyframes reviewIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    .review-card-accent {
      height: 3px;
      background: linear-gradient(90deg, var(--orange) 0%, var(--purple) 50%, var(--accent) 100%);
    }

    .review-card-body { padding: 16px 18px; }

    .review-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .review-badge {
      font-size: .67rem;
      font-weight: 700;
      background: var(--orange-bg);
      color: var(--orange);
      border: 1px solid rgba(255,149,0,0.20);
      border-radius: 8px;
      padding: 2px 9px;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .review-objective {
      font-size: .83rem;
      color: var(--text2);
      margin-bottom: 13px;
      padding: 9px 12px;
      background: var(--bg2);
      border-radius: 9px;
      border: 1px solid var(--border);
      line-height: 1.55;
    }
    [data-theme="dark"] .review-objective { background: rgba(255,255,255,0.04); }

    .plan-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .plan-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 11px;
      background: var(--bg2);
      border-radius: 9px;
      border: 1px solid var(--border);
      font-size: .79rem;
      animation: stepIn .22s var(--spring) both;
    }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: none; }
    }
    [data-theme="dark"] .plan-step { background: rgba(255,255,255,0.04); }
    .plan-step-num {
      width: 21px; height: 21px;
      background: var(--orange);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .66rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 2px 6px var(--orange-glow);
    }
    .plan-step-tool {
      font-family: 'SF Mono','JetBrains Mono',monospace;
      font-size: .69rem;
      color: var(--purple);
      background: var(--purple-bg);
      border: 1px solid rgba(175,82,222,0.18);
      padding: 1px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .plan-step-desc { color: var(--text2); line-height: 1.45; }

    .review-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .review-actions button {
      padding: 8px 18px;
      border: none;
      border-radius: 9px;
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s var(--spring);
      font-family: inherit;
      letter-spacing: -.01em;
    }
    .review-actions button:disabled { opacity: .4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .review-actions button:not(:disabled):hover { transform: translateY(-2px); }
    .review-actions button:not(:disabled):active { transform: translateY(0); }
    .btn-approve { background: var(--green); color: #fff; box-shadow: 0 4px 12px var(--green-glow); }
    .btn-approve:not(:disabled):hover { box-shadow: 0 6px 18px var(--green-glow) !important; }
    .btn-reject  { background: var(--red);   color: #fff; box-shadow: 0 4px 12px var(--red-glow); }
    .btn-reject:not(:disabled):hover  { box-shadow: 0 6px 18px var(--red-glow) !important; }
    .btn-replan  { background: var(--accent); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
    .btn-replan:not(:disabled):hover  { box-shadow: 0 6px 18px var(--accent-glow) !important; }

    .review-status {
      margin-top: 10px;
      font-size: .79rem;
      font-weight: 500;
      padding: 0 12px;
      border-radius: 9px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .3s var(--ease-out), opacity .22s ease, padding .25s var(--ease-out);
    }
    .review-status.visible      { max-height: 60px; opacity: 1; padding: 8px 12px; }
    .review-status.processing   { background: var(--accent-bg);  color: var(--accent); }
    .review-status.success      { background: var(--green-bg);   color: var(--green); }
    .review-status.error        { background: var(--red-bg);     color: var(--red); }

    /* ── Markdown ──────────────────────────────────────────────────── */
    .md h1,.md h2,.md h3 { font-weight: 700; line-height: 1.3; letter-spacing: -.025em; margin: 10px 0 5px; }
    .md h1 { font-size: 1.08rem; }
    .md h2 { font-size: .98rem; }
    .md h3 { font-size: .9rem; }
    .md p  { margin: 5px 0; }
    .md ul,.md ol { padding-left: 18px; margin: 5px 0; }
    .md li { margin: 3px 0; line-height: 1.55; }
    .md code {
      font-family: 'SF Mono','JetBrains Mono','Fira Code',monospace;
      font-size: .78rem;
      background: var(--accent-bg);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble-user .md code { background: rgba(255,255,255,.18); color: #fff; }
    .md pre {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0;
      margin: 8px 0;
      overflow: hidden;
    }
    .bubble-user .md pre { background: rgba(0,0,0,.2); border-color: rgba(255,255,255,.15); }
    .pre-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 11px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: .68rem;
      color: var(--muted);
    }
    .bubble-user .pre-header { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.15); }
    .pre-lang { font-family: 'SF Mono','JetBrains Mono',monospace; text-transform: lowercase; }
    .pre-copy {
      font-size: .67rem;
      padding: 2px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
    }
    .pre-copy:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(0,122,255,.25); }
    .md pre code {
      display: block;
      background: none;
      color: var(--text2);
      padding: 10px 13px;
      font-size: .78rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 0;
      overflow-x: auto;
      max-height: 320px;
    }
    .bubble-user .md pre code { color: rgba(255,255,255,.88); }
    .md strong { font-weight: 700; }
    .md em { font-style: italic; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 11px;
      color: var(--muted);
      margin: 8px 0;
      font-style: italic;
      background: var(--accent-bg);
      border-radius: 0 7px 7px 0;
    }

    /* ── Preview blocks ───────────────────────────────────────────── */
    .preview-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
      background: var(--bg2);
    }
    .preview-block .pre-header {
      display: flex; align-items: center;
      padding: 6px 11px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: .68rem; color: var(--muted); gap: 6px;
    }
    .preview-tabs { display: flex; gap: 3px; margin-left: auto; margin-right: 4px; }
    .ptab {
      padding: 2px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .63rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all .12s;
      text-transform: uppercase; letter-spacing: .05em; line-height: 1.6;
    }
    .ptab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .ptab:not(.active):hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(0,122,255,.25); }
    .ptab-panel { display: none; }
    .ptab-panel.active { display: block; }
    .ptab-diagram.active { padding: 18px 14px; display: flex; justify-content: center; overflow-x: auto; background: var(--surface-solid); }
    [data-theme="dark"] .ptab-diagram.active { background: var(--surface2); }
    .ptab-diagram .mermaid { max-width: 100%; }
    .ptab-code > pre { margin: 0 !important; border: none !important; border-radius: 0 !important; }
    .ptab-code > pre > code { max-height: 280px; }
    .ptab-preview.active { background: #fff; border-top: 1px solid var(--border); }
    [data-theme="dark"] .ptab-preview.active { background: var(--surface-solid); }
    .ptab-preview iframe { width: 100%; border: none; min-height: 160px; max-height: 420px; display: block; }
    .md-preview { padding: 10px 14px; color: var(--text); font-size: .875rem; }

    /* ── Typing indicator ──────────────────────────────────────────── */
    .typing-row {
      display: flex; align-items: flex-end; gap: 8px;
      padding-right: 16%;
      animation: msgIn .18s var(--spring);
    }
    .typing-bubble {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 12px 15px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: var(--shadow-sm);
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce .9s infinite ease-in-out;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .18s; }
    .typing-bubble span:nth-child(3) { animation-delay: .36s; }
    @keyframes typingBounce {
      0%,80%,100% { transform: scale(.72); opacity: .4; }
      40%         { transform: scale(1.1); opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────────── */
    .inputbar {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--border);
      padding: 10px 20px 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .inputbar-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 7px;
      align-items: flex-end;
    }

    #prompt-input {
      flex: 1;
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: .875rem;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 130px;
      line-height: 1.55;
      transition: border-color .18s, box-shadow .18s;
      background: var(--surface-solid);
      color: var(--text);
      letter-spacing: -.01em;
    }
    #prompt-input::placeholder { color: var(--muted2); }
    #prompt-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg), 0 4px 16px rgba(0,122,255,.10);
    }
    #prompt-input:disabled { opacity: .45; cursor: not-allowed; }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--user-bubble);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all .18s var(--spring);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px var(--user-glow);
    }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
    .send-btn:not(:disabled):hover { transform: scale(1.06); box-shadow: 0 6px 20px var(--user-glow); }
    .send-btn:not(:disabled):active { transform: scale(.96); }

    .new-btn {
      padding: 0 14px;
      height: 44px;
      background: var(--surface-solid);
      color: var(--muted);
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: -.01em;
    }
    .new-btn:hover { background: var(--border); color: var(--text); }

    /* ── Attach button ─────────────────────────────────────────────── */
    .attach-btn {
      width: 44px; height: 44px;
      background: var(--surface-solid);
      color: var(--muted);
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .attach-btn:hover { background: var(--border); color: var(--text); }
    .attach-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── File chip ─────────────────────────────────────────────────── */
    #file-chip-wrap {
      max-width: 820px;
      margin: 0 auto 6px;
      display: none;
    }
    #file-chip-wrap.visible { display: flex; }
    .file-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent-bg);
      border: 1px solid rgba(0,122,255,0.22);
      color: var(--accent-dark);
      border-radius: 9px;
      padding: 3px 10px 3px 8px;
      font-size: .76rem; font-weight: 500;
      max-width: 100%;
    }
    .file-chip svg { flex-shrink: 0; opacity: .7; }
    .file-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
    .file-chip-remove {
      background: none; border: none; cursor: pointer;
      color: var(--accent); padding: 0; line-height: 1;
      opacity: .6; transition: opacity .1s; flex-shrink: 0;
    }
    .file-chip-remove:hover { opacity: 1; }

    /* ── Stop button ───────────────────────────────────────────────── */
    .stop-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,59,48,0.28);
      background: var(--red-bg);
      color: var(--red);
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      font-size: .8rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .stop-btn.visible { display: flex; animation: fadeIn .18s var(--spring); }
    .stop-btn:hover { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 4px 14px var(--red-glow); }

    /* ── Trash button ──────────────────────────────────────────────── */
    .trash-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .trash-btn:hover { background: var(--red-bg); color: var(--red); border-color: rgba(255,59,48,.25); }

    /* ── Toast ─────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--surface-solid);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: .82rem;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 22px;
      box-shadow: var(--shadow-md);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s, transform .22s var(--spring);
      white-space: nowrap;
      z-index: 100;
      letter-spacing: -.01em;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Approve flash ─────────────────────────────────────────────── */
    @keyframes approveFlash {
      0%   { box-shadow: 0 8px 32px var(--orange-glow); border-color: rgba(255,149,0,0.22); }
      45%  { box-shadow: 0 0 0 6px var(--green-glow);   border-color: rgba(52,199,89,0.45); }
      100% { box-shadow: 0 4px 16px var(--green-glow);  border-color: rgba(52,199,89,0.20); }
    }
    .review-card.flash-approve { animation: approveFlash .6s var(--ease-out) forwards; }

    /* ── Button spinner ────────────────────────────────────────────── */
    .btn-spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }

    /* ── Divider ───────────────────────────────────────────────────── */
    .date-divider {
      text-align: center;
      font-size: .66rem;
      color: var(--muted2);
      padding: 4px 0;
      position: relative;
    }
    .date-divider::before,.date-divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 30%; height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 10%; }
    .date-divider::after  { right: 10%; }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .api-input { display: none; }
      .api-input.visible {
        display: block; position: absolute; top: 58px; right: 16px;
        z-index: 50; width: 200px;
        box-shadow: var(--shadow-md); animation: fadeIn .2s;
      }
      .msg-row.row-user  { padding-left: 6%; }
      .msg-row.row-agent { padding-right: 6%; }
      .review-card { margin-left: 0; }
      .activity-group { padding-left: 20px; }
      .review-actions { flex-wrap: wrap; }
      .review-actions button { flex: 1 1 calc(50% - 4px); min-width: 80px; }
      .inputbar { padding: 8px 14px 12px; }
      .inputbar-inner { gap: 6px; }
      .feed-inner { padding: 0 16px; }
    }
    @media (max-width: 480px) {
      .traffic-lights { display: none; }
      .session-chip { max-width: 70px; font-size: .61rem; }
      .header { padding: 0 10px; gap: 6px; height: 50px; }
      .header-logo { width: 26px; height: 26px; font-size: .74rem; }
      .header-title { font-size: .84rem; }
      .header-subtitle { display: none; }
      .review-actions button { flex: 1 1 100%; }
      .feed-inner { padding: 0 12px; }
      #prompt-input { font-size: .84rem; }
      .new-btn { padding: 0 10px; font-size: .74rem; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="traffic-lights">
    <span class="tl tl-red"></span>
    <span class="tl tl-yellow"></span>
    <span class="tl tl-green"></span>
  </div>
  <div class="header-logo">✦</div>
  <div>
    <div class="header-title">Agent Chat</div>
    <div class="header-subtitle">LangGraph · Mistral</div>
  </div>
  <div class="header-mid">
    <div class="progress-pill" id="progress-pill">
      <div class="progress-dot"></div>
      <span id="progress-label">Processing…</span>
    </div>
  </div>
  <div class="header-right">
    <span class="session-chip" id="session-display" title="Click to copy">New session</span>
    <button class="stop-btn" id="stop-btn" onclick="stopStreaming()" title="Stop generation (Esc)">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="1" y="1" width="8" height="8" rx="1.5"/></svg>
    </button>
    <button class="trash-btn" id="trash-btn" onclick="deleteSession()" title="Delete session memory">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    <input class="api-input" id="api-base" type="text" value="http://localhost:3000" placeholder="API base URL" title="API base URL">
  </div>
</div>

<!-- ── Feed ── -->
<div id="feed">
  <div id="empty-wrap">
    <div id="empty">
      <div class="empty-icon-ring">✦</div>
      <div class="empty-title">What can I help you with?</div>
      <div class="empty-sub">Ask me anything — I can search the web, read &amp; write files, run commands, explain code, and hold multi-step conversations.</div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion(this)">📂 List all TypeScript files in this project</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">🔍 Search for all TODO comments in the codebase</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">💡 What is the architecture of this project?</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">✏️ Explain how the agent graph works</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Input bar ── -->
<div class="inputbar">
  <div id="file-chip-wrap">
    <div class="file-chip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="file-chip-name" id="file-chip-name">file.txt</span>
      <button class="file-chip-remove" onclick="removeAttachment()" title="Remove file">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="inputbar-inner">
    <button class="new-btn" onclick="newSession()" title="Start fresh session">+ New</button>
    <button class="attach-btn" id="attach-btn" onclick="attachFile()" title="Attach a file">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <input type="file" id="file-input" style="display:none"
      accept=".txt,.md,.json,.ts,.js,.jsx,.tsx,.py,.rb,.go,.rs,.java,.c,.cpp,.h,.css,.html,.xml,.yaml,.yml,.toml,.csv,.sh,.env,.log"
      onchange="onFileSelect(event)">
    <textarea id="prompt-input" rows="1"
      placeholder="Message the agent…"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendPrompt()" title="Send (Enter)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── State ───────────────────────────────────────────────────────────
  let sessionId = generateId();
  let streaming = false;
  const mmdSourceMap = {};
  let abortController = null;
  let hadToolCalls = false;
  let currentActivityGroup = null;
  let activityCount = 0;
  let attachedFile = null; // { name, content }

  const feed           = document.getElementById('feed');
  const emptyWrap      = document.getElementById('empty-wrap');
  const promptInput    = document.getElementById('prompt-input');
  const sendBtn        = document.getElementById('send-btn');
  const attachBtn      = document.getElementById('attach-btn');
  const fileInput      = document.getElementById('file-input');
  const fileChipWrap   = document.getElementById('file-chip-wrap');
  const fileChipName   = document.getElementById('file-chip-name');
  const sessionDisplay = document.getElementById('session-display');
  const progressPill   = document.getElementById('progress-pill');
  const progressLabel  = document.getElementById('progress-label');

  updateSessionDisplay();

  // ── Keyboard shortcuts ─────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && streaming) {
      e.preventDefault();
      stopStreaming();
    }
  });

  // ── Header touch event ─────────────────────────────────────────────
  const header = document.querySelector('.header');
  let headerPressTimer;
  header.addEventListener('touchstart', (e) => {
    if (e.target.closest('button') || e.target.closest('input')) return;
    headerPressTimer = setTimeout(() => document.getElementById('api-base').classList.toggle('visible'), 600);
  });
  header.addEventListener('touchend', () => clearTimeout(headerPressTimer));

  // ── Utils ───────────────────────────────────────────────────────────
  function generateId() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  }

  function base() {
    return (document.getElementById('api-base').value || '').replace(/\/$/, '');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function ts() {

  function updateSessionDisplay() {
    const short = sessionId.length > 18 ? sessionId.slice(0,8)+'…'+sessionId.slice(-4) : sessionId;

    t.textContent = msg;
    t.classList.add('visible');

  sessionDisplay.addEventListener('click', () => {

  // ── File attachment ─────────────────────────────────────────────────
  function attachFile() { fileInput.value = ''; fileInput.click(); }

  function onFileSelect(e) {
    const file = e.target.files[0];

    const MAX = 512 * 1024;
    if (file.size > MAX) {
      alert(`File too large (${(file.size/1024).toFixed(0)} KB). Max is 512 KB.`);
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      attachedFile = { name: file.name, content: ev.target.result };
      fileChipName.textContent = file.name;
      fileChipWrap.classList.add('visible');
      promptInput.placeholder = 'Add a message about this file… (optional)';
      promptInput.focus();
    };
    reader.readAsText(file);

  function removeAttachment() {

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }

  function useSuggestion(btn) {
    promptInput.value = btn.textContent.replace(/^[^\s]+\s/, '').trim();

  // ── Theme ───────────────────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';

      document.querySelectorAll('.mermaid[data-processed]').forEach(el => {

  // ── Markdown renderer ───────────────────────────────────────────────
  function renderMd(text) {
    const blocks = [];
    let s = String(text).replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      const langLabel = lang || 'code';
      const raw = code.replace(/\n$/, '');

      if (lang === 'mermaid') {
        const mmdId = 'mmd-' + Math.random().toString(36).slice(2, 9);
        mmdSourceMap[mmdId] = raw;
        blocks.push(
          `<div class="preview-block preview-mermaid">` +
          `<div class="pre-header"><span class="pre-lang">mermaid</span>` +
          `<div class="preview-tabs">` +
            `<button class="ptab active" onclick="switchTab(this,'diagram')">Diagram</button>` +
            `<button class="ptab" onclick="switchTab(this,'code')">Code</button>` +
          `</div>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<div class="ptab-panel ptab-diagram active"><div class="mermaid" id="${mmdId}"></div></div>` +
          `<div class="ptab-panel ptab-code"><pre><code>${esc(raw)}</code></pre></div>` +
          `</div>`
        );
      } else if (lang === 'html') {
        const srcdocAttr = raw.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        blocks.push(
          `<div class="preview-block preview-html">` +
          `<div class="pre-header"><span class="pre-lang">html</span>` +
          `<div class="preview-tabs">` +
            `<button class="ptab" onclick="switchTab(this,'code')">Code</button>` +
            `<button class="ptab active" onclick="switchTab(this,'preview')">Preview</button>` +
          `</div>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<div class="ptab-panel ptab-code"><pre><code>${esc(raw)}</code></pre></div>` +
          `<div class="ptab-panel ptab-preview active">` +
            `<iframe sandbox="allow-scripts" srcdoc="${srcdocAttr}" onload="autoIframeHeight(this)"></iframe>` +
          `</div>` +
          `</div>`
        );
      } else if (lang === 'md' || lang === 'markdown') {
        blocks.push(
          `<div class="preview-block preview-md">` +
          `<div class="pre-header"><span class="pre-lang">markdown</span>` +
          `<div class="preview-tabs">` +
            `<button class="ptab" onclick="switchTab(this,'code')">Code</button>` +
            `<button class="ptab active" onclick="switchTab(this,'preview')">Preview</button>` +
          `</div>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<div class="ptab-panel ptab-code"><pre><code>${esc(raw)}</code></pre></div>` +
          `<div class="ptab-panel ptab-preview active"><div class="md-preview">${renderMd(raw)}</div></div>` +
          `</div>`
        );
      } else {
        blocks.push(
          `<pre><div class="pre-header"><span class="pre-lang">${esc(langLabel)}</span>` +
          `<button class="pre-copy" onclick="copyBlock(this)">Copy</button></div>` +
          `<code>${esc(raw)}</code></pre>`
        );
      }
      return `\x00BLOCK${i}\x00`;
    });

    s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
    s = s.replace(/^---+$/gm, '<hr>');
    s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+] /,'').trim()}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    s = s.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'').trim()}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    s = s.split(/\n{2,}/).map(block => {
      if (/^<(h[1-6]|ul|ol|hr|pre|blockquote|\x00BLOCK)/.test(block.trimStart())) return block;
      const inner = block.replace(/\n/g, '<br>').trim();
      return inner ? `<p>${inner}</p>` : '';
    }).join('');

    blocks.forEach((b, i) => { s = s.replace(`\x00BLOCK${i}\x00`, b); });
    return `<div class="md">${s}</div>`;
  }

  function copyBlock(btn) {
    const container = btn.closest('.preview-block') || btn.closest('pre');
    const code = container.querySelector('code');
    navigator.clipboard.writeText(code ? code.textContent || '' : '').catch(() => {});
    const prev = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = prev; }, 1400);
  }

  // ── Preview helpers ─────────────────────────────────────────────────
  function switchTab(btn, panelClass) {
    const block = btn.closest('.preview-block');
    block.querySelectorAll('.ptab-panel').forEach(p => p.classList.remove('active'));
    btn.closest('.preview-tabs').querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const target = block.querySelector('.ptab-' + panelClass);
    if (target) target.classList.add('active');
  }

  function autoIframeHeight(iframe) {
    try { iframe.style.height = (iframe.contentDocument.body.scrollHeight + 24) + 'px'; } catch {}
  }

  function getMermaidTheme() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
  }

  function initMermaid(container) {
    if (typeof mermaid === 'undefined') return;
    const els = Array.from(container.querySelectorAll('.mermaid'));
    if (!els.length) return;
    els.forEach(el => {
      const src = mmdSourceMap[el.id];
      if (src && !el.textContent.trim()) el.textContent = src;
    });
    mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
    mermaid.run({ nodes: els.filter(el => !el.hasAttribute('data-processed')) });
  }

  // ── Bubble builders ─────────────────────────────────────────────────
  function getFeedInner() {
    let inner = feed.querySelector('.feed-inner');
    if (!inner) {
      inner = document.createElement('div');
      inner.className = 'feed-inner';
      feed.appendChild(inner);
    }
    return inner;
  }

  function addUserBubble(text) {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div');
    row.className = 'msg-row row-user';
    row.innerHTML = `
      <div class="bubble-wrap">
        <div class="bubble bubble-user"><div class="md"><p>${esc(text).replace(/\n/g,'<br>')}</p></div></div>
        <span class="bubble-time">${ts()}</span>
      </div>
      <div class="avatar avatar-user">You</div>`;
    inner.appendChild(row);
    scrollFeed();
  }

  function addAgentBubble(htmlContent, extraClass = '') {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div');
    row.className = 'msg-row row-agent';
    row.innerHTML = `
      <div class="avatar avatar-agent">✦</div>
      <div class="bubble-wrap">
        <div class="bubble bubble-agent ${extraClass}">
          ${htmlContent}
          <button class="bubble-copy" onclick="copyBubble(this)" title="Copy text">📋</button>
        </div>
        <span class="bubble-time">${ts()}</span>
      </div>`;
    inner.appendChild(row);
    initMermaid(row);
    scrollFeed();
    return row;

  function addErrorBubble(htmlContent) {
    return addAgentBubble(htmlContent, 'bubble-error');
  }

  function copyBubble(btn) {
    const bubble = btn.closest('.bubble');
    const text = bubble.innerText.replace('📋', '').trim();
    navigator.clipboard.writeText(text).catch(() => {});
    const prev = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = prev; }, 1400);
  }

  // ── Activity group ──────────────────────────────────────────────────
  function ensureActivityGroup() {
    if (currentActivityGroup) return;
    hideEmpty();
    const inner = getFeedInner();
    const wrap = document.createElement('div');
    wrap.className = 'activity-group';
    wrap.innerHTML = `
      <button class="activity-toggle" onclick="toggleActivity(this)">
        <div class="activity-spinner"></div>
        <span class="toggle-label">Working…</span>
        <em class="toggle-icon">▶</em>
      </button>
      <div class="activity-items"></div>`;
    inner.appendChild(wrap);
    currentActivityGroup = wrap;
    activityCount = 0;
    scrollFeed();
  }

  function addActivityItem(icon, html) {
    ensureActivityGroup();
    activityCount++;
    const items = currentActivityGroup.querySelector('.activity-items');
    const item = document.createElement('div');
    item.className = 'activity-item';
    item.style.animationDelay = `${Math.min(activityCount * 40, 200)}ms`;
    item.innerHTML = `<span class="activity-item-icon">${icon}</span><span class="activity-item-text">${html}</span>`;
    items.appendChild(item);
    scrollFeed();
  }

  function updateActivityLabel(label) {
    if (!currentActivityGroup) return;
    currentActivityGroup.querySelector('.toggle-label').textContent = label;
  }

  function finalizeActivityGroup(stopped = false) {
    if (currentActivityGroup) {
      const btn = currentActivityGroup.querySelector('.activity-toggle');
      if (stopped) {
        btn.classList.add('stopped');
        btn.querySelector('.toggle-label').textContent = 'Stopped';
      } else if (activityCount > 0) {
        btn.classList.add('done');
        btn.querySelector('.toggle-label').textContent =
          `${activityCount} step${activityCount !== 1 ? 's' : ''} completed`;
      } else {
        currentActivityGroup.remove();
      }
    }
    currentActivityGroup = null;
    activityCount = 0;
  }

  function toggleActivity(btn) {
    const group = btn.closest('.activity-group');
    const items = group.querySelector('.activity-items');
    const isOpen = items.classList.contains('open');
    items.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
    scrollFeed();
  }

  // ── Typing indicator ────────────────────────────────────────────────
  function addTyping() {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="avatar avatar-agent">✦</div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    inner.appendChild(row);

  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Review card ─────────────────────────────────────────────────────
  function buildReviewCard(reviewData) {
    hideEmpty();
    const inner = getFeedInner();
    const { plan = [], objective = '' } = reviewData;

    const steps = plan.map((step, i) => `
      <div class="plan-step" style="animation-delay:${i * 50}ms">
        <div class="plan-step-num">${esc(String(step.step_id))}</div>
        <span class="plan-step-tool">${esc(step.tool)}</span>
        <span class="plan-step-desc">${esc(step.description)}</span>
      </div>`).join('');

    const wrap = document.createElement('div');
    wrap.className = 'review-card';
    wrap.innerHTML = `
      <div class="review-card-accent"></div>
      <div class="review-card-body">
        <div class="review-header">
          <span class="review-badge">⚠ Plan Review Required</span>
        </div>
        <div class="review-objective"><strong>Objective:</strong> ${esc(objective)}</div>
        <div class="plan-steps">${steps}</div>
        <div class="review-actions">
          <button class="btn-approve" onclick="reviewAction('approve',this)">✓ Approve &amp; Run</button>
          <button class="btn-reject"  onclick="reviewAction('reject',this)">✗ Reject</button>
          <button class="btn-replan"  onclick="reviewAction('replan',this)">↺ Replan</button>
        </div>
        <div class="review-status"></div>
      </div>`;

    inner.appendChild(wrap);
    scrollFeed();
    return wrap;
  }

  async function reviewAction(action, btn) {
    const card = btn.closest('.review-card');
    const btns = card.querySelectorAll('.review-actions button');
    const statusEl = card.querySelector('.review-status');
    const originalHtml = btn.innerHTML;

    btns.forEach(b => b.disabled = true);
    btn.innerHTML = `<div class="btn-spinner"></div>${action === 'replan' ? 'Replanning…' : 'Processing…'}`;

    statusEl.className = 'review-status processing visible';
    statusEl.textContent = 'Processing…';

    try {
      const res = await fetch(
        `${base()}/api/agents/session/${encodeURIComponent(sessionId)}/${action}`,
        { method: 'POST' }
      );

      if (action === 'reject') {
        statusEl.className = 'review-status success visible';
        statusEl.textContent = 'Plan rejected.';
        addAgentBubble(renderMd('Plan rejected. Feel free to rephrase or try a different approach.'));
        setIdle();
        return;
      }

      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusEl.className = 'review-status error visible';
        statusEl.textContent = 'Error: ' + (body.message || res.statusText);
        btns.forEach(b => b.disabled = false);
        btn.innerHTML = originalHtml;
        return;
      }

      if (action === 'approve') {
        card.classList.add('flash-approve');
        await new Promise(r => setTimeout(r, 620));
      }

      statusEl.className = 'review-status success visible';
      statusEl.textContent = action === 'replan' ? 'Replanning…' : 'Approved — executing…';

      if (action === 'replan') {
        finalizeActivityGroup();
        if (body && body.result) {
          addAgentBubble(renderMd(body.result));
        }
        // Fetch new plan immediately (short delay to allow UI render)
        setTimeout(() => loadReviewAfterReplan(), 100);
      } else {
        finalizeActivityGroup();
        addAgentBubble(renderMd(body.result || 'Done.'));
        setIdle();
      }
    } catch {
      statusEl.className = 'review-status error visible';
      statusEl.textContent = 'Network error — please try again.';
      btn.innerHTML = originalHtml;
      btns.forEach(b => b.disabled = false);
    }
  }

  async function loadReviewAfterReplan() {
    try {
      const res = await fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/review-data`);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        addErrorBubble(renderMd(body.message || 'Replan ended without a new review.'));
        setIdle();
        return;
      }
      buildReviewCard(await res.json());
    } catch (err) {
      addErrorBubble(renderMd('Error loading review: ' + (err.message || String(err))));
      setIdle();
    }
  }

  // ── Send & stream ───────────────────────────────────────────────────
  function stopStreaming() {
    if (abortController) {
      abortController.abort();
      abortController = null;
      fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}`, { method: 'DELETE' }).catch(() => {});
      showToast('Stopped');
      removeTyping();
      finalizeActivityGroup(true); // marks group as "Stopped"
      document.getElementById('stop-btn').classList.remove('visible');
      setIdle();
    }
  }

  async function deleteSession() {
    if (!confirm('Are you sure you want to delete this session memory?')) return;
    try {
      await fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
      showToast('Session deleted');
      newSession();
    } catch { showToast('Error deleting session'); }
  }

  async function sendPrompt() {
    const rawPrompt = promptInput.value.trim();
    if (!rawPrompt && !attachedFile) return;
    if (streaming) return;

    let prompt = rawPrompt;
    let displayPrompt = rawPrompt;
    if (attachedFile) {
      const ext = attachedFile.name.split('.').pop() || 'text';
      const fileBlock = `[File: ${attachedFile.name}]\n\`\`\`${ext}\n${attachedFile.content}\n\`\`\``;
      prompt = rawPrompt ? `${fileBlock}\n\n${rawPrompt}` : fileBlock;
      displayPrompt = rawPrompt
        ? `📎 ${attachedFile.name}\n\n${rawPrompt}`
        : `📎 ${attachedFile.name}`;
    }

    streaming = true;
    hadToolCalls = false;
    currentActivityGroup = null;
    activityCount = 0;

    sendBtn.disabled = true;
    attachBtn.disabled = true;
    promptInput.disabled = true;
    promptInput.value = '';
    promptInput.style.height = 'auto';
    removeAttachment();

    addUserBubble(displayPrompt);
    addTyping();
    setProgress('Reviewing request…');

    if (abortController) { abortController.abort(); abortController = null; }
    abortController = new AbortController();
    document.getElementById('stop-btn').classList.add('visible');

    let receivedDone = false;

    try {
      const response = await fetch(`${base()}/api/agents/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, sessionId }),
        signal: abortController.signal
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (line.startsWith('data: ')) {
              removeTyping();
              try {
                const event = JSON.parse(line.slice(6));
                if (event.done) receivedDone = true;
                handleStreamEvent(event);
              } catch {}
            }
          }
        }
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
      removeTyping();
      document.getElementById('stop-btn').classList.remove('visible');
      clearProgress();
      if (!receivedDone) {
        finalizeActivityGroup();
        addErrorBubble(`<p>Connection error: ${esc(err.message)}</p>`);
      }
      setIdle();
    }
  }

  function handleStreamEvent(event) {
    const { type, data } = event;

    if (type === 'status') {
      const label = PHASE_LABELS[data] || data;
      setProgress(label);
      if (data && !data.startsWith('Phase:')) updateActivityLabel(label);

    } else if (type === 'plan') {
      try {
        const steps = JSON.parse(data);
        addActivityItem('📋',
          `Plan ready — <strong>${steps.length} step${steps.length !== 1 ? 's' : ''}</strong>`);
        setProgress('Executing plan…');
      } catch {
        addActivityItem('📋', esc(data));
      }

    } else if (type === 'tool_call_started') {
      hadToolCalls = true;
      addActivityItem('⚙️', `Running <code>${esc(data)}</code>`);
      setProgress(`Running ${data.split(' ')[0]}…`);

    } else if (type === 'tool_call_finished') {
      const preview = data.length > 140 ? data.slice(0,140) + '…' : data;
      addActivityItem('✅', esc(preview));

    } else if (type === 'review_required') {
      clearProgress();
      finalizeActivityGroup();
      try { buildReviewCard(JSON.parse(data)); } catch { addAgentBubble('<p>Plan review required.</p>'); }
      abortController && abortController.abort();
      abortController = null;
      setIdle();

    } else if (type === 'final') {
      clearProgress();
      finalizeActivityGroup();
      addAgentBubble(renderMd(data));
      abortController && abortController.abort();
      abortController = null;
      document.getElementById('stop-btn').classList.remove('visible');
      setIdle();

    } else if (type === 'error') {
      clearProgress();
      finalizeActivityGroup();
      if (!hadToolCalls) {
        addAgentBubble(renderMd(data));
      } else {
        addErrorBubble(renderMd(data));
      }
      abortController && abortController.abort();
      abortController = null;
      document.getElementById('stop-btn').classList.remove('visible');
      setIdle();
    }
  }

  function setIdle() {
    streaming = false;
    document.getElementById('stop-btn').classList.remove('visible');
    clearProgress();
    sendBtn.disabled = false;
    attachBtn.disabled = false;
    promptInput.disabled = false;
    promptInput.focus();
  }

  // ── New session ─────────────────────────────────────────────────────
  function newSession() {
    if (abortController) { abortController.abort(); abortController = null; }
    sessionId = generateId();
    updateSessionDisplay();
    streaming = false;
    hadToolCalls = false;
    currentActivityGroup = null;
    activityCount = 0;
    clearProgress();
    sendBtn.disabled = false;
    attachBtn.disabled = false;
    promptInput.disabled = false;
    removeAttachment();

    const inner = feed.querySelector('.feed-inner');
    if (inner) inner.remove();
    emptyWrap.style.display = '';
    promptInput.focus();
  }

  // ── URL param init ──────────────────────────────────────────────────
  (function init() {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('sessionId');
    const b = params.get('base');
    if (b) document.getElementById('api-base').value = b;
    if (sid) {
      sessionId = sid;
      updateSessionDisplay();
      fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/review-data`)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) buildReviewCard(data); })
        .catch(() => {});
    }
    promptInput.focus();
  })();
</script>
</body>
</html>
