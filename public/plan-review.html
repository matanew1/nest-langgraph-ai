    let raw = promptInput.value.trim();
    if (!raw && !attachedFile && attachedImages.length === 0) return;
    if (streaming) return;

    let prompt = raw;
    let display = raw;
    if (attachedFile) {
      const ext = attachedFile.name.split('.').pop() || 'txt';
      const block = `[Attached: ${attachedFile.name}]\n\`\`\`${ext}\n${attachedFile.content}\n\`\`\``;
      prompt = raw ? `${block}\n\n${raw}` : block;
      display = raw ? `${attachedFile.name}\n${raw}` : attachedFile.name;
    }

    const images = attachedImages.map(img => ({ url: img.dataUrl }));
    const imagesToShow = [...attachedImages];

    streaming = true;
    hadToolCalls = false;
    promptInput.value = '';
    promptInput.style.height = 'auto';
    removeAttachment();
    removeAllImageAttachments();

    addUserBubble(display, imagesToShow);
    addTyping();
    setProgress('Phase: supervisor');

    abortController = new AbortController();
    stopBtn.classList.add('visible');

    try {
      const res = await fetch(`${base()}/api/agents/stream`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, sessionId, ...(images.length > 0 ? {images} : {})}),
        signal: abortController.signal
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const parts = buffer.split('\n\n');
        buffer = parts.pop() || '';

        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const event = JSON.parse(line.slice(6));
            handleStreamEvent(event);
          }
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        removeTyping();
        addErrorBubble(`<p>${t('connectionError')} ${esc(err.message)}</p>`);
      }
    } finally {
      setIdle();
    }
  }

  function createStreamingBubble() {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'msg-row';
    row.id = 'streaming-row';
    row.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="bubble-wrap"><div class="bubble bubble-agent"><div class="bubble-streaming"></div></div><span class="bubble-time">${ts()}</span></div>`;
    inner.appendChild(row);
    streamingBubbleEl = row.querySelector('.bubble-streaming');
    scrollFeed();
  }

  function finalizeStreamingBubble(htmlContent, isError = false) {
    const row = document.getElementById('streaming-row');
    if (row) {
      const bubble = row.querySelector('.bubble');
      if (isError) bubble.classList.add('bubble-error');
      bubble.innerHTML = htmlContent + `<button class="bubble-copy" onclick="copyBubble(this)">${ICONS.copy}</button>`;
      if (typeof mermaid !== 'undefined') mermaid.run({nodes: bubble.querySelectorAll('.mermaid')});
      row.removeAttribute('id');
    } else {
      // No streaming row — create a static bubble
      isError ? addErrorBubble(htmlContent) : addAgentBubble(htmlContent);
    }
    streamingBubbleEl = null;
    streamingText = '';
    scrollFeed();
  }

  function handleStreamEvent(e) {
    removeTyping();
    const {type, data} = e;

    if (type === 'status') {
      setProgress(data);
    }
    else if (type === 'llm_stream_reset') {
      // New LLM generation starting — create/reset the streaming bubble
      streamingText = '';
      if (!streamingBubbleEl) createStreamingBubble();
      else streamingBubbleEl.textContent = '';
    }
    else if (type === 'llm_token') {
      if (!streamingBubbleEl) createStreamingBubble();
      streamingText += data;
      streamingBubbleEl.textContent = streamingText;
      scrollFeed();
    }
    else if (type === 'plan') {
      addActivityItem('plan', t('planReady', JSON.parse(data).length));
    }
    else if (type === 'tool_call_started') {
      hadToolCalls = true;
      addActivityItem('tool', t('running', esc(data)));
    }
    else if (type === 'tool_call_finished') {
      addActivityItem('success', esc(data.length > 120 ? data.slice(0,120)+'...' : data));
    }
    else if (type === 'review_required') {
      clearProgress();
      finalizeActivityGroup();
      buildReviewCard(JSON.parse(data));
      setIdle();
    }
    else if (type === 'final') {
      clearProgress();
      finalizeActivityGroup();
      finalizeStreamingBubble(renderMd(data));
      setIdle();
    }
    else if (type === 'error') {
      clearProgress();
      finalizeActivityGroup();
      finalizeStreamingBubble(renderMd(data), hadToolCalls);
      setIdle();
    }
  }

  function setIdle() {
    streaming = false;
    streamingBubbleEl = null;
    streamingText = '';
    stopBtn.classList.remove('visible');
    clearProgress();
    promptInput.focus();
  }

  function newSession() {
    if (abortController) abortController.abort();
    sessionId = crypto.randomUUID().slice(0, 16);
    document.getElementById('chat-session-title').textContent = t('newConversation');
    const inner = feed.querySelector('.feed-inner');
    if (inner) inner.remove();
    emptyWrap.style.display = '';
    promptInput.focus();
    hadToolCalls = false;
    currentActivityGroup = null;
    streamingBubbleEl = null;
    streamingText = '';
    removeAttachment();
    removeAllImageAttachments();
    renderHistory();
  }

  function relativeTime(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
  }

  async function renderHistory() {
    const container = document.getElementById('history-list');
    const refreshBtn = document.getElementById('history-refresh-btn');
    refreshBtn.classList.add('spinning');
    container.innerHTML = `<div class="history-loading"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>Loading...</div>`;

    try {
      const res = await fetch(`${base()}/api/agents/sessions`);
      const data = res.ok ? await res.json() : { sessions: [] };
      const sessions = data.sessions || [];
      container.innerHTML = '';

      // Current (possibly unsaved) session pinned at top
      const curItem = document.createElement('div');
      curItem.className = 'history-item active';
      curItem.id = 'history-cur';
      curItem.onclick = () => switchToSession(sessionId, null, true);
      curItem.innerHTML = `<span class="icon">${ICONS.chat}</span><div class="history-item-info"><div class="history-item-top"><span class="history-item-label">${t('currentSession')}</span></div><div class="history-item-meta">${sessionId.slice(0,12)}…</div></div><span class="time">${t('now')}</span>`;
      container.appendChild(curItem);

      if (sessions.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'No past sessions found.';
        container.appendChild(empty);
      } else {
        for (const s of sessions) {
          if (s.sessionId === sessionId) continue; // already shown as current
          const item = document.createElement('div');
          item.className = 'history-item';
          item.dataset.sid = s.sessionId;
          item.onclick = () => switchToSession(s.sessionId, s.lastObjective);
          const label = s.lastObjective ? s.lastObjective.slice(0, 28) + (s.lastObjective.length > 28 ? '…' : '') : s.sessionId.slice(0, 14) + '…';
          const time = relativeTime(s.lastActivity);
          const badge = s.messageCount > 0 ? `<span class="history-item-badge">${s.messageCount}</span>` : '';
          item.innerHTML = `
            <span class="icon">${ICONS.chat}</span>
            <div class="history-item-info">
              <div class="history-item-top">
                <span class="history-item-label">${esc(label)}</span>${badge}
              </div>
              <div class="history-item-meta">${esc(s.sessionId.slice(0,12))}… · ${time}</div>
            </div>
            <button class="history-item-del" onclick="event.stopPropagation();deleteSession('${esc(s.sessionId)}')" title="Delete session">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>`;
          container.appendChild(item);
        }
      }
    } catch {
      container.innerHTML = '<div class="history-empty">Could not load sessions.</div>';
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  }

  async function switchToSession(sid, objective, isCurrent = false) {
    // Update active highlight
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    const el = isCurrent
      ? document.getElementById('history-cur')
      : document.querySelector(`[data-sid="${sid}"]`);
    if (el) el.classList.add('active');

    if (isCurrent && sid === sessionId) return; // already on current, do nothing

    // Switch session
    sessionId = sid;
    if (abortController) abortController.abort();
    streaming = false;
    currentActivityGroup = null;
    hadToolCalls = false;
    stopBtn.classList.remove('visible');
    clearProgress();

    // Clear feed
    const inner = feed.querySelector('.feed-inner');
    if (inner) inner.remove();
    emptyWrap.style.display = '';

    const title = objective ? objective.slice(0, 40) + (objective.length > 40 ? '…' : '') : sid.slice(0, 16) + '…';
    document.getElementById('chat-session-title').textContent = title;

    // Load detail and show memory entries in feed
    try {
      const res = await fetch(`${base()}/api/agents/session/${encodeURIComponent(sid)}/detail`);
      if (!res.ok) return;
      const detail = await res.json();
      if (!detail.entries || detail.entries.length === 0) return;

      hideEmpty();
      const feedInner = getFeedInner();
      const note = document.createElement('div');
      note.style.cssText = 'text-align:center;font-size:11px;color:var(--text-tertiary);padding:8px 0 16px;';
      note.textContent = `Session history · ${detail.entries.length} turn${detail.entries.length > 1 ? 's' : ''}`;
      feedInner.appendChild(note);

      // Render each memory entry as a card
      for (const entry of [...detail.entries].reverse()) {
        const tsMatch = entry.match(/^\[(.+?)\]/);
        const bodyText = entry.replace(/^\[.+?\]\n?/, '').trim();
        const card = document.createElement('div');
        card.className = 'msg-row';
        card.style.marginBottom = '16px';
        const tsLabel = tsMatch ? new Date(tsMatch[1]).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        card.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="bubble-wrap"><div class="bubble bubble-agent">${renderMd(bodyText)}<button class="bubble-copy" onclick="copyBubble(this)">${ICONS.copy}</button></div>${tsLabel ? `<span class="bubble-time">${tsLabel}</span>` : ''}</div>`;
        feedInner.appendChild(card);
      }
      scrollFeed();
    } catch { /* show empty state */ }

    promptInput.focus();
  }

  function attachFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = ".txt,.md,.json,.ts,.js,.py,.go,.rs,.java,.c,.cpp,.html,.css,.yaml";
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file || file.size > 512*1024) return alert(t('fileTooLarge'));
      const reader = new FileReader();
      reader.onload = ev => {
        attachedFile = { name: file.name, content: ev.target.result };
        document.getElementById('file-chip-name').textContent = file.name;
        document.getElementById('file-chip').classList.add('visible');
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function removeAttachment() {
    attachedFile = null;
    document.getElementById('file-chip').classList.remove('visible');
  }

  function attachImage() {
    if (attachedImages.length >= 5) return alert('Maximum 5 images per message.');
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = e => {
      const files = Array.from(e.target.files).slice(0, 5 - attachedImages.length);
      files.forEach(file => {
        if (file.size > 5 * 1024 * 1024) return alert(`${file.name}: max 5 MB per image.`);
        const reader = new FileReader();
        reader.onload = ev => {
          attachedImages.push({ name: file.name, dataUrl: ev.target.result });
          renderImageChips();
        };
        reader.readAsDataURL(file);
      });
    };
    input.click();
  }

  function removeImageAttachment(index) {
    attachedImages.splice(index, 1);
    renderImageChips();
  }

  function removeAllImageAttachments() {
    attachedImages = [];
    renderImageChips();
  }

  function renderImageChips() {
    const container = document.getElementById('image-chips');
    container.innerHTML = attachedImages.map((img, i) => `
      <div class="image-chip">
        <img src="${img.dataUrl}" alt="${esc(img.name)}">
        <button class="image-chip-remove" onclick="removeImageAttachment(${i})" title="Remove">✕</button>
      </div>`).join('');
  }

  function toggleSidebar() {
    const mainGrid = document.getElementById('main-grid');
    const toggleBtn = document.getElementById('sidebar-toggle');
    const isMobile = window.innerWidth <= 768;
    if (isMobile) { mainGrid.classList.toggle('sidebar-open'); }
    else { mainGrid.classList.toggle('sidebar-collapsed'); }
    const isCollapsed = isMobile ? !mainGrid.classList.contains('sidebar-open') : mainGrid.classList.contains('sidebar-collapsed');
    toggleBtn.querySelector('svg').style.transform = isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
  }

  function initSidebar() {}
  document.addEventListener('DOMContentLoaded', initSidebar);

  window.addEventListener('resize', function() {
    const mainGrid = document.getElementById('main-grid');
    const toggleBtn = document.getElementById('sidebar-toggle');
    if (window.innerWidth <= 768) { mainGrid.classList.remove('sidebar-collapsed'); }
    else { mainGrid.classList.remove('sidebar-open'); }
    toggleBtn.querySelector('svg').style.transform = 'rotate(0deg)';
  });

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-icon-light').style.display = isDark ? 'block' : 'none';
    document.getElementById('theme-icon-dark').style.display = isDark ? 'none' : 'block';
  }

  // renderHistory is defined above with full API integration

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && streaming) stopStreaming();
  });

  window.onload = () => {
    renderHistory(); // async — fetches sessions from API
    document.getElementById('chat-session-title').textContent = t('newConversation');
    promptInput.focus();
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    }
    // Refresh history list when returning focus to the page
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) renderHistory();
    });
  };
</script>
</body>
</html>
