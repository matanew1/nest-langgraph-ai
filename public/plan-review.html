<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #d97706;
      --radius: 18px;
      --radius-sm: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .topbar-logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: .85rem; font-weight: 700;
      flex-shrink: 0;
    }

    .topbar h1 { font-size: .95rem; font-weight: 700; }

    .session-badge {
      font-size: .73rem;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--muted);
      font-family: monospace;
      cursor: pointer;
      user-select: all;
      transition: background .15s;
    }
    .session-badge:hover { background: #e2e8f0; }

    .api-input {
      margin-left: auto;
      font-size: .78rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 9px;
      color: var(--muted);
      outline: none;
      width: 200px;
    }
    .api-input:focus { border-color: var(--accent); color: var(--text); }

    /* ── Feed ── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Empty state ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .95rem;
      gap: 10px;
      padding-bottom: 60px;
    }
    #empty .empty-icon { font-size: 2.5rem; opacity: .4; }
    #empty .empty-title { font-weight: 600; color: var(--text); opacity: .5; }
    #empty .empty-sub { font-size: .82rem; opacity: .5; }

    /* ── Row layouts ── */
    .row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeIn .18s ease;
    }
    .row.row-user  { flex-direction: row-reverse; }
    .row.row-agent { flex-direction: row; }
    .row.row-full  { flex-direction: column; align-items: stretch; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

    /* ── Avatar ── */
    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .avatar-user  { background: var(--accent); color: #fff; }
    .avatar-agent { background: #e2e8f0; color: var(--text); }

    /* ── Bubble ── */
    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: .9rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble-user {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble-agent {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .bubble-agent.bubble-error {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    /* ── Activity group (tool calls, status updates) ── */
    .activity-group {
      margin: 2px 0 2px 38px;
    }

    .activity-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .76rem;
      color: var(--muted);
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: all .15s;
      user-select: none;
      background: transparent;
    }
    .activity-toggle:hover {
      background: #f1f5f9;
      border-color: var(--border);
      color: var(--text);
    }
    .activity-toggle .toggle-arrow { transition: transform .2s; display: inline-block; }
    .activity-toggle.open .toggle-arrow { transform: rotate(90deg); }

    .activity-items {
      display: none;
      margin-top: 4px;
      border-left: 2px solid #e2e8f0;
      padding-left: 12px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .activity-items.open { display: flex; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: .8rem;
      color: var(--muted);
      padding: 3px 0;
    }
    .activity-item-icon { font-size: .78rem; flex-shrink: 0; margin-top: 1px; }
    .activity-item-text { word-break: break-word; }
    .activity-item-text code {
      font-family: monospace;
      font-size: .78rem;
      background: #f1f5f9;
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* ── Review card ── */
    .review-card {
      background: #fffbeb;
      border: 1.5px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin: 4px 0 4px 38px;
    }

    .review-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .review-badge {
      font-size: .72rem;
      font-weight: 700;
      background: #fef3c7;
      color: #92400e;
      border-radius: 10px;
      padding: 2px 9px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .review-objective {
      font-size: .84rem;
      color: #78350f;
      margin-bottom: 12px;
    }

    .plan-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .83rem;
      margin-bottom: 12px;
    }
    .plan-table th {
      text-align: left;
      padding: 6px 10px;
      background: #fef9c3;
      border-bottom: 1.5px solid #fde68a;
      color: #78350f;
      font-weight: 600;
    }
    .plan-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #fef3c7;
      vertical-align: top;
    }
    .plan-table td:first-child { width: 28px; color: var(--muted); font-weight: 700; }
    .plan-table td:nth-child(2) { width: 120px; font-family: monospace; font-size: .78rem; color: #6d28d9; background: #f5f3ff; border-radius: 3px; }

    .review-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .review-actions button {
      padding: 7px 18px;
      border: none;
      border-radius: 7px;
      font-size: .84rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .review-actions button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-reject  { background: var(--red);   color: #fff; }
    .btn-replan  { background: var(--accent); color: #fff; }

    .review-status {
      margin-top: 8px;
      font-size: .82rem;
      padding: 6px 10px;
      border-radius: 5px;
      display: none;
    }
    .review-status.processing { background: #eff6ff; color: #1e40af; }
    .review-status.success    { background: #f0fdf4; color: #166534; }
    .review-status.error      { background: #fef2f2; color: #991b1b; }

    /* ── Markdown content inside bubbles ── */
    .md-content h1, .md-content h2, .md-content h3 {
      margin: 8px 0 4px;
      font-weight: 700;
      line-height: 1.3;
    }
    .md-content h1 { font-size: 1.1rem; }
    .md-content h2 { font-size: 1rem; }
    .md-content h3 { font-size: .95rem; }
    .md-content p  { margin: 4px 0; }
    .md-content ul, .md-content ol { padding-left: 18px; margin: 4px 0; }
    .md-content li { margin: 2px 0; }
    .md-content code {
      font-family: monospace;
      font-size: .82rem;
      background: rgba(0,0,0,.08);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .bubble-user .md-content code { background: rgba(255,255,255,.25); }
    .md-content pre {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin: 8px 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: .8rem;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }
    .bubble-user .md-content pre { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.3); }
    .md-content strong { font-weight: 700; }
    .md-content em { font-style: italic; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    /* ── Typing indicator ── */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeIn .18s ease;
    }
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 10px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce .8s infinite ease-in-out;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.75); opacity: .5; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    /* ── Input bar ── */
    .inputbar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #prompt-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.45;
      transition: border-color .15s;
      background: #f8fafc;
    }
    #prompt-input:focus { border-color: var(--accent); background: #fff; }
    #prompt-input:disabled { background: #f1f5f9; color: var(--muted); }

    #send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity .15s, background .15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { background: var(--accent-dark); }

    #new-btn {
      padding: 8px 13px;
      background: #f1f5f9;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 22px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
      align-self: flex-end;
      height: 42px;
    }
    #new-btn:hover { background: #e2e8f0; }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="topbar-logo">A</div>
  <h1>Agent Chat</h1>
  <span class="session-badge" id="session-display" title="Click to copy session ID">New session</span>
  <input class="api-input" id="api-base" type="text" value="http://localhost:3000" placeholder="API base URL">
</div>

<!-- ── Event feed ── -->
<div id="feed">
  <div id="empty">
    <div class="empty-icon">💬</div>
    <div class="empty-title">Agent Chat</div>
    <div class="empty-sub">Ask the agent anything — it can search, read files, write code, and more.</div>
  </div>
</div>

<!-- ── Input bar ── -->
<div class="inputbar">
  <button id="new-btn" onclick="newSession()" title="Start a new session">+ New</button>
  <textarea id="prompt-input" rows="1" placeholder="Ask the agent anything…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendPrompt()" title="Send (Enter)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────
  let sessionId = generateId();
  let streaming = false;
  let evtSource = null;
  let hadToolCalls = false;
  // Current activity group being built (tool calls + status during a run)
  let currentActivityGroup = null;
  let activityCount = 0;

  const feed    = document.getElementById('feed');
  const empty   = document.getElementById('empty');
  const promptInput = document.getElementById('prompt-input');
  const sendBtn = document.getElementById('send-btn');
  const sessionDisplay = document.getElementById('session-display');

  updateSessionDisplay();

  // ── Helpers ─────────────────────────────────────────────────────
  function generateId() {
    return 'sess-' + Math.random().toString(36).slice(2, 10);
  }

  function base() {
    return (document.getElementById('api-base').value || '').replace(/\/$/, '');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function updateSessionDisplay() {
    const short = sessionId.length > 20 ? sessionId.slice(0, 20) + '…' : sessionId;
    sessionDisplay.textContent = short;
    sessionDisplay.title = 'Session: ' + sessionId + ' (click to copy)';
  }

  sessionDisplay.addEventListener('click', () => {
    navigator.clipboard.writeText(sessionId).catch(() => {});
    const orig = sessionDisplay.textContent;
    sessionDisplay.textContent = 'Copied!';
    setTimeout(() => { sessionDisplay.textContent = orig; }, 1200);
  });

  function hideEmpty() { empty.style.display = 'none'; }
  function scrollFeed() { feed.scrollTop = feed.scrollHeight; }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
  }

  // ── Markdown renderer ───────────────────────────────────────────
  function renderMd(text) {
    // Fenced code blocks first
    const blocks = [];
    let s = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      blocks.push(`<pre><code>${esc(code.replace(/\n$/, ''))}</code></pre>`);
      return `\x00BLOCK${i}\x00`;
    });

    // Headings
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Bold / italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Inline code (escape first)
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);

    // HR
    s = s.replace(/^---+$/gm, '<hr>');

    // Unordered lists
    s = s.replace(/((?:^[\s]*[-*+] .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[\s]*[-*+] /, '').trim()}</li>`).join('');
      return `<ul>${items}</ul>`;
    });

    // Ordered lists
    s = s.replace(/((?:^\d+\. .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '').trim()}</li>`).join('');
      return `<ol>${items}</ol>`;
    });

    // Paragraphs (double newline = new paragraph)
    s = s.split(/\n{2,}/).map(block => {
      if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<ol') || block.startsWith('<hr') || block.startsWith('\x00BLOCK')) {
        return block;
      }
      const inner = block.replace(/\n/g, '<br>').trim();
      return inner ? `<p>${inner}</p>` : '';
    }).join('');

    // Restore code blocks
    blocks.forEach((b, i) => { s = s.replace(`\x00BLOCK${i}\x00`, b); });

    return `<div class="md-content">${s}</div>`;
  }

  // ── Chat row builders ────────────────────────────────────────────
  function addUserBubble(text) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'row row-user';
    row.innerHTML = `
      <div class="avatar avatar-user">👤</div>
      <div class="bubble bubble-user"><div class="md-content">${esc(text).replace(/\n/g, '<br>')}</div></div>`;
    feed.appendChild(row);
    scrollFeed();
    return row;
  }

  function addAgentBubble(htmlContent, extraClass = '') {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'row row-agent';
    row.innerHTML = `
      <div class="avatar avatar-agent">🤖</div>
      <div class="bubble bubble-agent ${extraClass}">${htmlContent}</div>`;
    feed.appendChild(row);
    scrollFeed();
    return row;
  }

  function addErrorBubble(htmlContent) {
    return addAgentBubble(htmlContent, 'bubble-error');
  }

  // ── Activity group (tool calls + status) ──────────────────────
  function ensureActivityGroup() {
    if (currentActivityGroup) return;
    hideEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'activity-group';
    wrap.innerHTML = `
      <button class="activity-toggle" onclick="toggleActivity(this)">
        <span class="toggle-arrow">▶</span>
        <span class="toggle-label">Working…</span>
      </button>
      <div class="activity-items"></div>`;
    feed.appendChild(wrap);
    currentActivityGroup = wrap;
    activityCount = 0;
    scrollFeed();
  }

  function addActivityItem(icon, text) {
    ensureActivityGroup();
    activityCount++;
    const items = currentActivityGroup.querySelector('.activity-items');
    const item = document.createElement('div');
    item.className = 'activity-item';
    item.innerHTML = `<span class="activity-item-icon">${icon}</span><span class="activity-item-text">${text}</span>`;
    items.appendChild(item);
    // Update toggle label
    const label = currentActivityGroup.querySelector('.toggle-label');
    if (label) label.textContent = `${activityCount} action${activityCount > 1 ? 's' : ''}`;
    scrollFeed();
  }

  function updateActivityStatus(label) {
    if (!currentActivityGroup) ensureActivityGroup();
    const btn = currentActivityGroup.querySelector('.toggle-label');
    if (btn) btn.textContent = label;
  }

  function finalizeActivityGroup() {
    currentActivityGroup = null;
  }

  function toggleActivity(btn) {
    const group = btn.closest('.activity-group');
    const items = group.querySelector('.activity-items');
    const isOpen = items.classList.contains('open');
    items.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
    scrollFeed();
  }

  // ── Typing indicator ─────────────────────────────────────────────
  function addTyping() {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="avatar avatar-agent">🤖</div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    feed.appendChild(row);
    scrollFeed();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Review card ──────────────────────────────────────────────────
  function buildReviewCard(reviewData) {
    hideEmpty();
    const { plan = [], objective = '' } = reviewData;

    const rows = plan.map(step =>
      `<tr>
        <td>${esc(String(step.step_id))}</td>
        <td>${esc(step.tool)}</td>
        <td>${esc(step.description)}</td>
      </tr>`
    ).join('');

    const wrap = document.createElement('div');
    wrap.className = 'review-card';
    wrap.innerHTML = `
      <div class="review-header">
        <span class="review-badge">⚠ Plan Review</span>
      </div>
      <div class="review-objective"><strong>Objective:</strong> ${esc(objective)}</div>
      <table class="plan-table">
        <thead><tr><th>#</th><th>Tool</th><th>Description</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="review-actions">
        <button class="btn-approve" onclick="reviewAction('approve', this)">✓ Approve</button>
        <button class="btn-reject"  onclick="reviewAction('reject', this)">✗ Reject</button>
        <button class="btn-replan"  onclick="reviewAction('replan', this)">↺ Replan</button>
      </div>
      <div class="review-status"></div>`;

    feed.appendChild(wrap);
    scrollFeed();
    return wrap;
  }

  async function reviewAction(action, btn) {
    const card = btn.closest('.review-card');
    const btns = card.querySelectorAll('.review-actions button');
    const statusEl = card.querySelector('.review-status');

    btns.forEach(b => b.disabled = true);
    statusEl.className = 'review-status processing';
    statusEl.textContent = 'Processing…';
    statusEl.style.display = 'block';

    try {
      const res = await fetch(
        `${base()}/api/agents/session/${encodeURIComponent(sessionId)}/${action}`,
        { method: 'POST' }
      );

      if (action === 'reject') {
        statusEl.className = 'review-status success';
        statusEl.textContent = 'Plan rejected.';
        addAgentBubble(renderMd('Plan rejected. You can start a new request or try rephrasing your prompt.'), 'bubble-error');
        setIdle();
        return;
      }

      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusEl.className = 'review-status error';
        statusEl.textContent = 'Error: ' + (body.message || res.statusText);
        btns.forEach(b => b.disabled = false);
        return;
      }

      statusEl.className = 'review-status success';
      statusEl.textContent = action === 'replan' ? 'Replanning…' : 'Approved — executing…';

      if (action === 'replan') {
        setTimeout(() => loadReviewAfterReplan(), 600);
      } else {
        const answer = body.result || 'Done.';
        finalizeActivityGroup();
        addAgentBubble(renderMd(answer));
        setIdle();
      }
    } catch {
      statusEl.className = 'review-status error';
      statusEl.textContent = 'Network error — please try again.';
      btns.forEach(b => b.disabled = false);
    }
  }

  async function loadReviewAfterReplan() {
    try {
      const res = await fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/review-data`);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        addErrorBubble(renderMd(body.message || 'Replan ended without a new review.'));
        setIdle();
        return;
      }
      const data = await res.json();
      buildReviewCard(data);
    } catch {
      addErrorBubble(renderMd('Network error loading replanned review.'));
      setIdle();
    }
  }

  // ── Send prompt & stream ─────────────────────────────────────────
  async function sendPrompt() {
    const prompt = promptInput.value.trim();
    if (!prompt || streaming) return;

    streaming = true;
    hadToolCalls = false;
    currentActivityGroup = null;
    activityCount = 0;

    sendBtn.disabled = true;
    promptInput.disabled = true;

    addUserBubble(prompt);
    promptInput.value = '';
    promptInput.style.height = 'auto';

    addTyping();

    const url = `${base()}/api/agents/stream?prompt=${encodeURIComponent(prompt)}&sessionId=${encodeURIComponent(sessionId)}`;
    if (evtSource) { evtSource.close(); evtSource = null; }
    evtSource = new EventSource(url);

    const SSE_TYPES = ['status','plan','tool_call_started','tool_call_finished','review_required','final','error'];
    let receivedDone = false;

    SSE_TYPES.forEach(type => {
      evtSource.addEventListener(type, (e) => {
        removeTyping();
        let event;
        try { event = JSON.parse(e.data); } catch { return; }
        if (event.done) receivedDone = true;
        handleStreamEvent(event);
      });
    });

    evtSource.onmessage = (e) => {
      removeTyping();
      let event;
      try { event = JSON.parse(e.data); } catch { return; }
      if (event.done) receivedDone = true;
      handleStreamEvent(event);
    };

    evtSource.onerror = () => {
      removeTyping();
      evtSource.close();
      evtSource = null;
      if (streaming && !receivedDone) {
        finalizeActivityGroup();
        addErrorBubble('<p>Connection lost. The stream ended unexpectedly.</p>');
        setIdle();
      } else if (streaming) {
        finalizeActivityGroup();
        setIdle();
      }
    };
  }

  const PHASE_LABELS = {
    'Phase: supervisor':      'Reviewing request…',
    'Phase: research':        'Gathering context…',
    'Phase: validate_plan':   'Validating plan…',
    'Phase: generate':        'Writing answer…',
    'Phase: chat':            'Thinking…',
    'Phase: fatal_recovery':  'Recovering…',
  };

  function handleStreamEvent(event) {
    const { type, data } = event;

    if (type === 'status') {
      const label = PHASE_LABELS[data];
      if (label) updateActivityStatus(label);

    } else if (type === 'plan') {
      // Plan is now shown inside the activity group as a summary item
      try {
        const steps = JSON.parse(data);
        const summary = steps.map(s => `${s.step_id}. <code>${esc(s.tool)}</code> — ${esc(s.description)}`).join('<br>');
        addActivityItem('📋', `<span>Plan created (${steps.length} step${steps.length > 1 ? 's' : ''})</span>`);
      } catch {
        addActivityItem('📋', esc(data));
      }

    } else if (type === 'tool_call_started') {
      hadToolCalls = true;
      addActivityItem('🔧', `Running <code>${esc(data)}</code>`);

    } else if (type === 'tool_call_finished') {
      const preview = data.length > 120 ? data.slice(0, 120) + '…' : data;
      addActivityItem('✅', esc(preview));

    } else if (type === 'review_required') {
      finalizeActivityGroup();
      try {
        buildReviewCard(JSON.parse(data));
      } catch {
        addAgentBubble(`<p>Plan review required.</p>`);
      }
      // Pause — keep input enabled so user can still type; they must act via buttons
      evtSource && evtSource.close();
      evtSource = null;
      streaming = false;
      sendBtn.disabled = false;
      promptInput.disabled = false;

    } else if (type === 'final') {
      finalizeActivityGroup();
      addAgentBubble(renderMd(data));
      evtSource && evtSource.close();
      evtSource = null;
      setIdle();

    } else if (type === 'error') {
      finalizeActivityGroup();
      // Clarification / rejection — show as agent message not red error
      const isRejection = !hadToolCalls;
      if (isRejection) {
        addAgentBubble(renderMd(data));
      } else {
        addErrorBubble(renderMd(data));
      }
      evtSource && evtSource.close();
      evtSource = null;
      setIdle();
    }
  }

  function setIdle() {
    streaming = false;
    sendBtn.disabled = false;
    promptInput.disabled = false;
    promptInput.focus();
  }

  // ── New session ──────────────────────────────────────────────────
  function newSession() {
    if (evtSource) { evtSource.close(); evtSource = null; }
    sessionId = generateId();
    updateSessionDisplay();
    streaming = false;
    hadToolCalls = false;
    currentActivityGroup = null;
    sendBtn.disabled = false;
    promptInput.disabled = false;

    while (feed.firstChild) feed.removeChild(feed.firstChild);
    feed.appendChild(empty);
    empty.style.display = 'flex';
    promptInput.focus();
  }

  // ── URL param auto-load ──────────────────────────────────────────
  (function init() {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('sessionId');
    const b = params.get('base');
    if (b) document.getElementById('api-base').value = b;
    if (sid) {
      sessionId = sid;
      updateSessionDisplay();
      fetch(`${base()}/api/agents/session/${encodeURIComponent(sessionId)}/review-data`)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) buildReviewCard(data); })
        .catch(() => {});
    }
    promptInput.focus();
  })();
</script>
</body>
