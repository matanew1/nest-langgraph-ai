    he: {
      title: '\u05E1\u05D5\u05DB\u05DF', newChat: '\u05E6\u05F3\u05D0\u05D8 \u05D7\u05D3\u05E9', history: '\u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05D4', clear: '\u05E0\u05E7\u05D4',
      newConversation: '\u05E9\u05D9\u05D7\u05D4 \u05D7\u05D3\u05E9\u05D4', thinking: '\u05D7\u05D5\u05E9\u05D1', stop: '\u05E2\u05E6\u05D5\u05E8',
      emptyTitle: '\u05D1\u05DE\u05D4 \u05D0\u05D5\u05DB\u05DC \u05DC\u05E2\u05D6\u05D5\u05E8?',
      emptySubtitle: '\u05D0\u05E0\u05D9 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D7\u05E4\u05E9 \u05D1\u05D0\u05D9\u05E0\u05D8\u05E8\u05E0\u05D8, \u05DC\u05D4\u05E8\u05D9\u05E5 \u05E7\u05D5\u05D3, \u05DC\u05E0\u05EA\u05D7 \u05E7\u05D1\u05E6\u05D9\u05DD, \u05DC\u05D9\u05E6\u05D5\u05E8 \u05D3\u05D9\u05D0\u05D2\u05E8\u05DE\u05D5\u05EA \u05D5\u05DC\u05EA\u05E7\u05E9\u05E8 \u05D1\u05DE\u05D2\u05D5\u05D5\u05DF \u05E9\u05E4\u05D5\u05EA.',
      chipSearch: '\u05D7\u05D9\u05E4\u05D5\u05E9 \u05D1\u05D0\u05D9\u05E0\u05D8\u05E8\u05E0\u05D8', chipCode: '\u05E7\u05D5\u05D3', chipFiles: '\u05E7\u05D1\u05E6\u05D9\u05DD', chipDiagrams: '\u05D3\u05D9\u05D0\u05D2\u05E8\u05DE\u05D5\u05EA',
      placeholder: '...\u05E9\u05DC\u05D7 \u05D4\u05D5\u05D3\u05E2\u05D4 \u05DC\u05E1\u05D5\u05DB\u05DF', attachFile: '\u05E6\u05E8\u05E3 \u05E7\u05D5\u05D1\u05E5', attachImage: '\u05E6\u05E8\u05E3 \u05EA\u05DE\u05D5\u05E0\u05D4', sendMessage: '\u05E9\u05DC\u05D7 \u05D4\u05D5\u05D3\u05E2\u05D4',
      toggleSidebar: '\u05D4\u05E6\u05D2/\u05D4\u05E1\u05EA\u05E8 \u05E1\u05E8\u05D2\u05DC \u05E6\u05D3', switchLang: 'EN',
      working: '\u05E2\u05D5\u05D1\u05D3', stopped: '\u05D4\u05D5\u05E4\u05E1\u05E7',
      stepsCompleted: (n) => `${n} \u05E9\u05DC\u05D1${n > 1 ? '\u05D9\u05DD' : ''} \u05D4\u05D5\u05E9\u05DC\u05DE${n > 1 ? '\u05D5' : ''}`,
      planReview: '\u05E0\u05D3\u05E8\u05E9 \u05D0\u05D9\u05E9\u05D5\u05E8 \u05EA\u05DB\u05E0\u05D9\u05EA', objective: '\u05DE\u05D8\u05E8\u05D4:',
      approve: '\u05D0\u05E9\u05E8', reject: '\u05D3\u05D7\u05D4', replan: '\u05EA\u05DB\u05E0\u05DF \u05DE\u05D7\u05D3\u05E9', processing: '\u05DE\u05E2\u05D1\u05D3...',
      planRejected: '\u05D4\u05EA\u05DB\u05E0\u05D9\u05EA \u05E0\u05D3\u05D7\u05EA\u05D4.', done: '\u05D1\u05D5\u05E6\u05E2.', reviewFailed: '\u05D4\u05D0\u05D9\u05E9\u05D5\u05E8 \u05E0\u05DB\u05E9\u05DC.',
      stoppedToast: '\u05D4\u05D5\u05E4\u05E1\u05E7', sessionCleared: '\u05D4\u05E9\u05D9\u05D7\u05D4 \u05E0\u05D5\u05E7\u05EA\u05D4',
      deleteConfirm: '\u05DC\u05DE\u05D7\u05D5\u05E7 \u05D0\u05EA \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05D4\u05E9\u05D9\u05D7\u05D4?', fileTooLarge: '\u05D4\u05E7\u05D5\u05D1\u05E5 \u05D2\u05D3\u05D5\u05DC \u05DE\u05D3\u05D9 (\u05DE\u05E7\u05E1\u05D9\u05DE\u05D5\u05DD 512 KB)',
      currentSession: '\u05E9\u05D9\u05D7\u05D4 \u05E0\u05D5\u05DB\u05D7\u05D9\u05EA', now: '\u05E2\u05DB\u05E9\u05D9\u05D5', copied: '\u05D4\u05D5\u05E2\u05EA\u05E7', copy: '\u05D4\u05E2\u05EA\u05E7',
      connectionError: '\u05E9\u05D2\u05D9\u05D0\u05EA \u05D7\u05D9\u05D1\u05D5\u05E8:', reviewing: '\u05D1\u05D5\u05D3\u05E7',
      planReady: (n) => `\u05EA\u05DB\u05E0\u05D9\u05EA \u05DE\u05D5\u05DB\u05E0\u05D4: <strong>${n} \u05E9\u05DC\u05D1\u05D9\u05DD</strong>`,
      running: (name) => `\u05DE\u05E8\u05D9\u05E5 <code>${name}</code>`,
    }
  };

  function t(key, ...args) {
    const val = I18N[currentLang]?.[key];
    if (typeof val === 'function') return val(...args);
    return val || key;
  }

  function applyLang() {
    const isHe = currentLang === 'he';
    document.documentElement.lang = isHe ? 'he' : 'en';
    document.documentElement.dir = isHe ? 'rtl' : 'ltr';

    // Titlebar title - preserve SVG, update text
    const titleEl = document.querySelector('.titlebar-title');
    const svgEl = titleEl.querySelector('svg');
    titleEl.textContent = '';
    titleEl.appendChild(svgEl);
    titleEl.append(' ' + t('title'));

    document.getElementById('lang-label').textContent = t('switchLang');

    // Sidebar - preserve SVGs
    const newChatBtn = document.querySelector('.new-chat-btn');
    const ncSvg = newChatBtn.querySelector('svg');
    newChatBtn.textContent = '';
    newChatBtn.appendChild(ncSvg);
    newChatBtn.append(' ' + t('newChat'));

    const histLabel = document.getElementById('sidebar-history-label');
    if (histLabel) histLabel.textContent = t('history');

    const clearBtn = document.getElementById('delete-session-btn');
    if (clearBtn) {
      const clSvg = clearBtn.querySelector('svg');
      clearBtn.textContent = '';
      clearBtn.appendChild(clSvg);
      clearBtn.append(' ' + t('clear'));
    }

    // Chat header
    if (!streaming) {
      document.getElementById('chat-session-title').textContent = t('newConversation');
    }
    document.getElementById('progress-label').textContent = t('thinking');
    document.getElementById('stop-btn').textContent = t('stop');

    // Empty state
    const emptyT = document.querySelector('.empty-title');
    const emptyS = document.querySelector('.empty-subtitle');
    if (emptyT) emptyT.textContent = t('emptyTitle');
    if (emptyS) emptyS.textContent = t('emptySubtitle');

    const chips = document.querySelectorAll('.empty-chip');
    const chipKeys = ['chipSearch', 'chipCode', 'chipFiles', 'chipDiagrams'];
    chips.forEach((chip, i) => {
      const svg = chip.querySelector('svg');
      chip.textContent = '';
      chip.appendChild(svg);
      chip.append(t(chipKeys[i]));
    });

    // Input area
    document.getElementById('prompt-input').placeholder = t('placeholder');
    document.querySelector('.input-btn[onclick*="attachFile"]').title = t('attachFile');
    document.querySelector('.input-btn[onclick*="attachImage"]').title = t('attachImage');
    document.querySelector('.input-btn-send').title = t('sendMessage');
    document.getElementById('sidebar-toggle').title = t('toggleSidebar');

    renderHistory();
  }

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'he' : 'en';
    applyLang();
  }

  const ICONS = {
    user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`,
    agent: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>`,
    copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`,
    check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
    chat: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
    settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`,
    plan: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`,
    tool: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>`,
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
    warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`
  };

  // Hebrew detection regex
  const HEBREW_RE = /[\u0590-\u05FF\uFB1D-\uFB4F]/;
  function isHebrew(text) { return HEBREW_RE.test(text); }

  let sessionId = crypto.randomUUID().slice(0, 16);
  let streaming = false;
  let abortController = null;
  let attachedFile = null;
  let attachedImages = []; // [{name, dataUrl}]
  let currentActivityGroup = null;
  let activityCount = 0;
  let hadToolCalls = false;
  const mmdSourceMap = {};

  // Live streaming state
  let streamingBubbleEl = null;   // the <div class="bubble bubble-agent"> element
  let streamingText = '';         // accumulated raw tokens
  let activeModel = null;         // currently active Mistral model name

  const feed = document.getElementById('feed');
  const emptyWrap = document.getElementById('empty-wrap');
  const promptInput = document.getElementById('prompt-input');
  const stopBtn = document.getElementById('stop-btn');
  const progressPill = document.getElementById('progress-pill');
  const progressLabel = document.getElementById('progress-label');
  const toast = document.getElementById('toast');
  const modelBadge = document.getElementById('model-badge');
  const modelBadgeLabel = document.getElementById('model-badge-label');
  const modelToast = document.getElementById('model-toast');
  const modelToastDot = document.getElementById('model-toast-dot');
  const modelToastText = document.getElementById('model-toast-text');

  let modelToastTimer = null;

  /** Infer display tier from model name for color-coding */
  function inferTier(model) {
    if (!model) return 'balanced';
    const m = model.toLowerCase();
    if (m.includes('codestral') || m.includes('code')) return 'code';
    if (m.includes('large') || m.includes('medium') || m.includes('powerful')) return 'powerful';
    if (m.includes('small') || m.includes('nemo') || m.includes('mini')) return 'fast';
    return 'balanced';
  }

  /** Shorten a model name for compact display (e.g. "mistral-large-latest" → "large") */
  function shortModelName(model) {
    if (!model) return '';
    return model
      .replace(/-latest$/i, '')
      .replace(/^mistral-/i, '')
      .replace(/^open-/i, '');
  }

  let modelSwitchTimer = null;
  function updateModelBadge(model) {
    if (model === activeModel) return;
    activeModel = model;
    const tier = inferTier(model);
    const short = shortModelName(model);

    // Update badge appearance
    modelBadge.className = `model-badge visible tier-${tier}`;
    modelBadgeLabel.textContent = short;

    // Flash animation
    modelBadge.classList.remove('switching');
    void modelBadge.offsetWidth; // reflow
    modelBadge.classList.add('switching');
    clearTimeout(modelSwitchTimer);
    modelSwitchTimer = setTimeout(() => modelBadge.classList.remove('switching'), 600);

    // Show mini toast notification
    const tierLabel = { fast: '⚡ Fast', balanced: '⚖ Balanced', powerful: '🔮 Powerful', code: '💻 Code' }[tier] || tier;
    const dotColor = { fast: '#10b981', balanced: '#818cf8', powerful: '#c084fc', code: '#fbbf24' }[tier];
    modelToastDot.style.background = dotColor;
    modelToastText.textContent = `Switching to ${tierLabel} · ${short}`;
    modelToast.classList.add('visible');
    clearTimeout(modelToastTimer);
    modelToastTimer = setTimeout(() => modelToast.classList.remove('visible'), 2200);
  }

  function clearModelBadge() {
    activeModel = null;
    modelBadge.className = 'model-badge';
    modelToast.classList.remove('visible');
  }

  function base() { return 'http://localhost:3000'; }
  function esc(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
  function ts() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 2600);
  }

  function hideEmpty() { emptyWrap.style.display = 'none'; }
  function scrollFeed() { requestAnimationFrame(() => feed.scrollTop = feed.scrollHeight); }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

  function getFeedInner() {
    let inner = feed.querySelector('.feed-inner');
    if (!inner) { inner = document.createElement('div'); inner.className = 'feed-inner'; feed.appendChild(inner); }
    return inner;
  }

  function addUserBubble(text, images) {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'msg-row row-user';
    const safeText = text || '';
    const rtl = isHebrew(safeText);
    const dirAttr = rtl ? ' dir="rtl"' : '';
    const imagesHtml = images && images.length > 0
      ? `<div class="bubble-images">${images.map(img => `<img src="${esc(img.dataUrl)}" alt="${esc(img.name)}" onclick="window.open(this.src)" title="${esc(img.name)}">`).join('')}</div>`
      : '';
    const textHtml = safeText
      ? `<div class="md"><p>${esc(safeText).replace(/\n/g,'<br>')}</p></div>`
      : '';
    row.innerHTML = `<div class="avatar avatar-user">${ICONS.user}</div><div class="bubble-wrap"><div class="bubble bubble-user"${dirAttr}>${textHtml}${imagesHtml}</div><span class="bubble-time">${ts()}</span></div>`;
    inner.appendChild(row);
    scrollFeed();
  }

  function addAgentBubble(htmlContent, extraClass = '') {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'msg-row';
    row.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="bubble-wrap"><div class="bubble bubble-agent ${extraClass}">${htmlContent}<button class="bubble-copy" onclick="copyBubble(this)">${ICONS.copy}</button></div><span class="bubble-time">${ts()}</span></div>`;
    inner.appendChild(row);
    // Auto-detect RTL in agent bubbles too
    const bubble = row.querySelector('.bubble-agent');
    if (bubble && isHebrew(bubble.textContent)) {
      bubble.setAttribute('dir', 'rtl');
      bubble.style.textAlign = 'right';
    }
    if (typeof mermaid !== 'undefined') mermaid.run({nodes: row.querySelectorAll('.mermaid')});
    scrollFeed();
  }

  function addErrorBubble(html) { addAgentBubble(html, 'bubble-error'); }

  function copyBubble(btn) {
    const txt = btn.closest('.bubble').innerText.trim();
    navigator.clipboard.writeText(txt);
    btn.innerHTML = ICONS.check;
    setTimeout(() => btn.innerHTML = ICONS.copy, 1400);
  }

  function ensureActivityGroup() {
    if (currentActivityGroup) return;
    hideEmpty();
    const inner = getFeedInner();
    const wrap = document.createElement('div'); wrap.className = 'activity-group';
    wrap.innerHTML = `<button class="activity-toggle" onclick="toggleActivity(this)"><div class="activity-spinner"></div><span class="toggle-label">${t('working')}</span><em class="toggle-icon">&#8250;</em></button><div class="activity-items"></div>`;
    inner.appendChild(wrap);
    currentActivityGroup = wrap;
    activityCount = 0;
    scrollFeed();
  }

  function addActivityItem(iconKey, html) {
    ensureActivityGroup();
    activityCount++;
    const items = currentActivityGroup.querySelector('.activity-items');
    const item = document.createElement('div'); item.className = 'activity-item';
    const icon = ICONS[iconKey] || ICONS.tool;
    item.innerHTML = `<span class="activity-item-icon">${icon}</span><span class="activity-item-text">${html}</span>`;
    items.appendChild(item);
    scrollFeed();
  }

  function finalizeActivityGroup(stopped = false) {
    if (!currentActivityGroup) return;
    const btn = currentActivityGroup.querySelector('.activity-toggle');
    if (stopped) {
      btn.classList.add('stopped');
      btn.querySelector('.toggle-label').textContent = t('stopped');
    } else if (activityCount > 0) {
      btn.classList.add('done');
      btn.querySelector('.toggle-label').textContent = t('stepsCompleted', activityCount);
    } else {
      currentActivityGroup.remove();
    }
    currentActivityGroup = null;
  }

  function toggleActivity(btn) {
    const items = btn.closest('.activity-group').querySelector('.activity-items');
    items.classList.toggle('open');
    btn.classList.toggle('open');
    scrollFeed();
  }

  function addTyping() {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'typing-row'; row.id = 'typing-indicator';

  function renderMd(text) {
    let s = String(text);
    const blocks = [];
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      const raw = code.trim();
      if (lang === 'mermaid') {
        const id = 'mmd-' + Math.random().toString(36).slice(2);
        mmdSourceMap[id] = raw;
        blocks.push(`<div class="preview-block"><div class="pre-header"><span class="pre-lang">mermaid</span><button class="pre-copy" onclick="copyBlock(this)">Copy</button></div><div class="mermaid" id="${id}">${raw}</div></div>`);
      } else {
        blocks.push(`<pre><div class="pre-header"><span class="pre-lang">${esc(lang||'text')}</span><button class="pre-copy" onclick="copyBlock(this)">Copy</button></div><code>${esc(raw)}</code></pre>`);
      }
      return `\x00BLOCK${i}\x00`;
    });

    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    s = s.replace(/^---+$/gm, '<hr>');
    s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, m => `<ul>${m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+] /,'')}</li>`).join('')}</ul>`);
    s = s.replace(/((?:^\d+\. .+\n?)+)/gm, m => `<ol>${m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('')}</ol>`);
    s = s.split(/\n{2,}/).map(block => {
      if (block.startsWith('<') || /^\x00BLOCK/.test(block)) return block;
      return `<p>${block.replace(/\n/g,'<br>')}</p>`;
    }).join('');
    blocks.forEach((b,i) => s = s.replace(`\x00BLOCK${i}\x00`, b));
    return `<div class="md">${s}</div>`;
  }

  function copyBlock(btn) {

  async function sendPrompt() {
    let raw = promptInput.value.trim();
    if (!raw && !attachedFile && attachedImages.length === 0) return;
    if (streaming) return;

    let prompt = raw;
    let display = raw;
    if (attachedFile) {
      const ext = attachedFile.name.split('.').pop() || 'txt';
      const block = `[Attached: ${attachedFile.name}]\n\`\`\`${ext}\n${attachedFile.content}\n\`\`\``;
      prompt = raw ? `${block}\n\n${raw}` : block;
      display = raw ? `${attachedFile.name}\n${raw}` : attachedFile.name;
    }

    const images = attachedImages.map(img => ({ url: img.dataUrl }));
    const imagesToShow = [...attachedImages];

    streaming = true;
    hadToolCalls = false;
    promptInput.value = '';
    promptInput.style.height = 'auto';
    removeAttachment();
    removeAllImageAttachments();

    addUserBubble(display, imagesToShow);
    addTyping();
    setProgress('Phase: supervisor');

    abortController = new AbortController();
    stopBtn.classList.add('visible');

    try {
      const res = await fetch(`${base()}/api/agents/stream`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, sessionId, ...(images.length > 0 ? {images} : {})}),
        signal: abortController.signal
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const parts = buffer.split('\n\n');
        buffer = parts.pop() || '';

        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const event = JSON.parse(line.slice(6));
            handleStreamEvent(event);
          }
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        removeTyping();
        addErrorBubble(`<p>${t('connectionError')} ${esc(err.message)}</p>`);
      }
    } finally {
      setIdle();
    }
  }

  function createStreamingBubble() {
    hideEmpty();
    const inner = getFeedInner();
    const row = document.createElement('div'); row.className = 'msg-row';
    row.id = 'streaming-row';
    row.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="bubble-wrap"><div class="bubble bubble-agent"><div class="bubble-streaming"></div></div><span class="bubble-time">${ts()}</span></div>`;

  function finalizeStreamingBubble(htmlContent, isError = false) {
    const row = document.getElementById('streaming-row');
    if (row) {
      const bubble = row.querySelector('.bubble');
      if (isError) bubble.classList.add('bubble-error');
      bubble.innerHTML = htmlContent + `<button class="bubble-copy" onclick="copyBubble(this)">${ICONS.copy}</button>`;
      if (typeof mermaid !== 'undefined') mermaid.run({nodes: bubble.querySelectorAll('.mermaid')});
      row.removeAttribute('id');
    } else {
      // No streaming row — create a static bubble
      isError ? addErrorBubble(htmlContent) : addAgentBubble(htmlContent);
    }
    streamingBubbleEl = null;
    streamingText = '';
    scrollFeed();
  }

  function handleStreamEvent(e) {
    removeTyping();
    const {type, data, model} = e;

    if (type === 'model_switch') {
      const info = (() => { try { return JSON.parse(data); } catch { return {}; } })();
      updateModelBadge(model || info.model);
    }
    else if (type === 'status') {
      setProgress(data);
    }
    else if (type === 'llm_stream_reset') {
      // New LLM generation starting — create/reset the streaming bubble
      streamingText = '';
      if (!streamingBubbleEl) createStreamingBubble();
      else streamingBubbleEl.textContent = '';
    }
    else if (type === 'llm_token') {
      if (!streamingBubbleEl) createStreamingBubble();
      streamingText += data;
      streamingBubbleEl.textContent = streamingText;
      scrollFeed();
    }
    else if (type === 'plan') {
      addActivityItem('plan', t('planReady', JSON.parse(data).length));
    }
    else if (type === 'tool_call_started') {
      hadToolCalls = true;
      addActivityItem('tool', t('running', esc(data)));
    }
    else if (type === 'tool_call_finished') {
      addActivityItem('success', esc(data.length > 120 ? data.slice(0,120)+'...' : data));
    }
    else if (type === 'review_required') {
      clearProgress();
      finalizeActivityGroup();
      buildReviewCard(JSON.parse(data));
      setIdle();
    }
    else if (type === 'final') {
      clearProgress();
      finalizeActivityGroup();
      finalizeStreamingBubble(renderMd(data));
      setIdle();
    }
    else if (type === 'error') {
      clearProgress();
      finalizeActivityGroup();
      finalizeStreamingBubble(renderMd(data), hadToolCalls);
      setIdle();
    }
  }

  function setIdle() {
    streaming = false;
    streamingBubbleEl = null;
    streamingText = '';
    stopBtn.classList.remove('visible');
    clearProgress();
    clearModelBadge();
    promptInput.focus();

  function relativeTime(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
  }

  async function renderHistory() {
    const container = document.getElementById('history-list');
    const refreshBtn = document.getElementById('history-refresh-btn');
    refreshBtn.classList.add('spinning');
    container.innerHTML = `<div class="history-loading"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>Loading...</div>`;

    try {
      const res = await fetch(`${base()}/api/agents/sessions`);
      const data = res.ok ? await res.json() : { sessions: [] };
      const sessions = data.sessions || [];
      container.innerHTML = '';

      // Current (possibly unsaved) session pinned at top
      const curItem = document.createElement('div');
      curItem.className = 'history-item active';
      curItem.id = 'history-cur';
      curItem.onclick = () => switchToSession(sessionId, null, true);
      curItem.innerHTML = `<span class="icon">${ICONS.chat}</span><div class="history-item-info"><div class="history-item-top"><span class="history-item-label">${t('currentSession')}</span></div><div class="history-item-meta">${sessionId.slice(0,12)}…</div></div><span class="time">${t('now')}</span>`;
      container.appendChild(curItem);

      if (sessions.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'No past sessions found.';
        container.appendChild(empty);
      } else {
        for (const s of sessions) {
          if (s.sessionId === sessionId) continue; // already shown as current
          const item = document.createElement('div');
          item.className = 'history-item';
          item.dataset.sid = s.sessionId;
          item.onclick = () => switchToSession(s.sessionId, s.lastObjective);
          const label = s.lastObjective ? s.lastObjective.slice(0, 28) + (s.lastObjective.length > 28 ? '…' : '') : s.sessionId.slice(0, 14) + '…';
          const time = relativeTime(s.lastActivity);
          const badge = s.messageCount > 0 ? `<span class="history-item-badge">${s.messageCount}</span>` : '';
          item.innerHTML = `
            <span class="icon">${ICONS.chat}</span>
            <div class="history-item-info">
              <div class="history-item-top">
                <span class="history-item-label">${esc(label)}</span>${badge}
              </div>
              <div class="history-item-meta">${esc(s.sessionId.slice(0,12))}… · ${time}</div>
            </div>
            <button class="history-item-del" onclick="event.stopPropagation();deleteSession('${esc(s.sessionId)}')" title="Delete session">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>`;
          container.appendChild(item);
        }
      }
    } catch {
      container.innerHTML = '<div class="history-empty">Could not load sessions.</div>';
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  }

  async function switchToSession(sid, objective, isCurrent = false) {
    // Update active highlight
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    const el = isCurrent
      ? document.getElementById('history-cur')
      : document.querySelector(`[data-sid="${sid}"]`);
    if (el) el.classList.add('active');

    if (isCurrent && sid === sessionId) return; // already on current, do nothing

    // Switch session
    sessionId = sid;
    if (abortController) abortController.abort();
    streaming = false;
    currentActivityGroup = null;
    hadToolCalls = false;
    stopBtn.classList.remove('visible');
    clearProgress();

    // Clear feed
    const inner = feed.querySelector('.feed-inner');
    if (inner) inner.remove();
    emptyWrap.style.display = '';

    const title = objective ? objective.slice(0, 40) + (objective.length > 40 ? '…' : '') : sid.slice(0, 16) + '…';
    document.getElementById('chat-session-title').textContent = title;

    // Load detail and show memory entries in feed
    try {
      const res = await fetch(`${base()}/api/agents/session/${encodeURIComponent(sid)}/detail`);
      if (!res.ok) return;
      const detail = await res.json();
      if (!detail.entries || detail.entries.length === 0) return;

      hideEmpty();
      const feedInner = getFeedInner();
      const note = document.createElement('div');
      note.style.cssText = 'text-align:center;font-size:11px;color:var(--text-tertiary);padding:8px 0 16px;';
      note.textContent = `Session history · ${detail.entries.length} turn${detail.entries.length > 1 ? 's' : ''}`;
      feedInner.appendChild(note);

      // Render each memory entry as a card
      for (const entry of [...detail.entries].reverse()) {
        const tsMatch = entry.match(/^\[(.+?)\]/);
        const bodyText = entry.replace(/^\[.+?\]\n?/, '').trim();
        const card = document.createElement('div');
        card.className = 'msg-row';
        card.style.marginBottom = '16px';
        const tsLabel = tsMatch ? new Date(tsMatch[1]).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        card.innerHTML = `<div class="avatar avatar-agent">${ICONS.agent}</div><div class="bubble-wrap"><div class="bubble bubble-agent">${renderMd(bodyText)}<button class="bubble-copy" onclick="copyBubble(this)">${ICONS.copy}</button></div>${tsLabel ? `<span class="bubble-time">${tsLabel}</span>` : ''}</div>`;
        feedInner.appendChild(card);
      }
      scrollFeed();
    } catch { /* show empty state */ }

    promptInput.focus();
  }

  function attachFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = ".txt,.md,.json,.ts,.js,.py,.go,.rs,.java,.c,.cpp,.html,.css,.yaml";
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file || file.size > 512*1024) return alert(t('fileTooLarge'));
      const reader = new FileReader();
      reader.onload = ev => {
        attachedFile = { name: file.name, content: ev.target.result };
        document.getElementById('file-chip-name').textContent = file.name;
        document.getElementById('file-chip').classList.add('visible');
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function removeAttachment() {
    attachedFile = null;
    document.getElementById('file-chip').classList.remove('visible');
  }

  function attachImage() {
    if (attachedImages.length >= 5) return alert('Maximum 5 images per message.');
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = e => {
      const files = Array.from(e.target.files).slice(0, 5 - attachedImages.length);
      files.forEach(file => {
        if (file.size > 5 * 1024 * 1024) return alert(`${file.name}: max 5 MB per image.`);
        const reader = new FileReader();
        reader.onload = ev => {
          attachedImages.push({ name: file.name, dataUrl: ev.target.result });
          renderImageChips();
        };
        reader.readAsDataURL(file);
      });
    };
    input.click();
  }

  function removeImageAttachment(index) {
    attachedImages.splice(index, 1);

  // ── Particle Constellation Canvas ──
  (function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const particles = [];
    const PARTICLE_COUNT = 35;
    const MAX_DIST = 120;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }

    function isDark() {
      return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 2 + 1,
        hue: Math.random() * 60 + 230, // 230-290 range (indigo to purple)
      };
    }

    function init() {
      resize();
      particles.length = 0;
      for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle());
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const alpha = isDark() ? 0.6 : 0.4;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 70%, 65%, ${alpha * 0.7})`;
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x, dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MAX_DIST) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `hsla(${(p.hue + q.hue) / 2}, 60%, 60%, ${(1 - dist / MAX_DIST) * alpha * 0.3})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    init();
    draw();
    window.addEventListener('resize', () => { resize(); });
  })();

</script>
</body>
</html>
